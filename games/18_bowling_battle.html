<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保龄球对战 - 情侣小游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-gradient-1: #fff5eb; --bg-gradient-2: #ffe4c4;
            --primary-color: #ff8c42; --secondary-color: #ff6b35;
            --accent-color: #ffd166; --text-color: #333;
            --card-bg: rgba(255,255,255,0.9); --border-color: #ff8c42;
            --shadow: 0 8px 32px rgba(255,140,66,0.3);
            --player1-color: #ff6b6b; --player2-color: #4ecdc4;
            --lane-color: #27ae60; --pin-color: white;
        }
        [data-theme="orange"] { --bg-gradient-1: #fff5eb; --bg-gradient-2: #ffe4c4; --primary-color: #ff8c42; --secondary-color: #ff6b35; --accent-color: #ffd166; --border-color: #ff8c42; --shadow: 0 8px 32px rgba(255,140,66,0.3); }
        [data-theme="pink"] { --bg-gradient-1: #fff0f5; --bg-gradient-2: #ffe4ec; --primary-color: #ff6b9d; --secondary-color: #c44569; --accent-color: #ffb6c1; --border-color: #ff6b9d; --shadow: 0 8px 32px rgba(255,107,157,0.3); }
        [data-theme="purple"] { --bg-gradient-1: #f3e8ff; --bg-gradient-2: #e6d5ff; --primary-color: #9b59b6; --secondary-color: #8e44ad; --accent-color: #d4a5ff; --border-color: #9b59b6; --shadow: 0 8px 32px rgba(155,89,182,0.3); }
        [data-theme="blue"] { --bg-gradient-1: #e8f4fd; --bg-gradient-2: #d4e8fc; --primary-color: #3498db; --secondary-color: #2980b9; --accent-color: #74b9ff; --border-color: #3498db; --shadow: 0 8px 32px rgba(52,152,219,0.3); }
        [data-theme="green"] { --bg-gradient-1: #e8f8f5; --bg-gradient-2: #d1f2eb; --primary-color: #1abc9c; --secondary-color: #16a085; --accent-color: #76d7c4; --border-color: #1abc9c; --shadow: 0 8px 32px rgba(26,188,156,0.3); }
        [data-theme="red"] { --bg-gradient-1: #fdedec; --bg-gradient-2: #fadbd8; --primary-color: #e74c3c; --secondary-color: #c0392b; --accent-color: #f1948a; --border-color: #e74c3c; --shadow: 0 8px 32px rgba(231,76,60,0.3); }
        [data-mode="dark"] { --bg-gradient-1: #1a1a2e; --bg-gradient-2: #16213e; --text-color: #fff; --card-bg: rgba(255,255,255,0.1); }
        body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2)); color: var(--text-color); padding: 20px; transition: all 0.3s ease; overflow-x: hidden; }
        body::before { content: '💕'; position: fixed; top: 10%; left: 5%; font-size: 60px; opacity: 0.1; pointer-events: none; animation: float 6s ease-in-out infinite; }
        body::after { content: '💖'; position: fixed; bottom: 10%; right: 5%; font-size: 60px; opacity: 0.1; pointer-events: none; animation: float 6s ease-in-out infinite reverse; }
        @keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }
        .container { max-width: 900px; margin: 0 auto; }
        .back-btn { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; text-decoration: none; border-radius: 25px; font-weight: bold; margin-bottom: 20px; transition: all 0.3s ease; box-shadow: var(--shadow); }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,140,66,0.4); }
        h1 { text-align: center; font-size: 2.5em; margin-bottom: 10px; color: var(--primary-color); text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .subtitle { text-align: center; font-size: 1.2em; margin-bottom: 20px; opacity: 0.8; }
        .theme-panel { position: fixed; top: 20px; right: 20px; background: var(--card-bg); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; box-shadow: var(--shadow); z-index: 100; }
        .theme-btn { width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; cursor: pointer; margin: 0 5px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .theme-btn:hover { transform: scale(1.2); }
        .theme-btn.active { transform: scale(1.2); box-shadow: 0 0 15px currentColor; }
        .theme-btn.orange { background: linear-gradient(135deg, #ff8c42, #ff6b35); }
        .theme-btn.pink { background: linear-gradient(135deg, #ff6b9d, #c44569); }
        .theme-btn.purple { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .theme-btn.blue { background: linear-gradient(135deg, #3498db, #2980b9); }
        .theme-btn.green { background: linear-gradient(135deg, #1abc9c, #16a085); }
        .theme-btn.red { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .mode-toggle { width: 60px; height: 30px; background: #ddd; border-radius: 15px; position: relative; cursor: pointer; margin-top: 10px; transition: all 0.3s ease; }
        .mode-toggle::after { content: '☀️'; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.3s ease; }
        [data-mode="dark"] .mode-toggle { background: var(--primary-color); }
        [data-mode="dark"] .mode-toggle::after { left: 32px; content: '🌙'; }
        .random-theme-btn { margin-top: 10px; padding: 8px 16px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; width: 100%; }
        .random-theme-btn:hover { transform: scale(1.05); }
        .name-inputs { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .name-inputs input { padding: 8px 12px; border: 2px solid var(--border-color); border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 14px; }
        .name-inputs input:focus { outline: none; box-shadow: 0 0 0 3px rgba(255,140,66,0.3); }
        .game-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 20px; }
        .player-info { background: var(--card-bg); backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 15px; box-shadow: var(--shadow); text-align: center; min-width: 180px; transition: all 0.3s ease; }
        .player-info.active { border: 3px solid var(--primary-color); transform: scale(1.05); animation: glow 1.5s ease-in-out infinite; }
        @keyframes glow { 0%,100% { box-shadow: var(--shadow); } 50% { box-shadow: 0 0 30px rgba(255,140,66,0.6); } }
        .player-info h2 { font-size: 1.3em; margin-bottom: 5px; }
        .player1-info h2 { color: var(--player1-color); }
        .player2-info h2 { color: var(--player2-color); }
        .score-display { font-size: 2em; font-weight: bold; color: var(--primary-color); }
        .frame-info { background: var(--card-bg); backdrop-filter: blur(10px); padding: 15px 30px; border-radius: 15px; box-shadow: var(--shadow); text-align: center; }
        .frame-number { font-size: 1.5em; font-weight: bold; color: var(--primary-color); }
        .game-area { background: linear-gradient(90deg, #1a5a1a, #27ae60, #1a5a1a); border-radius: 20px; padding: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); margin-bottom: 20px; position: relative; overflow: hidden; }
        .lane { background: linear-gradient(90deg, #1a5a1a, #3498db, #1a5a1a); border-radius: 10px; padding: 20px; }
        .pins-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .pin { width: 30px; height: 50px; background: var(--pin-color); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; position: relative; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .pin::before { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #333; border-radius: 50%; }
        .pin::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 15px; background: rgba(0,0,0,0.2); border-radius: 50%; }
        .pin.knocked { transform: rotate(45deg) scale(0.8); opacity: 0.3; }
        .ball-container { display: flex; justify-content: center; }
        .bowling-ball { width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #4a4a4a, #1a1a1a); border-radius: 50%; position: relative; cursor: grab; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .bowling-ball::before { content: ''; position: absolute; top: 10px; left: 10px; width: 8px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .bowling-ball.rolling { animation: rollBall 1s linear; }
        @keyframes rollBall { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }
        .power-bar-container { width: 100%; height: 20px; background: #333; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .power-bar { height: 100%; background: linear-gradient(90deg, #27ae60, #f39c12, #e74c3c); width: 0; transition: width 0.1s linear; }
        .power-bar.active { animation: powerFill 0.5s ease-in-out infinite alternate; }
        @keyframes powerFill { 0% { width: 0; } 100% { width: 100%; } }
        .game-message { text-align: center; font-size: 1.3em; margin-bottom: 20px; min-height: 40px; color: var(--primary-color); font-weight: bold; }
        .controls { text-align: center; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 15px 30px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow); color: white; }
        .btn-primary { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255,140,66,0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-throw { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-reset { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }
        .btn-share { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .scoreboard { background: var(--card-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .scoreboard h3 { color: var(--primary-color); margin-bottom: 15px; text-align: center; }
        .frames-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
        .frame-cell { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; text-align: center; font-weight: bold; }
        .frame-cell.player1 { color: var(--player1-color); }
        .frame-cell.player2 { color: var(--player2-color); }
        .frame-cell.current { background: rgba(255,140,66,0.3); }
        .frame-cell.strike { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .frame-cell.spare { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
        .instructions { background: var(--card-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); }
        .instructions h3 { color: var(--primary-color); margin-bottom: 10px; text-align: center; }
        .instructions p { margin: 5px 0; line-height: 1.6; }
        .pause-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .pause-overlay.active { opacity: 1; pointer-events: auto; }
        .pause-content { background: var(--card-bg); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; text-align: center; box-shadow: var(--shadow); }
        .pause-content h2 { color: var(--primary-color); margin-bottom: 20px; font-size: 2em; }
        .share-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .share-modal.active { opacity: 1; pointer-events: auto; }
        .share-content { background: var(--card-bg); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; text-align: center; box-shadow: var(--shadow); max-width: 500px; width: 90%; }
        .share-content h2 { color: var(--primary-color); margin-bottom: 20px; }
        #shareCanvas { border-radius: 10px; margin-bottom: 20px; max-width: 100%; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2em; cursor: pointer; color: var(--text-color); transition: transform 0.3s ease; }
        .close-btn:hover { transform: rotate(90deg); }
        @media (max-width: 768px) { .theme-panel { position: static; margin-bottom: 20px; } h1 { font-size: 1.8em; } .pin { width: 25px; height: 40px; } .bowling-ball { width: 40px; height: 40px; } .frames-grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body data-theme="orange" data-mode="light">
    <div class="theme-panel">
        <div>
            <button class="theme-btn orange active" data-theme="orange" data-mode="light"></button>
            <button class="theme-btn pink" data-theme="pink" data-mode="light"></button>
            <button class="theme-btn purple" data-theme="purple" data-mode="light"></button>
            <button class="theme-btn blue" data-theme="blue" data-mode="light"></button>
            <button class="theme-btn green" data-theme="green" data-mode="light"></button>
            <button class="theme-btn red" data-theme="red" data-mode="light"></button>
        </div>
        <div style="margin-top: 10px;">
            <button class="theme-btn orange" data-theme="orange" data-mode="dark"></button>
            <button class="theme-btn pink" data-theme="pink" data-mode="dark"></button>
            <button class="theme-btn purple" data-theme="purple" data-mode="dark"></button>
            <button class="theme-btn blue" data-theme="blue" data-mode="dark"></button>
            <button class="theme-btn green" data-theme="green" data-mode="dark"></button>
            <button class="theme-btn red" data-theme="red" data-mode="dark"></button>
        </div>
        <div class="mode-toggle" id="modeToggle"></div>
        <button class="random-theme-btn" id="randomThemeBtn">🎲 随机主题</button>
        <div class="name-inputs">
            <input type="text" id="player1Name" placeholder="玩家1昵称" maxlength="10">
            <input type="text" id="player2Name" placeholder="玩家2昵称" maxlength="10">
        </div>
    </div>

    <div class="pause-overlay" id="pauseOverlay">
        <div class="pause-content">
            <h2>⏸️ 游戏暂停</h2>
            <button class="btn btn-primary" onclick="togglePause()">▶️ 继续游戏</button>
        </div>
    </div>

    <div class="share-modal" id="shareModal">
        <span class="close-btn" onclick="closeShareModal()">&times;</span>
        <div class="share-content">
            <h2>📸 分享战绩</h2>
            <canvas id="shareCanvas" width="400" height="350"></canvas>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="downloadShareImage()">💾 保存图片</button>
                <button class="btn btn-secondary" onclick="closeShareModal()">关闭</button>
            </div>
        </div>
    </div>

    <div class="container">
        <a href="../index.html" class="back-btn">← 返回主页</a>
        <h1>🎯 保龄球对战</h1>
        <p class="subtitle">经典保龄球游戏，击倒更多瓶子！</p>

        <div class="game-info">
            <div class="player-info player1-info" id="player1Info">
                <h2 id="player1NameDisplay">玩家1</h2>
                <div class="score-display" id="player1Score">0</div>
            </div>
            <div class="frame-info">
                <div>第 <span class="frame-number" id="frameNumber">1</span> 局</div>
                <div style="font-size: 0.9em;">第 <span id="ballNumber">1</span> 球</div>
            </div>
            <div class="player-info player2-info" id="player2Info">
                <h2 id="player2NameDisplay">玩家2</h2>
                <div class="score-display" id="player2Score">0</div>
            </div>
        </div>

        <div class="game-message" id="gameMessage">点击"开始游戏"开始对战！</div>

        <div class="game-area">
            <div class="power-bar-container">
                <div class="power-bar" id="powerBar"></div>
            </div>
            <div class="lane">
                <div class="pins-container" id="pinsContainer"></div>
                <div class="ball-container">
                    <div class="bowling-ball" id="bowlingBall"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="btn-group">
                <button class="btn btn-primary" id="startBtn" onclick="startGame()">🎮 开始游戏</button>
                <button class="btn btn-throw" id="throwBtn" onclick="throwBall()" disabled>🎯 投球</button>
                <button class="btn btn-reset" id="resetBtn" onclick="resetPins()" disabled>🔄 重置</button>
                <button class="btn btn-secondary" id="pauseBtn" onclick="togglePause()">⏸️ 暂停</button>
                <button class="btn btn-share" id="shareBtn" onclick="showShareModal()">📸 分享战绩</button>
            </div>
        </div>

        <div class="scoreboard">
            <h3>📊 计分板</h3>
            <div class="frames-grid" id="framesGrid"></div>
        </div>

        <div class="instructions">
            <h3>🎯 游戏规则</h3>
            <p><strong>目标：</strong>在10局中获得更高的分数</p>
            <p><strong>操作：</strong></p>
            <ul>
                <li>点击"投球"按钮启动力量条</li>
                <li>再次点击投球，力量条越长球速越快</li>
                <li>每局最多投2球</li>
                <li>🎳 全中(Strike)：第一球击倒所有10个瓶，得10分+下两球分数</li>
                <li>🎳 补中(Spare)：两球击倒所有10个瓶，得10分+下一球分数</li>
                <li>第10局有特殊规则：全中或补中可额外投球</li>
            </ul>
            <p><strong>快捷键：</strong><span style="background: var(--primary-color); color: white; padding: 3px 10px; border-radius: 5px; margin: 0 5px;">空格</span> 投球</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let player1Name = urlParams.get('p1') || '玩家1';
        let player2Name = urlParams.get('p2') || '玩家2';
        document.getElementById('player1Name').value = player1Name;
        document.getElementById('player2Name').value = player2Name;
        document.getElementById('player1NameDisplay').textContent = player1Name;
        document.getElementById('player2NameDisplay').textContent = player2Name;

        let pins = [];
        let player1Score = 0, player2Score = 0;
        let currentPlayer = 0;
        let currentFrame = 1;
        let ballsInFrame = 0;
        let gameRunning = false, gamePaused = false;
        let isCharging = false;
        let power = 0;
        let powerInterval = null;
        let winner = null;
        let frames = [[], []];

        const body = document.body;
        const colorThemeBtns = document.querySelectorAll('.theme-btn');
        const modeToggle = document.getElementById('modeToggle');
        const randomThemeBtn = document.getElementById('randomThemeBtn');
        let appliedTheme = localStorage.getItem('theme') || 'orange';
        let appliedMode = localStorage.getItem('mode') || 'light';

        function applyTheme(theme, mode) {
            body.setAttribute('data-theme', theme);
            body.setAttribute('data-mode', mode);
            localStorage.setItem('theme', theme);
            localStorage.setItem('mode', mode);
            colorThemeBtns.forEach(btn => { btn.classList.remove('active'); if (btn.dataset.theme === theme && btn.dataset.mode === mode) btn.classList.add('active'); });
        }

        function previewTheme(theme, mode) { body.setAttribute('data-theme', theme); body.setAttribute('data-mode', mode); }
        function restoreTheme() { body.setAttribute('data-theme', appliedTheme); body.setAttribute('data-mode', appliedMode); }

        applyTheme(appliedTheme, appliedMode);

        colorThemeBtns.forEach(btn => {
            btn.addEventListener('mouseenter', () => previewTheme(btn.dataset.theme, btn.dataset.mode));
            btn.addEventListener('mouseleave', restoreTheme);
            btn.addEventListener('click', () => { appliedTheme = btn.dataset.theme; appliedMode = btn.dataset.mode; applyTheme(appliedTheme, appliedMode); });
        });

        modeToggle.addEventListener('click', () => { appliedMode = appliedMode === 'light' ? 'dark' : 'light'; applyTheme(appliedTheme, appliedMode); });
        randomThemeBtn.addEventListener('click', () => {
            const themes = ['orange','pink','purple','blue','green','red'];
            const modes = ['light','dark'];
            appliedTheme = themes[Math.floor(Math.random()*themes.length)];
            appliedMode = modes[Math.floor(Math.random()*modes.length)];
            applyTheme(appliedTheme, appliedMode);
        });

        document.getElementById('player1Name').addEventListener('input', updateNames);
        document.getElementById('player2Name').addEventListener('input', updateNames);

        function updateNames() {
            player1Name = document.getElementById('player1Name').value || '玩家1';
            player2Name = document.getElementById('player2Name').value || '玩家2';
            document.getElementById('player1NameDisplay').textContent = player1Name;
            document.getElementById('player2NameDisplay').textContent = player2Name;
        }

        function initPins() {
            const container = document.getElementById('pinsContainer');
            container.innerHTML = '';
            pins = [];
            
            const positions = [
                [2,0],[1,1],[3,1],[0,2],[2,2],[4,2],[1,3],[3,3],[0,4],[2,4]
            ];
            
            positions.forEach((pos, i) => {
                const pin = document.createElement('div');
                pin.className = 'pin';
                pin.style.gridColumn = pos[0] + 1;
                pin.style.gridRow = pos[1] + 1;
                pin.dataset.index = i;
                pins.push({ element: pin, knocked: false });
                container.appendChild(pin);
            });
        }

        function startGame() {
            player1Score = 0; player2Score = 0;
            currentPlayer = 0; currentFrame = 1; ballsInFrame = 0;
            gameRunning = true; gamePaused = false;
            frames = Array(10).fill(null).map(() => [[], []]);
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('throwBtn').disabled = false;
            document.getElementById('resetBtn').disabled = false;

            updateDisplay();
            resetPins();
            updateMessage(`${player1Name} 的回合，准备投球！`);
        }

        function updateDisplay() {
            document.getElementById('player1Score').textContent = player1Score;
            document.getElementById('player2Score').textContent = player2Score;
            document.getElementById('frameNumber').textContent = currentFrame;
            document.getElementById('ballNumber').textContent = ballsInFrame + 1;

            document.getElementById('player1Info').classList.toggle('active', currentPlayer === 0 && gameRunning);
            document.getElementById('player2Info').classList.toggle('active', currentPlayer === 1 && gameRunning);

            updateScoreboard();
        }

        function updateScoreboard() {
            const grid = document.getElementById('framesGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const cell1 = document.createElement('div');
                cell1.className = `frame-cell player1 ${i + 1 === currentFrame && currentPlayer === 0 ? 'current' : ''}`;
                cell1.textContent = frames[i][0].length > 0 ? formatFrameScore(frames[i][0]) : '-';
                if (isStrike(frames[i][0])) cell1.classList.add('strike');
                else if (isSpare(frames[i][0])) cell1.classList.add('spare');
                
                const cell2 = document.createElement('div');
                cell2.className = `frame-cell player2 ${i + 1 === currentFrame && currentPlayer === 1 ? 'current' : ''}`;
                cell2.textContent = frames[i][1].length > 0 ? formatFrameScore(frames[i][1]) : '-';
                if (isStrike(frames[i][1])) cell2.classList.add('strike');
                else if (isSpare(frames[i][1])) cell2.classList.add('spare');
                
                grid.appendChild(cell1);
                grid.appendChild(cell2);
            }
        }

        function formatFrameScore(frame) {
            if (frame.length === 0) return '-';
            if (isStrike(frame)) return '🎳';
            if (isSpare(frame)) return '🎳';
            return frame.reduce((a,b) => a+b, 0);
        }

        function isStrike(frame) {
            return frame.length >= 1 && frame[0] === 10;
        }

        function isSpare(frame) {
            return frame.length >= 2 && frame[0] + frame[1] === 10 && frame[0] !== 10;
        }

        function throwBall() {
            if (!gameRunning || gamePaused) return;

            if (!isCharging) {
                startPowerBar();
            } else {
                stopPowerBar();
                launchBall();
            }
        }

        function startPowerBar() {
            isCharging = true;
            const bar = document.getElementById('powerBar');
            bar.classList.add('active');
            document.getElementById('throwBtn').textContent = '🎯 投球!';
            power = 0;
            
            powerInterval = setInterval(() => {
                power += 2;
                if (power > 100) power = 0;
                bar.style.width = power + '%';
            }, 20);
        }

        function stopPowerBar() {
            isCharging = false;
            const bar = document.getElementById('powerBar');
            bar.classList.remove('active');
            bar.style.width = '0%';
            document.getElementById('throwBtn').textContent = '🎯 投球';
            if (powerInterval) clearInterval(powerInterval);
        }

        function launchBall() {
            const ball = document.getElementById('bowlingBall');
            ball.classList.add('rolling');
            document.getElementById('throwBtn').disabled = true;

            setTimeout(() => {
                ball.classList.remove('rolling');
                calculateHit();
            }, 1000);
        }

        function calculateHit() {
            const knockedCount = Math.floor(Math.random() * 6) + Math.floor(power / 20);
            const maxKnocked = Math.min(knockedCount, pins.filter(p => !p.knocked).length);
            
            const standingPins = pins.filter(p => !p.knocked);
            for (let i = 0; i < maxKnocked; i++) {
                const randomIndex = Math.floor(Math.random() * standingPins.length);
                standingPins[randomIndex].element.classList.add('knocked');
                standingPins[randomIndex].knocked = true;
            }

            const knockedCountActual = pins.filter(p => p.knocked).length;
            
            frames[currentFrame - 1][currentPlayer].push(knockedCountActual);

            if (isStrike(frames[currentFrame - 1][currentPlayer])) {
                updateMessage('🎳 全中！');
            } else if (ballsInFrame === 1 && isSpare(frames[currentFrame - 1][currentPlayer])) {
                updateMessage('🎳 补中！');
            } else {
                updateMessage(`击倒 ${knockedCountActual} 个瓶！`);
            }

            ballsInFrame++;
            nextBallOrFrame();
        }

        function nextBallOrFrame() {
            const frame = frames[currentFrame - 1][currentPlayer];
            
            if (currentFrame === 10) {
                if (isStrike(frame)) {
                    if (frame.length < 3) {
                        ballsInFrame = 0;
                        updateDisplay();
                        document.getElementById('throwBtn').disabled = false;
                        return;
                    }
                } else if (isSpare(frame)) {
                    if (frame.length < 3) {
                        ballsInFrame = 0;
                        updateDisplay();
                        document.getElementById('throwBtn').disabled = false;
                        return;
                    }
                } else if (frame.length < 2) {
                    ballsInFrame = 1;
                    updateDisplay();
                    document.getElementById('throwBtn').disabled = false;
                    return;
                }
            } else {
                if (isStrike(frame) || ballsInFrame >= 2) {
                    ballsInFrame = 0;
                    switchPlayer();
                    return;
                }
            }

            ballsInFrame = 0;
            switchPlayer();
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 0 ? 1 : 0;
            
            if (currentPlayer === 0) {
                currentFrame++;
            }

            if (currentFrame > 10) {
                endGame();
                return;
            }

            resetPins();
            updateDisplay();
            updateMessage(`${currentPlayer === 0 ? player1Name : player2Name} 的回合`);
            document.getElementById('throwBtn').disabled = false;
        }

        function resetPins() {
            pins.forEach(pin => {
                pin.element.classList.remove('knocked');
                pin.knocked = false;
            });
        }

        function endGame() {
            gameRunning = false;
            calculateFinalScores();
            
            if (player1Score > player2Score) {
                winner = 0;
                updateMessage(`🎉 ${player1Name} 获胜！`);
            } else if (player2Score > player1Score) {
                winner = 1;
                updateMessage(`🎉 ${player2Name} 获胜！`);
            } else {
                winner = 'draw';
                updateMessage('🤝 平局！');
            }

            document.getElementById('startBtn').disabled = false;
            document.getElementById('throwBtn').disabled = true;
            updateDisplay();
        }

        function calculateFinalScores() {
            for (let player = 0; player < 2; player++) {
                let score = 0;
                for (let frame = 0; frame < 10; frame++) {
                    const current = frames[frame][player];
                    if (current.length === 0) continue;
                    
                    let frameScore = current.reduce((a,b) => a+b, 0);
                    
                    if (isStrike(current)) {
                        if (frame + 1 < 10) {
                            const next1 = frames[frame + 1][player];
                            frameScore += next1[0] || 0;
                            if (next1[0] === 10 && frame + 2 < 10) {
                                frameScore += frames[frame + 2][player][0] || 0;
                            } else if (next1.length > 1) {
                                frameScore += next1[1] || 0;
                            }
                        }
                    } else if (isSpare(current)) {
                        if (frame + 1 < 10) {
                            frameScore += frames[frame + 1][player][0] || 0;
                        }
                    }
                    
                    score += frameScore;
                }
                
                if (player === 0) player1Score = score;
                else player2Score = score;
            }
        }

        function updateMessage(msg) {
            document.getElementById('gameMessage').textContent = msg;
        }

        function togglePause() {
            if (!gameRunning && !gamePaused) return;
            gamePaused = !gamePaused;
            const overlay = document.getElementById('pauseOverlay');
            const btn = document.getElementById('pauseBtn');
            if (gamePaused) { 
                overlay.classList.add('active'); 
                btn.textContent = '▶️ 继续';
                if (powerInterval) clearInterval(powerInterval);
            } else { 
                overlay.classList.remove('active'); 
                btn.textContent = '⏸️ 暂停'; 
            }
        }

        function showShareModal() {
            document.getElementById('shareModal').classList.add('active');
            generateShareImage();
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('active');
        }

        function generateShareImage() {
            const canvas = document.getElementById('shareCanvas');
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
            gradient.addColorStop(0,'#fff5eb'); gradient.addColorStop(1,'#ffe4c4');
            ctx.fillStyle = gradient; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            ctx.fillStyle = '#ff8c42'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
            ctx.fillText('🎯 保龄球对战', canvas.width/2, 50);
            
            ctx.fillStyle = '#333'; ctx.font = '18px Arial';
            ctx.fillText(`${player1Name} vs ${player2Name}`, canvas.width/2, 90);
            
            ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 24px Arial';
            ctx.fillText(`${player1Name}: ${player1Score} 分`, canvas.width/2, 140);
            
            ctx.fillStyle = '#4ecdc4';
            ctx.fillText(`${player2Name}: ${player2Score} 分`, canvas.width/2, 180);
            
            ctx.fillStyle = '#666'; ctx.font = '16px Arial';
            ctx.fillText(`第 ${currentFrame} 局`, canvas.width/2, 220);
            
            let resultText = winner === 0 ? `🏆 ${player1Name} 获胜！` : winner === 1 ? `🏆 ${player2Name} 获胜！` : winner === 'draw' ? '🤝 平局！' : gameRunning ? '游戏进行中...' : '等待开始...';
            ctx.fillStyle = '#ff8c42'; ctx.font = 'bold 24px Arial';
            ctx.fillText(resultText, canvas.width/2, 280);
            
            ctx.fillStyle = '#999'; ctx.font = '14px Arial';
            ctx.fillText('情侣小游戏合集', canvas.width/2, 330);
        }

        function downloadShareImage() {
            const canvas = document.getElementById('shareCanvas');
            const link = document.createElement('a');
            link.download = '保龄球对战战绩.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        document.addEventListener('keydown', e => {
            if (gamePaused && e.code !== 'Escape') return;
            if (e.code === 'Escape') { if (gameRunning || gamePaused) togglePause(); }
            else if (e.code === 'Space') { e.preventDefault(); if (gameRunning && !gamePaused && !document.getElementById('throwBtn').disabled) throwBall(); }
        });

        initPins();
    </script>
</body>
</html>
