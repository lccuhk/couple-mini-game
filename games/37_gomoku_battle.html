<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .game-area {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,1);
            position: relative;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 2px;
            background: #DEB887;
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            width: 30px;
            height: 30px;
            background: #D2691E;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .cell:hover::before {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
        }

        .cell.has-piece::before {
            display: none;
        }

        .piece {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            z-index: 1;
        }

        .piece.black {
            background: radial-gradient(circle at 30% 30%, #666, #000);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">⚫ 五子棋对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
            <div style="margin-top: 10px;">
                <div class="piece black" style="margin: 0 auto;"></div>
                <span style="font-size: 14px;">黑棋</span>
            </div>
        </div>

        <div class="game-area">
            <div class="game-board" id="gameBoard"></div>
            <div class="turn-indicator" id="turnIndicator">准备开始</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
            <div style="margin-top: 10px;">
                <div class="piece white" style="margin: 0 auto;"></div>
                <span style="font-size: 14px;">白棋</span>
            </div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 玩家1: 黑棋，先行</p>
        <p>🎯 玩家2: 白棋，后行</p>
        <p>⚫ 五子连珠获胜：横、竖、斜任意方向连成5子</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const BOARD_SIZE = 15;
        let board = [];
        let currentPlayer = 1;
        let isGameRunning = false;
        let isPaused = false;
        let gameWinner = null;

        function initBoard() {
            board = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                board[y] = [];
                for (let x = 0; x < BOARD_SIZE; x++) {
                    board[y][x] = 0;
                }
            }
        }

        function renderBoard() {
            const boardElement = document.getElementById('gameBoard');
            boardElement.innerHTML = '';
            
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[y][x] !== 0 ? ' has-piece' : '');
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    
                    if (board[y][x] !== 0) {
                        const piece = document.createElement('div');
                        piece.className = 'piece ' + (board[y][x] === 1 ? 'black' : 'white');
                        cell.appendChild(piece);
                    }
                    
                    cell.addEventListener('click', () => handleClick(x, y));
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleClick(x, y) {
            if (!isGameRunning || isPaused) return;
            if (board[y][x] !== 0) return;
            
            board[y][x] = currentPlayer;
            renderBoard();
            
            if (checkWin(x, y)) {
                gameWinner = currentPlayer;
                endGame();
                return;
            }
            
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateTurnIndicator();
        }

        function checkWin(x, y) {
            const directions = [
                [0, 1],   // 水平
                [1, 0],   // 垂直
                [1, 1],   // 对角线 \
                [1, -1]   // 对角线 /
            ];
            
            for (const [dx, dy] of directions) {
                let count = 1;
                
                count += countInDirection(x, y, dx, dy);
                count += countInDirection(x, y, -dx, -dy);
                
                if (count >= 5) return true;
            }
            
            return false;
        }

        function countInDirection(x, y, dx, dy) {
            let count = 0;
            let nx = x + dx;
            let ny = y + dy;
            
            while (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && 
                   board[ny][nx] === board[y][x]) {
                count++;
                nx += dx;
                ny += dy;
            }
            
            return count;
        }

        function updateTurnIndicator() {
            const playerName = currentPlayer === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            const pieceColor = currentPlayer === 1 ? '黑棋' : '白棋';
            document.getElementById('turnIndicator').textContent = `${playerName} (${pieceColor}) 的回合`;
        }

        function updateScoreDisplay() {
            if (gameWinner === 1) {
                const current = parseInt(document.getElementById('score1').textContent);
                document.getElementById('score1').textContent = current + 1;
            } else if (gameWinner === 2) {
                const current = parseInt(document.getElementById('score2').textContent);
                document.getElementById('score2').textContent = current + 1;
            }
        }

        function endGame() {
            isGameRunning = false;
            updateScoreDisplay();
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            const winner = gameWinner === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            const pieceColor = gameWinner === 1 ? '黑棋' : '白棋';
            winnerText.textContent = `${winner} (${pieceColor}) 获胜!`;
            overlay.classList.remove('hidden');
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            gameWinner = null;
            currentPlayer = 1;
            
            initBoard();
            renderBoard();
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            updateTurnIndicator();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
                document.getElementById('turnIndicator').textContent = isPaused ? '游戏暂停' : `${currentPlayer === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value} 的回合`;
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 500;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('五子棋对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${document.getElementById('score1').textContent}胜`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${document.getElementById('score2').textContent}胜`, 350, 150);
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(120, 250, 20, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(380, 250, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            let result = '';
            const score1 = parseInt(document.getElementById('score1').textContent);
            const score2 = parseInt(document.getElementById('score2').textContent);
            if (score1 > score2) {
                result = `${document.getElementById('player1Name').value} 领先!`;
            } else if (score2 > score1) {
                result = `${document.getElementById('player2Name').value} 领先!`;
            } else {
                result = '势均力敌!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(result, canvas.width / 2, 320);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('🎮 couple-mini-game', canvas.width / 2, 370);
            
            const link = document.createElement('a');
            link.download = 'gomoku_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
            }
        });

        initBoard();
        renderBoard();
    </script>
</body>
</html>
