<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑酷对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .game-area {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-board {
            border: 3px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">🏃 跑酷对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div class="turn-indicator" id="turnIndicator">准备开始</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 玩家1: ↑ 跳跃 | ↓ 滑行</p>
        <p>🎯 玩家2: W 跳跃 | S 滑行</p>
        <p>🏃 躲避障碍物，跑得越远分数越高</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const PLAYER_WIDTH = 40;
        const PLAYER_HEIGHT = 60;
        const GROUND_HEIGHT = 60;
        const GRAVITY = 0.8;
        const JUMP_FORCE = -15;
        const GAME_SPEED_INITIAL = 5;

        let player1 = { x: 100, y: 300, vy: 0, isJumping: false, isSliding: false, score: 0 };
        let player2 = { x: 400, y: 300, vy: 0, isJumping: false, isSliding: false, score: 0 };
        let obstacles = [];
        let coins = [];
        let clouds = [];
        
        let isGameRunning = false;
        let isPaused = false;
        let gameWinner = null;
        let gameSpeed = GAME_SPEED_INITIAL;

        function initClouds() {
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({ x: Math.random() * canvas.width, y: 30 + Math.random() * 50, size: 30 + Math.random() * 20, speed: 0.5 + Math.random() * 0.5 });
            }
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F7FA');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            clouds.forEach(cloud => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.7, cloud.y - cloud.size * 0.3, cloud.size * 0.6, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 1.4, cloud.y, cloud.size * 0.7, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
            
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 10);
            
            ctx.fillStyle = '#3d7a37';
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.fillRect(i, canvas.height - GROUND_HEIGHT + 5, 15, 5);
            }
        }

        function drawPlayer(player, color) {
            ctx.save();
            
            const h = player.isSliding ? PLAYER_HEIGHT * 0.6 : PLAYER_HEIGHT;
            const w = player.isSliding ? PLAYER_WIDTH * 1.3 : PLAYER_WIDTH;
            
            ctx.fillStyle = color;
            ctx.fillRect(player.x - w/2, player.y - h, w, h);
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x - w/4, player.y - h + 15, 6, 0, Math.PI * 2);
            ctx.arc(player.x + w/4, player.y - h + 15, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(player.x - w/4, player.y - h + 15, 3, 0, Math.PI * 2);
            ctx.arc(player.x + w/4, player.y - h + 15, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawObstacle(obstacle) {
            ctx.fillStyle = obstacle.type === 'cactus' ? '#2d5a27' : '#8B4513';
            
            if (obstacle.type === 'cactus') {
                ctx.fillRect(obstacle.x - 15, canvas.height - GROUND_HEIGHT - 40, 30, 40);
                ctx.fillRect(obstacle.x - 25, canvas.height - GROUND_HEIGHT - 25, 15, 25);
                ctx.fillRect(obstacle.x + 10, canvas.height - GROUND_HEIGHT - 25, 15, 25);
            } else {
                ctx.fillRect(obstacle.x - 20, canvas.height - GROUND_HEIGHT - 30, 40, 30);
            }
        }

        function drawCoin(coin) {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, 10, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('$', coin.x, coin.y + 5);
        }

        function updatePlayer(player, keys) {
            if (keys.up && !player.isJumping && !player.isSliding) {
                player.vy = JUMP_FORCE;
                player.isJumping = true;
            }
            
            if (keys.down && !player.isJumping) {
                player.isSliding = true;
            } else {
                player.isSliding = false;
            }
            
            player.vy += GRAVITY;
            player.y += player.vy;
            
            const groundY = canvas.height - GROUND_HEIGHT - (player.isSliding ? PLAYER_HEIGHT * 0.6 : PLAYER_HEIGHT);
            if (player.y >= groundY) {
                player.y = groundY;
                player.vy = 0;
                player.isJumping = false;
            }
        }

        function updateObstacles() {
            obstacles.forEach(obs => {
                obs.x -= gameSpeed;
            });
            obstacles = obstacles.filter(obs => obs.x > -50);
            
            if (Math.random() < 0.015) {
                const type = Math.random() > 0.7 ? 'rock' : 'cactus';
                obstacles.push({ x: canvas.width + 50, type });
            }
        }

        function updateCoins() {
            coins.forEach(coin => {
                coin.x -= gameSpeed;
            });
            coins = coins.filter(coin => coin.x > -30);
            
            if (Math.random() < 0.01) {
                coins.push({ x: canvas.width + 30, y: canvas.height - GROUND_HEIGHT - 50 - Math.random() * 80 });
            }
        }

        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x < -cloud.size * 2) {
                    cloud.x = canvas.width + cloud.size;
                }
            });
        }

        function checkCollisions() {
            const p1w = player1.isSliding ? PLAYER_WIDTH * 1.3 : PLAYER_WIDTH;
            const p1h = player1.isSliding ? PLAYER_HEIGHT * 0.6 : PLAYER_HEIGHT;
            
            obstacles.forEach(obs => {
                const obsW = obs.type === 'cactus' ? 30 : 40;
                const obsH = obs.type === 'cactus' ? 40 : 30;
                
                if (player1.x + p1w/2 > obs.x - obsW/2 && 
                    player1.x - p1w/2 < obs.x + obsW/2 &&
                    player1.y < canvas.height - GROUND_HEIGHT &&
                    player1.y + p1h > canvas.height - GROUND_HEIGHT - obsH) {
                    gameWinner = 2;
                    endGame();
                }
                
                if (player2.x + p1w/2 > obs.x - obsW/2 && 
                    player2.x - p1w/2 < obs.x + obsW/2 &&
                    player2.y < canvas.height - GROUND_HEIGHT &&
                    player2.y + p1h > canvas.height - GROUND_HEIGHT - obsH) {
                    gameWinner = 1;
                    endGame();
                }
            });
            
            coins.forEach((coin, ci) => {
                if (Math.abs(player1.x - coin.x) < 30 && Math.abs(player1.y - coin.y) < 30) {
                    coins.splice(ci, 1);
                    player1.score += 50;
                    updateScoreDisplay();
                }
                
                if (Math.abs(player2.x - coin.x) < 30 && Math.abs(player2.y - coin.y) < 30) {
                    coins.splice(ci, 1);
                    player2.score += 50;
                    updateScoreDisplay();
                }
            });
        }

        function updateScoreDisplay() {
            document.getElementById('score1').textContent = player1.score;
            document.getElementById('score2').textContent = player2.score;
        }

        function endGame() {
            isGameRunning = false;
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            const winner = gameWinner === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            winnerText.textContent = `${winner} 获胜!`;
            overlay.classList.remove('hidden');
        }

        const keys1 = { up: false, down: false };
        const keys2 = { up: false, down: false };
        let lastTime = 0;

        function gameLoop(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isGameRunning && !isPaused) {
                drawBackground();
                
                obstacles.forEach(drawObstacle);
                coins.forEach(drawCoin);
                
                drawPlayer(player1, '#4ecdc4');
                drawPlayer(player2, '#ff6b6b');
                
                updatePlayer(player1, keys1);
                updatePlayer(player2, keys2);
                
                updateObstacles();
                updateCoins();
                updateClouds();
                checkCollisions();
                
                if (timestamp - lastTime > 100) {
                    player1.score += 1;
                    player2.score += 1;
                    updateScoreDisplay();
                    lastTime = timestamp;
                }
                
                gameSpeed = GAME_SPEED_INITIAL + Math.floor(player1.score / 500);
                
                document.getElementById('turnIndicator').textContent = `速度: ${gameSpeed} | ${document.getElementById('player1Name').value}: ${player1.score}分 | ${document.getElementById('player2Name').value}: ${player2.score}分`;
            } else if (isPaused) {
                drawBackground();
                obstacles.forEach(drawObstacle);
                coins.forEach(drawCoin);
                drawPlayer(player1, '#4ecdc4');
                drawPlayer(player2, '#ff6b6b');
                
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2);
            }
            
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            gameWinner = null;
            gameSpeed = GAME_SPEED_INITIAL;
            
            player1 = { x: 100, y: canvas.height - GROUND_HEIGHT - PLAYER_HEIGHT, vy: 0, isJumping: false, isSliding: false, score: 0 };
            player2 = { x: 400, y: canvas.height - GROUND_HEIGHT - PLAYER_HEIGHT, vy: 0, isJumping: false, isSliding: false, score: 0 };
            obstacles = [];
            coins = [];
            initClouds();
            
            updateScoreDisplay();
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            document.getElementById('turnIndicator').textContent = '比赛开始!';
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('跑酷对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${player1.score}分`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${player2.score}分`, 450, 150);
            
            ctx.fillStyle = '#4ecdc4';
            ctx.fillRect(80, 200, 80, 100);
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.fillText('P1', 110, 260);
            
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(440, 200, 80, 100);
            ctx.fillStyle = '#fff';
            ctx.fillText('P2', 470, 260);
            
            let result = '';
            if (player1.score > player2.score) {
                result = `${document.getElementById('player1Name').value} 领先!`;
            } else if (player2.score > player1.score) {
                result = `${document.getElementById('player2Name').value} 领先!`;
            } else {
                result = '势均力敌!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(result, canvas.width / 2, 320);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('🎮 couple-mini-game', canvas.width / 2, 370);
            
            const link = document.createElement('a');
            link.download = 'runner_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
                return;
            }
            
            if (isPaused) return;
            
            switch (e.key) {
                case 'ArrowUp': keys1.up = true; break;
                case 'ArrowDown': keys1.down = true; break;
                case 'w':
                case 'W': keys2.up = true; break;
                case 's':
                case 'S': keys2.down = true; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowUp': keys1.up = false; break;
                case 'ArrowDown': keys1.down = false; break;
                case 'w':
                case 'W': keys2.up = false; break;
                case 's':
                case 'S': keys2.down = false; break;
            }
        });

        initClouds();
        gameLoop(0);
    </script>
</body>
</html>
