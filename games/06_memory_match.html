<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .player {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            min-width: 120px;
            transition: all 0.3s ease;
        }

        .player.active {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .player-1 {
            background: rgba(255, 107, 107, 0.3);
            border: 2px solid #ff6b6b;
        }

        .player-1.active {
            background: rgba(255, 107, 107, 0.5);
            border-color: #ffd700;
        }

        .player-2 {
            background: rgba(78, 205, 196, 0.3);
            border: 2px solid #4ecdc4;
        }

        .player-2.active {
            background: rgba(78, 205, 196, 0.5);
            border-color: #ffd700;
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.3rem;
        }

        .game-status {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            min-height: 1.5rem;
        }

        .winner {
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            margin: 0 auto 1.5rem;
            perspective: 1000px;
        }

        .card {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg);
            opacity: 0.7;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .card-front::before {
            content: '?';
            font-size: 2rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
        }

        .card-back {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            transform: rotateY(180deg);
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: scale(1.05);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: linear-gradient(90deg, #666, #444);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 500px) {
            .board {
                grid-template-columns: repeat(4, 60px);
                grid-template-rows: repeat(4, 60px);
                gap: 8px;
            }
            .card-front, .card-back {
                font-size: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .scoreboard {
                gap: 1rem;
            }
            .player {
                padding: 0.5rem 1rem;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
    
    <div class="game-container">
        <h1>🃏 记忆翻牌对战</h1>
        
        <div class="scoreboard">
            <div class="player player-1 active" id="player1">
                <div>🔴 玩家 1</div>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player player-2" id="player2">
                <div>🔵 玩家 2</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="stats">
            <div>已配对: <span id="matchedCount">0</span>/8</div>
            <div>回合: <span id="turnCount">0</span></div>
        </div>

        <div class="game-status" id="gameStatus">玩家 1 的回合 - 点击两张牌</div>

        <div class="board" id="board"></div>

        <div class="button-group">
            <button id="restartBtn">🔄 重新开始</button>
        </div>
    </div>

    <script>
        const emojis = ['🎮', '🎯', '🎨', '🎭', '🎪', '🎢', '🎡', '🎠'];
        const board = document.getElementById('board');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const player1El = document.getElementById('player1');
        const player2El = document.getElementById('player2');
        const gameStatusEl = document.getElementById('gameStatus');
        const matchedCountEl = document.getElementById('matchedCount');
        const turnCountEl = document.getElementById('turnCount');
        const restartBtn = document.getElementById('restartBtn');

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let score1 = 0;
        let score2 = 0;
        let currentPlayer = 1;
        let turnCount = 0;
        let canFlip = true;

        function initGame() {
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            score1 = 0;
            score2 = 0;
            currentPlayer = 1;
            turnCount = 0;
            canFlip = true;

            const cardValues = [...emojis, ...emojis];
            shuffleArray(cardValues);

            board.innerHTML = '';
            cardValues.forEach((value, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.value = value;
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-front"></div>
                    <div class="card-back">${value}</div>
                `;
                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
                cards.push(card);
            });

            updateScore();
            updateStatus();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function flipCard(card) {
            if (!canFlip) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                turnCount++;
                turnCountEl.textContent = turnCount;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.value === card2.dataset.value;

            setTimeout(() => {
                if (match) {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    matchedCountEl.textContent = matchedPairs;

                    if (currentPlayer === 1) {
                        score1++;
                    } else {
                        score2++;
                    }
                    updateScore();

                    if (matchedPairs === 8) {
                        endGame();
                        return;
                    }

                    updateStatus();
                } else {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    updatePlayerHighlight();
                    updateStatus();
                }

                flippedCards = [];
                canFlip = true;
            }, 1000);
        }

        function updateScore() {
            score1El.textContent = score1;
            score2El.textContent = score2;
        }

        function updatePlayerHighlight() {
            player1El.classList.toggle('active', currentPlayer === 1);
            player2El.classList.toggle('active', currentPlayer === 2);
        }

        function updateStatus() {
            gameStatusEl.textContent = `玩家 ${currentPlayer} 的回合 - 点击两张牌`;
        }

        function endGame() {
            let result;
            if (score1 > score2) {
                result = '<span class="winner">🎉 玩家 1 获胜！🎉</span>';
            } else if (score2 > score1) {
                result = '<span class="winner">🎉 玩家 2 获胜！🎉</span>';
            } else {
                result = '<span class="winner">🤝 平局！</span>';
            }
            gameStatusEl.innerHTML = `${result} 玩家1: ${score1} - 玩家2: ${score2}`;
            player1El.classList.remove('active');
            player2El.classList.remove('active');
        }

        restartBtn.addEventListener('click', initGame);
        
        initGame();
    </script>
</body>
</html>
