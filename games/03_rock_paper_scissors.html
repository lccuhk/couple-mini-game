<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石头剪刀布对战</title>
    <style>
        :root {
            --bg-gradient-1: #ffecd2;
            --bg-gradient-2: #fcb69f;
            --bg-gradient-3: #ffd89b;
            --primary-color: #e65100;
            --secondary-color: #f57c00;
            --accent-color: #bf360c;
            --btn-gradient-1: #ff7f50;
            --btn-gradient-2: #ff6347;
            --btn-shadow: rgba(255, 127, 80, 0.4);
            --btn-shadow-hover: rgba(255, 127, 80, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 165, 0, 0.4);
            --card-hover-border: #ff7f50;
            --card-shadow: rgba(255, 127, 80, 0.3);
            --text-primary: #4e342e;
            --text-secondary: #6d4c41;
            --tag-bg-1: #fff3e0;
            --tag-bg-2: #ffe0b2;
            --tag-text: #ef6c00;
            --divider-color: #ffcc80;
            --link-color: #e65100;
            --decoration-1: '🧡';
            --decoration-2: '🍊';
        }

        [data-theme="sakura"] {
            --bg-gradient-1: #ff9a9e;
            --bg-gradient-2: #fecfef;
            --bg-gradient-3: #fecfef;
            --primary-color: #d63384;
            --secondary-color: #c2185b;
            --accent-color: #8b4513;
            --btn-gradient-1: #ff6b9d;
            --btn-gradient-2: #c44569;
            --btn-shadow: rgba(255, 107, 157, 0.4);
            --btn-shadow-hover: rgba(255, 107, 157, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 182, 193, 0.5);
            --card-hover-border: #ff6b9d;
            --card-shadow: rgba(255, 107, 157, 0.3);
            --text-primary: #5a3a3a;
            --text-secondary: #7a5a5a;
            --tag-bg-1: #ffe0e9;
            --tag-bg-2: #ffd1dc;
            --tag-text: #c2185b;
            --divider-color: #ffb6c1;
            --link-color: #d63384;
            --decoration-1: '💕';
            --decoration-2: '💖';
        }

        [data-theme="lavender"] {
            --bg-gradient-1: #a8edea;
            --bg-gradient-2: #fed6e3;
            --bg-gradient-3: #d299c2;
            --primary-color: #7b1fa2;
            --secondary-color: #9c27b0;
            --accent-color: #4a148c;
            --btn-gradient-1: #ba68c8;
            --btn-gradient-2: #9c27b0;
            --btn-shadow: rgba(186, 104, 200, 0.4);
            --btn-shadow-hover: rgba(186, 104, 200, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(186, 104, 200, 0.4);
            --card-hover-border: #ba68c8;
            --card-shadow: rgba(186, 104, 200, 0.3);
            --text-primary: #4a148c;
            --text-secondary: #6a1b9a;
            --tag-bg-1: #f3e5f5;
            --tag-bg-2: #e1bee7;
            --tag-text: #7b1fa2;
            --divider-color: #ce93d8;
            --link-color: #7b1fa2;
            --decoration-1: '💜';
            --decoration-2: '🔮';
        }

        [data-theme="ocean"] {
            --bg-gradient-1: #a1c4fd;
            --bg-gradient-2: #c2e9fb;
            --bg-gradient-3: #89f7fe;
            --primary-color: #1565c0;
            --secondary-color: #1976d2;
            --accent-color: #0d47a1;
            --btn-gradient-1: #42a5f5;
            --btn-gradient-2: #1e88e5;
            --btn-shadow: rgba(66, 165, 245, 0.4);
            --btn-shadow-hover: rgba(66, 165, 245, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(66, 165, 245, 0.4);
            --card-hover-border: #42a5f5;
            --card-shadow: rgba(66, 165, 245, 0.3);
            --text-primary: #0d47a1;
            --text-secondary: #1565c0;
            --tag-bg-1: #e3f2fd;
            --tag-bg-2: #bbdefb;
            --tag-text: #1565c0;
            --divider-color: #90caf9;
            --link-color: #1565c0;
            --decoration-1: '💙';
            --decoration-2: '🌊';
        }

        [data-theme="forest"] {
            --bg-gradient-1: #a8e063;
            --bg-gradient-2: #56ab2f;
            --bg-gradient-3: #a8e063;
            --primary-color: #2e7d32;
            --secondary-color: #388e3c;
            --accent-color: #1b5e20;
            --btn-gradient-1: #66bb6a;
            --btn-gradient-2: #388e3c;
            --btn-shadow: rgba(102, 187, 106, 0.4);
            --btn-shadow-hover: rgba(102, 187, 106, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(102, 187, 106, 0.4);
            --card-hover-border: #66bb6a;
            --card-shadow: rgba(102, 187, 106, 0.3);
            --text-primary: #1b5e20;
            --text-secondary: #2e7d32;
            --tag-bg-1: #e8f5e9;
            --tag-bg-2: #c8e6c9;
            --tag-text: #2e7d32;
            --divider-color: #a5d6a7;
            --link-color: #2e7d32;
            --decoration-1: '💚';
            --decoration-2: '🌿';
        }

        [data-theme="midnight"] {
            --bg-gradient-1: #232526;
            --bg-gradient-2: #414345;
            --bg-gradient-3: #232526;
            --primary-color: #ffd700;
            --secondary-color: #ffc107;
            --accent-color: #ff8f00;
            --btn-gradient-1: #ffd700;
            --btn-gradient-2: #ffc107;
            --btn-shadow: rgba(255, 215, 0, 0.4);
            --btn-shadow-hover: rgba(255, 215, 0, 0.6);
            --card-bg: rgba(50, 50, 50, 0.9);
            --card-border: rgba(255, 215, 0, 0.3);
            --card-hover-border: #ffd700;
            --card-shadow: rgba(255, 215, 0, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --tag-bg-1: #424242;
            --tag-bg-2: #616161;
            --tag-text: #ffd700;
            --divider-color: #ffd700;
            --link-color: #ffd700;
            --decoration-1: '⭐';
            --decoration-2: '🌙';
        }

        [data-mode="dark"] {
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
        }

        [data-mode="dark"][data-theme="orange"] {
            --bg-gradient-1: #1a0f00;
            --bg-gradient-2: #2d1810;
            --bg-gradient-3: #1a0f00;
            --card-bg: rgba(40, 30, 20, 0.9);
        }

        [data-mode="dark"][data-theme="sakura"] {
            --bg-gradient-1: #1a0a10;
            --bg-gradient-2: #2d1020;
            --bg-gradient-3: #1a0a10;
            --card-bg: rgba(40, 20, 30, 0.9);
        }

        [data-mode="dark"][data-theme="lavender"] {
            --bg-gradient-1: #0f0a1a;
            --bg-gradient-2: #1a102d;
            --bg-gradient-3: #0f0a1a;
            --card-bg: rgba(30, 20, 40, 0.9);
        }

        [data-mode="dark"][data-theme="ocean"] {
            --bg-gradient-1: #0a0f1a;
            --bg-gradient-2: #101a2d;
            --bg-gradient-3: #0a0f1a;
            --card-bg: rgba(20, 30, 40, 0.9);
        }

        [data-mode="dark"][data-theme="forest"] {
            --bg-gradient-1: #0a1a0f;
            --bg-gradient-2: #102d1a;
            --bg-gradient-3: #0a1a0f;
            --card-bg: rgba(20, 40, 30, 0.9);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .theme-panel h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-section {
            margin-bottom: 1.2rem;
        }

        .theme-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .color-themes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .color-theme-btn {
            padding: 0.5rem;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        .color-theme-btn:hover {
            transform: scale(1.05);
        }

        .color-theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .color-theme-btn[data-theme="orange"] {
            background: linear-gradient(135deg, #ff7f50, #ff6347);
        }

        .color-theme-btn[data-theme="sakura"] {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .color-theme-btn[data-theme="lavender"] {
            background: linear-gradient(135deg, #ba68c8, #9c27b0);
        }

        .color-theme-btn[data-theme="ocean"] {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .color-theme-btn[data-theme="forest"] {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }

        .color-theme-btn[data-theme="midnight"] {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
        }
        .random-theme-btn {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .random-theme-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .random-theme-btn:active {
            transform: scale(0.98);
        }


        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mode-btn:hover {
            border-color: var(--btn-gradient-1);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border-color: transparent;
        }

        body {
            transition: all 0.5s ease;
        }

        body::before {
            content: var(--decoration-1);
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: var(--decoration-2);
            position: fixed;
            top: 60%;
            right: 5%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        .player {
            padding: 1rem 2rem;
            border-radius: 15px;
            min-width: 150px;
        }

        .player-1 {
            background: rgba(78, 205, 196, 0.3);
            border: 2px solid #4ecdc4;
        }

        .player-2 {
            background: rgba(255, 107, 107, 0.3);
            border: 2px solid #ff6b6b;
        }

        .score {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .battle-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            margin: 2rem 0;
        }

        .player-choice {
            text-align: center;
        }

        .choice-display {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin: 0.5rem auto;
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .choice-display.winner {
            animation: winnerPulse 0.5s ease infinite alternate;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            border-color: #ffd700;
        }

        @keyframes winnerPulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .choice-display.shake {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-20deg); }
            75% { transform: rotate(20deg); }
        }

        .vs-text {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .result {
            font-size: 1.8rem;
            min-height: 3rem;
            margin: 1rem 0;
            font-weight: bold;
        }

        .result.win {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .choice-btn {
            width: 80px;
            height: 80px;
            font-size: 2.5rem;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: 3px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .choice-btn:hover:not(:disabled) {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .choice-btn.selected {
            background: rgba(78, 205, 196, 0.5);
            border-color: #4ecdc4;
        }

        .player-section {
            margin: 1rem 0;
        }

        .player-label {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            background: linear-gradient(90deg, #4ecdc4, #ff6b6b);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: linear-gradient(90deg, #666, #444);
        }

        .round-info {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #ff7f50, #ff6347);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 127, 80, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 127, 80, 0.6);
        }



        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            .battle-area {
                gap: 1rem;
            }
            .choice-display {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }
            .scoreboard {
                gap: 1rem;
            }
            .player {
                padding: 0.6rem 1.2rem;
                min-width: 100px;
            }
        }
    </style>
</head>
<body data-theme="orange" data-mode="light">
    <div class="theme-toggle">
        <button class="theme-btn" id="themeBtn" title="切换主题">🎨</button>
    </div>

    <div class="theme-panel" id="themePanel">
        <h3>🎨 主题设置</h3>
        
        <div class="theme-section">
            <div class="theme-section-title">选择颜色</div>
            <div class="color-themes">
                <button class="color-theme-btn" data-theme="orange">🍊 橘色</button>
                <button class="color-theme-btn" data-theme="sakura">🌸 粉色</button>
                <button class="color-theme-btn" data-theme="lavender">💜 紫色</button>
                <button class="color-theme-btn" data-theme="ocean">💙 蓝色</button>
                <button class="color-theme-btn" data-theme="forest">💚 绿色</button>
                <button class="color-theme-btn" data-theme="midnight">🌙 暗夜</button>
            </div>
        </div>
        
        <div class="theme-section">
            <div class="theme-section-title">显示模式</div>
            <div class="mode-toggle">
                <button class="mode-btn" data-mode="light">☀️ 浅色</button>
                <button class="mode-btn" data-mode="dark">🌙 深色</button>
            </div>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
    
    <div class="game-container">
        <h1>🪨📄✂️ 石头剪刀布</h1>
        
        <div class="round-info" id="roundInfo">第 1 轮 - 玩家 1 选择</div>

        <div class="scoreboard">
            <div class="player player-1">
                <div>👤 玩家 1</div>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player player-2">
                <div>👤 玩家 2</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="battle-area">
            <div class="player-choice">
                <div>玩家 1</div>
                <div class="choice-display" id="choice1">❓</div>
            </div>
            <div class="vs-text">VS</div>
            <div class="player-choice">
                <div>玩家 2</div>
                <div class="choice-display" id="choice2">❓</div>
            </div>
        </div>

        <div class="result" id="result">请玩家 1 选择</div>

        <div class="player-section" id="player1Section">
            <div class="player-label">🎮 玩家 1 选择（按 1/2/3 或点击）</div>
            <div class="choices">
                <button class="choice-btn" data-choice="rock" data-player="1">🪨</button>
                <button class="choice-btn" data-choice="paper" data-player="1">📄</button>
                <button class="choice-btn" data-choice="scissors" data-player="1">✂️</button>
            </div>
        </div>

        <div class="player-section hidden" id="player2Section">
            <div class="player-label">🎮 玩家 2 选择（按 1/2/3 或点击）</div>
            <div class="choices">
                <button class="choice-btn" data-choice="rock" data-player="2">🪨</button>
                <button class="choice-btn" data-choice="paper" data-player="2">📄</button>
                <button class="choice-btn" data-choice="scissors" data-player="2">✂️</button>
            </div>
        </div>

        <div class="button-group">
            <button id="nextRoundBtn" class="hidden">➡️ 下一轮</button>
            <button id="resetBtn" class="secondary">🔄 重新开始</button>
        </div>
    </div>

    <script>
        const choiceEmoji = { rock: '🪨', paper: '📄', scissors: '✂️' };
        const choiceNames = { rock: '石头', paper: '布', scissors: '剪刀' };

        const choice1El = document.getElementById('choice1');
        const choice2El = document.getElementById('choice2');
        const resultEl = document.getElementById('result');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const roundInfoEl = document.getElementById('roundInfo');
        const player1Section = document.getElementById('player1Section');
        const player2Section = document.getElementById('player2Section');
        const nextRoundBtn = document.getElementById('nextRoundBtn');
        const resetBtn = document.getElementById('resetBtn');
        const choiceBtns = document.querySelectorAll('.choice-btn');

        let score1 = 0;
        let score2 = 0;
        let round = 1;
        let player1Choice = null;
        let player2Choice = null;
        let currentPlayer = 1;
        let roundComplete = false;

        function handleChoice(choice, player) {
            if (roundComplete) return;
            if (player !== currentPlayer) return;

            if (player === 1) {
                player1Choice = choice;
                choice1El.textContent = '✅';
                choice1El.classList.add('shake');
                setTimeout(() => choice1El.classList.remove('shake'), 500);
                
                currentPlayer = 2;
                player1Section.classList.add('hidden');
                player2Section.classList.remove('hidden');
                roundInfoEl.textContent = `第 ${round} 轮 - 玩家 2 选择`;
                resultEl.textContent = '请玩家 2 选择';
                
                choiceBtns.forEach(btn => {
                    if (btn.dataset.player === '1') {
                        btn.classList.remove('selected');
                    }
                });
            } else {
                player2Choice = choice;
                choice2El.textContent = '✅';
                choice2El.classList.add('shake');
                setTimeout(() => choice2El.classList.remove('shake'), 500);
                
                player2Section.classList.add('hidden');
                determineWinner();
            }

            choiceBtns.forEach(btn => {
                if (btn.dataset.player === player && btn.dataset.choice === choice) {
                    btn.classList.add('selected');
                }
            });
        }

        function determineWinner() {
            roundComplete = true;
            
            choice1El.textContent = choiceEmoji[player1Choice];
            choice2El.textContent = choiceEmoji[player2Choice];

            let result;
            if (player1Choice === player2Choice) {
                result = '🤝 平局！';
                resultEl.className = 'result';
            } else if (
                (player1Choice === 'rock' && player2Choice === 'scissors') ||
                (player1Choice === 'paper' && player2Choice === 'rock') ||
                (player1Choice === 'scissors' && player2Choice === 'paper')
            ) {
                score1++;
                score1El.textContent = score1;
                result = '🎉 玩家 1 获胜！';
                resultEl.className = 'result win';
                choice1El.classList.add('winner');
            } else {
                score2++;
                score2El.textContent = score2;
                result = '🎉 玩家 2 获胜！';
                resultEl.className = 'result win';
                choice2El.classList.add('winner');
            }

            resultEl.textContent = `${choiceNames[player1Choice]} vs ${choiceNames[player2Choice]} - ${result}`;
            nextRoundBtn.classList.remove('hidden');
        }

        function nextRound() {
            round++;
            player1Choice = null;
            player2Choice = null;
            currentPlayer = 1;
            roundComplete = false;

            choice1El.textContent = '❓';
            choice2El.textContent = '❓';
            choice1El.classList.remove('winner');
            choice2El.classList.remove('winner');
            resultEl.textContent = '请玩家 1 选择';
            resultEl.className = 'result';
            roundInfoEl.textContent = `第 ${round} 轮 - 玩家 1 选择`;
            
            player1Section.classList.remove('hidden');
            player2Section.classList.add('hidden');
            nextRoundBtn.classList.add('hidden');
            
            choiceBtns.forEach(btn => btn.classList.remove('selected'));
        }

        function resetGame() {
            score1 = 0;
            score2 = 0;
            round = 1;
            player1Choice = null;
            player2Choice = null;
            currentPlayer = 1;
            roundComplete = false;

            score1El.textContent = score1;
            score2El.textContent = score2;
            choice1El.textContent = '❓';
            choice2El.textContent = '❓';
            choice1El.classList.remove('winner');
            choice2El.classList.remove('winner');
            resultEl.textContent = '请玩家 1 选择';
            resultEl.className = 'result';
            roundInfoEl.textContent = '第 1 轮 - 玩家 1 选择';
            
            player1Section.classList.remove('hidden');
            player2Section.classList.add('hidden');
            nextRoundBtn.classList.add('hidden');
            
            choiceBtns.forEach(btn => btn.classList.remove('selected'));
        }

        choiceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                handleChoice(btn.dataset.choice, parseInt(btn.dataset.player));
            });
        });

        document.addEventListener('keydown', (e) => {
            if (roundComplete) return;
            
            if (e.key === '1') handleChoice('rock', currentPlayer);
            else if (e.key === '2') handleChoice('paper', currentPlayer);
            else if (e.key === '3') handleChoice('scissors', currentPlayer);
        });

        nextRoundBtn.addEventListener('click', nextRound);
        resetBtn.addEventListener('click', resetGame);
    </script>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeBtn');
            const themePanel = document.getElementById('themePanel');
            const randomThemeBtn = document.getElementById('randomThemeBtn');

            const colorThemeBtns = document.querySelectorAll('.color-theme-btn');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const body = document.body;

            const savedTheme = localStorage.getItem('couple-game-theme') || 'orange';
            const savedMode = localStorage.getItem('couple-game-mode') || 'light';

            function applyTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
                
                colorThemeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                localStorage.setItem('couple-game-theme', theme);
                localStorage.setItem('couple-game-mode', mode);
            }

            applyTheme(savedTheme, savedMode);

            themeBtn.addEventListener('click', () => {
                themePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
                    themePanel.classList.remove('active');
                }
            });

            colorThemeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    applyTheme(theme, mode);
                });
            });

            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    applyTheme(theme, mode);
                });
            });
            randomThemeBtn.addEventListener('click', () => {
                const themes = ['orange', 'sakura', 'lavender', 'ocean', 'forest', 'midnight'];
                const currentTheme = body.getAttribute('data-theme');
                const currentMode = body.getAttribute('data-mode');
                
                let availableThemes = themes.filter(t => t !== currentTheme);
                const randomTheme = availableThemes[Math.floor(Math.random() * availableThemes.length)];
                
                randomThemeBtn.style.transform = 'rotate(360deg)';
                setTimeout(() => {
                    randomThemeBtn.style.transform = '';
                }, 300);
                
                applyTheme(randomTheme, currentMode);
            });

        })();
    </script>
</body>
</html>
