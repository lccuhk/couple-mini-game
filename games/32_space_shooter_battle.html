<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞行射击对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .hp-bar {
            width: 100%;
            height: 15px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #00cec9);
            transition: width 0.3s;
        }

        .game-area {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-board {
            border: 3px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">🚀 飞行射击对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
            <div class="hp-bar"><div class="hp-fill" id="hp1"></div></div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="600" height="500"></canvas>
            <div class="turn-indicator" id="turnIndicator">准备开始</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
            <div class="hp-bar"><div class="hp-fill" id="hp2"></div></div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 玩家1: ← → 移动 | ↑ 加速 | 空格 射击</p>
        <p>🎯 玩家2: A D 移动 | W 加速 | Enter 射击</p>
        <p>💥 击毁敌机获得分数，被击中会损失生命值</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const PLAYER_WIDTH = 50;
        const PLAYER_HEIGHT = 60;
        const BULLET_SIZE = 8;
        const BULLET_SPEED = 10;
        const ENEMY_SIZE = 40;
        const ENEMY_SPEED = 2;
        const MAX_HP = 100;

        let player1 = { x: 100, y: 400, hp: MAX_HP, score: 0 };
        let player2 = { x: 500, y: 400, hp: MAX_HP, score: 0 };
        
        let isGameRunning = false;
        let isPaused = false;
        let gameWinner = null;

        let bullets1 = [];
        let bullets2 = [];
        let enemies = [];
        let stars = [];

        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }

        function drawStarBackground() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.random() * 0.5})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        function drawPlayer(x, y, color) {
            ctx.save();
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y - PLAYER_HEIGHT/2);
            ctx.lineTo(x - PLAYER_WIDTH/2, y + PLAYER_HEIGHT/2);
            ctx.lineTo(x, y + PLAYER_HEIGHT/3);
            ctx.lineTo(x + PLAYER_WIDTH/2, y + PLAYER_HEIGHT/2);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x - 10, y - 10, 5, 0, Math.PI * 2);
            ctx.arc(x + 10, y - 10, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawBullet(bullet) {
            ctx.fillStyle = bullet.color;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, BULLET_SIZE, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, BULLET_SIZE/2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawEnemy(enemy) {
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(enemy.x, enemy.y + ENEMY_SIZE/2);
            ctx.lineTo(enemy.x - ENEMY_SIZE/2, enemy.y - ENEMY_SIZE/2);
            ctx.lineTo(enemy.x, enemy.y - ENEMY_SIZE/4);
            ctx.lineTo(enemy.x + ENEMY_SIZE/2, enemy.y - ENEMY_SIZE/2);
            ctx.closePath();
            ctx.fill();
        }

        function updateBullets() {
            bullets1 = bullets1.filter(bullet => {
                bullet.y -= BULLET_SPEED;
                return bullet.y > -BULLET_SIZE;
            });
            
            bullets2 = bullets2.filter(bullet => {
                bullet.y -= BULLET_SPEED;
                return bullet.y > -BULLET_SIZE;
            });
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                enemy.y += ENEMY_SPEED;
                enemy.x += Math.sin(enemy.y * 0.02) * 2;
            });
            enemies = enemies.filter(enemy => enemy.y < canvas.height + ENEMY_SIZE);
        }

        function spawnEnemy() {
            if (Math.random() < 0.02) {
                enemies.push({
                    x: Math.random() * (canvas.width - ENEMY_SIZE) + ENEMY_SIZE/2,
                    y: -ENEMY_SIZE,
                    health: 2
                });
            }
        }

        function checkCollisions() {
            bullets1.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    if (Math.sqrt(dx * dx + dy * dy) < ENEMY_SIZE/2) {
                        bullets1.splice(bi, 1);
                        enemy.health--;
                        if (enemy.health <= 0) {
                            enemies.splice(ei, 1);
                            player1.score += 100;
                            updateScoreDisplay();
                        }
                    }
                });
                
                const dx = bullet.x - player2.x;
                const dy = bullet.y - player2.y;
                if (Math.sqrt(dx * dx + dy * dy) < PLAYER_WIDTH/2) {
                    bullets1.splice(bi, 1);
                    player2.hp -= 10;
                    updateHPDisplay();
                    checkGameOver();
                }
            });

            bullets2.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    if (Math.sqrt(dx * dx + dy * dy) < ENEMY_SIZE/2) {
                        bullets2.splice(bi, 1);
                        enemy.health--;
                        if (enemy.health <= 0) {
                            enemies.splice(ei, 1);
                            player2.score += 100;
                            updateScoreDisplay();
                        }
                    }
                });
                
                const dx = bullet.x - player1.x;
                const dy = bullet.y - player1.y;
                if (Math.sqrt(dx * dx + dy * dy) < PLAYER_WIDTH/2) {
                    bullets2.splice(bi, 1);
                    player1.hp -= 10;
                    updateHPDisplay();
                    checkGameOver();
                }
            });

            enemies.forEach((enemy, ei) => {
                const dx1 = enemy.x - player1.x;
                const dy1 = enemy.y - player1.y;
                if (Math.sqrt(dx1 * dx1 + dy1 * dy1) < (ENEMY_SIZE + PLAYER_WIDTH)/2) {
                    enemies.splice(ei, 1);
                    player1.hp -= 20;
                    updateHPDisplay();
                    checkGameOver();
                }
                
                const dx2 = enemy.x - player2.x;
                const dy2 = enemy.y - player2.y;
                if (Math.sqrt(dx2 * dx2 + dy2 * dy2) < (ENEMY_SIZE + PLAYER_WIDTH)/2) {
                    enemies.splice(ei, 1);
                    player2.hp -= 20;
                    updateHPDisplay();
                    checkGameOver();
                }
            });
        }

        function updateScoreDisplay() {
            document.getElementById('score1').textContent = player1.score;
            document.getElementById('score2').textContent = player2.score;
        }

        function updateHPDisplay() {
            document.getElementById('hp1').style.width = `${(player1.hp / MAX_HP) * 100}%`;
            document.getElementById('hp2').style.width = `${(player2.hp / MAX_HP) * 100}%`;
            
            if (player1.hp <= 30) document.getElementById('hp1').style.background = 'linear-gradient(90deg, #ff6b6b, #fd79a8)';
            else document.getElementById('hp1').style.background = 'linear-gradient(90deg, #00b894, #00cec9)';
            
            if (player2.hp <= 30) document.getElementById('hp2').style.background = 'linear-gradient(90deg, #ff6b6b, #fd79a8)';
            else document.getElementById('hp2').style.background = 'linear-gradient(90deg, #00b894, #00cec9)';
        }

        function checkGameOver() {
            if (player1.hp <= 0) {
                gameWinner = 2;
                endGame();
            } else if (player2.hp <= 0) {
                gameWinner = 1;
                endGame();
            }
        }

        function endGame() {
            isGameRunning = false;
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            const winner = gameWinner === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            winnerText.textContent = `${winner} 获胜!`;
            overlay.classList.remove('hidden');
        }

        const keys1 = { left: false, right: false, up: false, shoot: false };
        const keys2 = { left: false, right: false, up: false, shoot: false };
        let shootCooldown1 = 0;
        let shootCooldown2 = 0;

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isGameRunning && !isPaused) {
                drawStarBackground();
                
                drawPlayer(player1.x, player1.y, '#4ecdc4');
                drawPlayer(player2.x, player2.y, '#ff6b6b');
                
                bullets1.forEach(drawBullet);
                bullets2.forEach(drawBullet);
                enemies.forEach(drawEnemy);
                
                if (keys1.left) player1.x = Math.max(PLAYER_WIDTH/2, player1.x - 5);
                if (keys1.right) player1.x = Math.min(canvas.width - PLAYER_WIDTH/2, player1.x + 5);
                if (keys1.up) player1.y = Math.max(PLAYER_HEIGHT/2, player1.y - 5);
                if (!keys1.up) player1.y = Math.min(canvas.height - PLAYER_HEIGHT/2, player1.y + 2);
                
                if (keys2.left) player2.x = Math.max(PLAYER_WIDTH/2, player2.x - 5);
                if (keys2.right) player2.x = Math.min(canvas.width - PLAYER_WIDTH/2, player2.x + 5);
                if (keys2.up) player2.y = Math.max(PLAYER_HEIGHT/2, player2.y - 5);
                if (!keys2.up) player2.y = Math.min(canvas.height - PLAYER_HEIGHT/2, player2.y + 2);
                
                shootCooldown1--;
                if (keys1.shoot && shootCooldown1 <= 0) {
                    bullets1.push({ x: player1.x, y: player1.y - PLAYER_HEIGHT/2, color: '#4ecdc4' });
                    shootCooldown1 = 15;
                }
                
                shootCooldown2--;
                if (keys2.shoot && shootCooldown2 <= 0) {
                    bullets2.push({ x: player2.x, y: player2.y - PLAYER_HEIGHT/2, color: '#ff6b6b' });
                    shootCooldown2 = 15;
                }
                
                updateBullets();
                updateEnemies();
                spawnEnemy();
                checkCollisions();
            } else if (isPaused) {
                drawStarBackground();
                drawPlayer(player1.x, player1.y, '#4ecdc4');
                drawPlayer(player2.x, player2.y, '#ff6b6b');
                bullets1.forEach(drawBullet);
                bullets2.forEach(drawBullet);
                enemies.forEach(drawEnemy);
                
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2);
            }
            
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            gameWinner = null;
            
            player1 = { x: 100, y: 400, hp: MAX_HP, score: 0 };
            player2 = { x: 500, y: 400, hp: MAX_HP, score: 0 };
            bullets1 = [];
            bullets2 = [];
            enemies = [];
            
            updateScoreDisplay();
            updateHPDisplay();
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            document.getElementById('turnIndicator').textContent = '战斗开始';
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('飞行射击对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${player1.score}分`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${player2.score}分`, 450, 150);
            
            ctx.fillStyle = '#4ecdc4';
            ctx.fillRect(100, 200, 100, 20);
            ctx.fillStyle = '#fff';
            ctx.fillRect(100, 200, player1.hp, 20);
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.fillText(`HP: ${player1.hp}`, 125, 240);
            
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(400, 200, 100, 20);
            ctx.fillStyle = '#fff';
            ctx.fillRect(400, 200, player2.hp, 20);
            ctx.fillStyle = '#fff';
            ctx.fillText(`HP: ${player2.hp}`, 425, 240);
            
            let result = '';
            if (player1.score > player2.score) {
                result = `${document.getElementById('player1Name').value} 领先!`;
            } else if (player2.score > player1.score) {
                result = `${document.getElementById('player2Name').value} 领先!`;
            } else {
                result = '势均力敌!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(result, canvas.width / 2, 320);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('🎮 couple-mini-game', canvas.width / 2, 370);
            
            const link = document.createElement('a');
            link.download = 'space_shooter_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
                return;
            }
            
            if (isPaused) return;
            
            switch (e.key) {
                case 'ArrowLeft': keys1.left = true; break;
                case 'ArrowRight': keys1.right = true; break;
                case 'ArrowUp': keys1.up = true; break;
                case ' ': keys1.shoot = true; e.preventDefault(); break;
                case 'a':
                case 'A': keys2.left = true; break;
                case 'd':
                case 'D': keys2.right = true; break;
                case 'w':
                case 'W': keys2.up = true; break;
                case 'Enter': keys2.shoot = true; e.preventDefault(); break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowLeft': keys1.left = false; break;
                case 'ArrowRight': keys1.right = false; break;
                case 'ArrowUp': keys1.up = false; break;
                case ' ': keys1.shoot = false; break;
                case 'a':
                case 'A': keys2.left = false; break;
                case 'd':
                case 'D': keys2.right = false; break;
                case 'w':
                case 'W': keys2.up = false; break;
                case 'Enter': keys2.shoot = false; break;
            }
        });

        initStars();
        gameLoop();
    </script>
</body>
</html>
