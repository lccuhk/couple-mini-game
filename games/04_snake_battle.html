        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .theme-panel h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

            margin-bottom: 1.2rem;
        }

        .theme-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .color-themes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .color-theme-btn {
            padding: 0.5rem;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        .color-theme-btn:hover {
            transform: scale(1.05);
        }

        .color-theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .color-theme-btn[data-theme="orange"] {
            background: linear-gradient(135deg, #ff7f50, #ff6347);
        }

        .color-theme-btn[data-theme="sakura"] {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .color-theme-btn[data-theme="lavender"] {
            background: linear-gradient(135deg, #ba68c8, #9c27b0);
        }

        .color-theme-btn[data-theme="ocean"] {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .color-theme-btn[data-theme="forest"] {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }

        .color-theme-btn[data-theme="midnight"] {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;

        .mode-btn:hover {

        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border-color: transparent;
        }

        body {
            transition: all 0.5s ease;
        }

        body::before {
            content: var(--decoration-1);
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: var(--decoration-2);
            position: fixed;
            top: 60%;
            right: 5%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 2rem;

        }

        .player {

            min-width: 120px;

        .player-1 {

        }

        .player-2 {
            background: rgba(78, 205, 196, 0.3);
            border: 2px solid #4ecdc4;
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.3rem;
        }

        .game-status {
            margin-bottom: 1rem;

        .winner {
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
            background: #1a1a2e;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .control-info h3 {
            margin-bottom: 0.5rem;

        .key {
            display: inline-block;

            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            margin: 0.2rem;
            font-family: monospace;
            border: 1px solid #555;

        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {

            border-radius: 25px;
            color: white;

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        button:active {

        }

        button.secondary {
            background: linear-gradient(90deg, #666, #444);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;

        @media (max-width: 600px) {

            h1 {

            }
            .controls {

            }
            .control-info {

<body data-theme="orange" data-mode="light">
    <div class="theme-toggle">
        <button class="theme-btn" id="themeBtn" title="切换主题">🎨</button>
    </div>

    <div class="theme-panel" id="themePanel">
        <h3>🎨 主题设置</h3>
        
        <div class="theme-section">
            <div class="theme-section-title">选择颜色</div>
            <div class="color-themes">
                <button class="color-theme-btn" data-theme="orange">🍊 橘色</button>
                <button class="color-theme-btn" data-theme="sakura">🌸 粉色</button>
                <button class="color-theme-btn" data-theme="lavender">💜 紫色</button>
                <button class="color-theme-btn" data-theme="ocean">💙 蓝色</button>
                <button class="color-theme-btn" data-theme="forest">💚 绿色</button>
                <button class="color-theme-btn" data-theme="midnight">🌙 暗夜</button>
            </div>
        </div>
        
        <div class="theme-section">
            <div class="theme-section-title">显示模式</div>
            <div class="mode-toggle">
                <button class="mode-btn" data-mode="light">☀️ 浅色</button>
                <button class="mode-btn" data-mode="dark">🌙 深色</button>
            </div>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
    
    <div class="game-container">
        <h1>🐍 贪吃蛇对战</h1>
        
        <div class="scoreboard">
            <div class="player player-1">
                <div>🔴 玩家 1</div>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player player-2">
                <div>🔵 玩家 2</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="game-status" id="gameStatus">按 空格键 开始游戏</div>

        <canvas id="gameCanvas" width="400" height="400" tabindex="0"></canvas>

        <div class="controls">
            <div class="control-info">
                <h3>🎮 玩家 1 控制</h3>
                <span class="key">W</span> 上<br>
                <span class="key">S</span> 下<br>
                <span class="key">A</span> 左<br>
                <span class="key">D</span> 右
            </div>
            <div class="control-info">
                <h3>🎮 玩家 2 控制</h3>
                <span class="key">↑</span> 上<br>
                <span class="key">↓</span> 下<br>
                <span class="key">←</span> 左<br>
                <span class="key">→</span> 右
            </div>
        </div>

        <div class="button-group">
            <button id="restartBtn">🔄 重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const gameStatusEl = document.getElementById('gameStatus');
        const restartBtn = document.getElementById('restartBtn');

        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        const GAME_SPEED = 150;

        let gameRunning = false;
        let gameLoop = null;

        let snake1, snake2, food;
        let score1, score2;
        let dir1, dir2;
        let nextDir1, nextDir2;

        function initGame() {
            snake1 = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            snake2 = [
                { x: 15, y: 10 },
                { x: 16, y: 10 },
                { x: 17, y: 10 }
            ];
            
            dir1 = { x: 1, y: 0 };
            dir2 = { x: -1, y: 0 };
            nextDir1 = { x: 1, y: 0 };
            nextDir2 = { x: -1, y: 0 };
            
            score1 = 0;
            score2 = 0;
            updateScore();
            
            spawnFood();
            draw();
        }

        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * TILE_COUNT),
                    y: Math.floor(Math.random() * TILE_COUNT)
                };
            } while (
                snake1.some(s => s.x === newFood.x && s.y === newFood.y) ||
                snake2.some(s => s.x === newFood.x && s.y === newFood.y)
            );
            food = newFood;
        }

        function updateScore() {
            score1El.textContent = score1;
            score2El.textContent = score2;
        }

        function moveSnake(snake, dir) {
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
            snake.unshift(head);
            return head;
        }

        function checkCollision(head, snake, otherSnake) {
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                return true;
            }
            
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            for (let i = 0; i < otherSnake.length; i++) {
                if (head.x === otherSnake[i].x && head.y === otherSnake[i].y) {
                    return true;
                }
            }
            
            return false;
        }

        function update() {
            dir1 = nextDir1;
            dir2 = nextDir2;
            
            const head1 = moveSnake(snake1, dir1);
            const head2 = moveSnake(snake2, dir2);
            
            const collision1 = checkCollision(head1, snake1, snake2);
            const collision2 = checkCollision(head2, snake2, snake1);
            
            const headCollision = head1.x === head2.x && head1.y === head2.y;
            
            if (headCollision) {
                endGame('draw');
                return;
            }
            
            if (collision1 && collision2) {
                endGame('draw');
                return;
            } else if (collision1) {
                endGame(2);
                return;
            } else if (collision2) {
                endGame(1);
                return;
            }
            
            let ate1 = false, ate2 = false;
            
            if (head1.x === food.x && head1.y === food.y) {
                score1++;
                ate1 = true;
            } else {
                snake1.pop();
            }
            
            if (head2.x === food.x && head2.y === food.y) {
                score2++;
                ate2 = true;
            } else {
                snake2.pop();
            }
            
            if (ate1 || ate2) {
                updateScore();
                spawnFood();
            }
            
            draw();
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffd700';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
            
            snake1.forEach((segment, index) => {
                const alpha = 1 - (index / snake1.length) * 0.5;
                ctx.fillStyle = `rgba(255, 107, 107, ${alpha})`;
                ctx.shadowBlur = index === 0 ? 15 : 5;
                ctx.shadowColor = '#ff6b6b';
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
            });
            
            snake2.forEach((segment, index) => {
                const alpha = 1 - (index / snake2.length) * 0.5;
                ctx.fillStyle = `rgba(78, 205, 196, ${alpha})`;
                ctx.shadowBlur = index === 0 ? 15 : 5;
                ctx.shadowColor = '#4ecdc4';
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
            });
            
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = 'white';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('👀', snake1[0].x * GRID_SIZE + GRID_SIZE / 2, snake1[0].y * GRID_SIZE + GRID_SIZE / 2 + 3);
            ctx.fillText('👀', snake2[0].x * GRID_SIZE + GRID_SIZE / 2, snake2[0].y * GRID_SIZE + GRID_SIZE / 2 + 3);
        }

        function endGame(winner) {
            gameRunning = false;
            clearInterval(gameLoop);
            
            if (winner === 'draw') {
                gameStatusEl.textContent = '🤝 平局！双方同时死亡';
            } else {
                gameStatusEl.innerHTML = `<span class="winner">🎉 玩家 ${winner} 获胜！🎉</span>`;
            }
        }

        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            gameStatusEl.textContent = '游戏进行中...';
            
            gameLoop = setInterval(update, GAME_SPEED);
        }

        function resetGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            initGame();
            gameStatusEl.textContent = '按 空格键 开始游戏';
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(key)) {
                e.preventDefault();
            }
            
            if (key === ' ') {
                canvas.focus();
                if (!gameRunning) {
                    startGame();
                }
                return;
            }
            
            if (!gameRunning) return;
            
            switch (key) {
                case 'w':
                    if (dir1.y !== 1) nextDir1 = { x: 0, y: -1 };
                    break;
                case 's':
                    if (dir1.y !== -1) nextDir1 = { x: 0, y: 1 };
                    break;
                case 'a':
                    if (dir1.x !== 1) nextDir1 = { x: -1, y: 0 };
                    break;
                case 'd':
                    if (dir1.x !== -1) nextDir1 = { x: 1, y: 0 };
                    break;
                case 'arrowup':
                    if (dir2.y !== 1) nextDir2 = { x: 0, y: -1 };
                    break;
                case 'arrowdown':
                    if (dir2.y !== -1) nextDir2 = { x: 0, y: 1 };
                    break;
                case 'arrowleft':
                    if (dir2.x !== 1) nextDir2 = { x: -1, y: 0 };
                    break;
                case 'arrowright':
                    if (dir2.x !== -1) nextDir2 = { x: 1, y: 0 };
                    break;
            }
        });

        canvas.addEventListener('click', () => canvas.focus());
        restartBtn.addEventListener('click', resetGame);
        
        initGame();
    </script>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeBtn');
            const themePanel = document.getElementById('themePanel');
            const colorThemeBtns = document.querySelectorAll('.color-theme-btn');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const body = document.body;

            const savedTheme = localStorage.getItem('couple-game-theme') || 'orange';
            const savedMode = localStorage.getItem('couple-game-mode') || 'light';

            function applyTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
                
                colorThemeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                localStorage.setItem('couple-game-theme', theme);
                localStorage.setItem('couple-game-mode', mode);
            }

            applyTheme(savedTheme, savedMode);

            themeBtn.addEventListener('click', () => {
                themePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
                    themePanel.classList.remove('active');
                }
            });

            colorThemeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    applyTheme(theme, mode);
                });
            });

            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    applyTheme(theme, mode);
                });
            });
        })();
    </script>
</body>
</html>
