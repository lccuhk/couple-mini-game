<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消消乐对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .game-area {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            background: var(--border-color);
            padding: 8px;
            border-radius: 10px;
        }

        .cell {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .cell:hover {
            transform: scale(1.1);
        }

        .cell.selected {
            transform: scale(1.15);
            box-shadow: 0 0 15px var(--primary-color);
        }

        .cell.matching {
            animation: pulse 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .timer {
            text-align: center;
            margin-top: 10px;
            font-size: 24px;
            color: var(--secondary-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .combo-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
            animation: floatUp 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">🎮 消消乐对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
        </div>

        <div class="game-area">
            <div class="game-board" id="gameBoard"></div>
            <div class="turn-indicator" id="turnIndicator">玩家1 回合</div>
            <div class="timer">⏱️ 时间: <span id="timeLeft">60</span>s</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 点击两个相邻的图标进行交换</p>
        <p>⭐ 3个或更多相同图标连成一线即可消除得分</p>
        <p>🔥 连续消除获得连击加分!</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const CELL_SIZE = 8;
        const icons = ['🔴', '🔵', '🟢', '🟡', '🟣', '🟠'];
        const colors = ['#ff6b6b', '#74b9ff', '#00b894', '#ffeaa7', '#a29bfe', '#fdcb6e'];
        
        let board = [];
        let selectedCell = null;
        let currentPlayer = 1;
        let scores = [0, 0];
        let isGameRunning = false;
        let isPaused = false;
        let timeLeft = 60;
        let timer = null;
        let combo = 0;

        function initBoard() {
            board = [];
            for (let row = 0; row < CELL_SIZE; row++) {
                board[row] = [];
                for (let col = 0; col < CELL_SIZE; col++) {
                    let iconIndex;
                    do {
                        iconIndex = Math.floor(Math.random() * icons.length);
                    } while (wouldMatch(row, col, iconIndex));
                    board[row][col] = iconIndex;
                }
            }
            renderBoard();
        }

        function wouldMatch(row, col, iconIndex) {
            let count = 0;
            
            for (let c = col - 1; c >= 0 && board[row][c] === iconIndex; c--) count++;
            for (let c = col + 1; c < CELL_SIZE && board[row][c] === iconIndex; c++) count++;
            if (count >= 2) return true;
            
            count = 0;
            for (let r = row - 1; r >= 0 && board[r][col] === iconIndex; r--) count++;
            for (let r = row + 1; r < CELL_SIZE && board[r][col] === iconIndex; r++) count++;
            return count >= 2;
        }

        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            for (let row = 0; row < CELL_SIZE; row++) {
                for (let col = 0; col < CELL_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.textContent = icons[board[row][col]];
                    cell.style.background = colors[board[row][col]];
                    
                    cell.addEventListener('click', () => handleCellClick(row, col));
                    gameBoard.appendChild(cell);
                }
            }
        }

        function handleCellClick(row, col) {
            if (!isGameRunning || isPaused) return;
            
            if (!selectedCell) {
                selectedCell = { row, col };
                document.querySelector(`[data-row="${row}"][data-col="${col}"]`).classList.add('selected');
            } else {
                const prevRow = selectedCell.row;
                const prevCol = selectedCell.col;
                document.querySelector(`[data-row="${prevRow}"][data-col="${prevCol}"]`).classList.remove('selected');
                
                if (isAdjacent(prevRow, prevCol, row, col)) {
                    swapCells(prevRow, prevCol, row, col);
                    
                    setTimeout(() => {
                        const matches = findMatches();
                        if (matches.length > 0) {
                            combo++;
                            removeMatches(matches);
                            scores[currentPlayer - 1] += matches.length * 10 * combo;
                            updateScoreDisplay();
                            
                            setTimeout(() => {
                                dropCells();
                                fillEmptyCells();
                                checkCascade();
                            }, 300);
                        } else {
                            swapCells(prevRow, prevCol, row, col);
                            combo = 0;
                        }
                        selectedCell = null;
                    }, 200);
                } else {
                    selectedCell = { row, col };
                    document.querySelector(`[data-row="${row}"][data-col="${col}"]`).classList.add('selected');
                }
            }
        }

        function isAdjacent(r1, c1, r2, c2) {
            return (Math.abs(r1 - r2) === 1 && c1 === c2) || 
                   (Math.abs(c1 - c2) === 1 && r1 === r2);
        }

        function swapCells(r1, c1, r2, c2) {
            const temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;
            renderBoard();
        }

        function findMatches() {
            const matches = new Set();
            
            for (let row = 0; row < CELL_SIZE; row++) {
                for (let col = 0; col < CELL_SIZE; col++) {
                    const icon = board[row][col];
                    
                    let count = 1;
                    while (col + count < CELL_SIZE && board[row][col + count] === icon) count++;
                    if (count >= 3) {
                        for (let i = 0; i < count; i++) matches.add(`${row},${col + i}`);
                    }
                    
                    count = 1;
                    while (row + count < CELL_SIZE && board[row + count][col] === icon) count++;
                    if (count >= 3) {
                        for (let i = 0; i < count; i++) matches.add(`${row + i},${col}`);
                    }
                }
            }
            
            return Array.from(matches);
        }

        function removeMatches(matches) {
            matches.forEach(pos => {
                const [row, col] = pos.split(',').map(Number);
                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                cell.classList.add('matching');
                setTimeout(() => {
                    board[row][col] = -1;
                    renderBoard();
                }, 300);
            });
            
            if (combo > 1) {
                const gameArea = document.querySelector('.game-area');
                const comboText = document.createElement('div');
                comboText.className = 'combo-text';
                comboText.textContent = `${combo}x 连击!`;
                comboText.style.left = '50%';
                comboText.style.top = '50%';
                gameArea.appendChild(comboText);
                setTimeout(() => comboText.remove(), 500);
            }
        }

        function dropCells() {
            for (let col = 0; col < CELL_SIZE; col++) {
                let emptyRow = CELL_SIZE - 1;
                for (let row = CELL_SIZE - 1; row >= 0; row--) {
                    if (board[row][col] !== -1) {
                        if (row !== emptyRow) {
                            board[emptyRow][col] = board[row][col];
                            board[row][col] = -1;
                        }
                        emptyRow--;
                    }
                }
            }
        }

        function fillEmptyCells() {
            for (let row = 0; row < CELL_SIZE; row++) {
                for (let col = 0; col < CELL_SIZE; col++) {
                    if (board[row][col] === -1) {
                        board[row][col] = Math.floor(Math.random() * icons.length);
                    }
                }
            }
            renderBoard();
        }

        function checkCascade() {
            setTimeout(() => {
                const matches = findMatches();
                if (matches.length > 0) {
                    combo++;
                    removeMatches(matches);
                    scores[currentPlayer - 1] += matches.length * 10 * combo;
                    updateScoreDisplay();
                    
                    setTimeout(() => {
                        dropCells();
                        fillEmptyCells();
                        checkCascade();
                    }, 300);
                } else {
                    combo = 0;
                    switchPlayer();
                }
            }, 200);
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            document.getElementById('turnIndicator').textContent = `${document.getElementById(`player${currentPlayer}Name`).value} 回合`;
        }

        function updateScoreDisplay() {
            document.getElementById('score1').textContent = scores[0];
            document.getElementById('score2').textContent = scores[1];
        }

        function startTimer() {
            timer = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    document.getElementById('timeLeft').textContent = timeLeft;
                    
                    if (timeLeft <= 0) {
                        endGame();
                    }
                }
            }, 1000);
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(timer);
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            let winner = '';
            if (scores[0] > scores[1]) {
                winner = document.getElementById('player1Name').value;
            } else if (scores[1] > scores[0]) {
                winner = document.getElementById('player2Name').value;
            } else {
                winner = '平局';
            }
            
            winnerText.textContent = winner === '平局' ? '平局!' : `${winner} 获胜!`;
            overlay.classList.remove('hidden');
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            scores = [0, 0];
            currentPlayer = 1;
            timeLeft = 60;
            combo = 0;
            updateScoreDisplay();
            document.getElementById('timeLeft').textContent = timeLeft;
            initBoard();
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            document.getElementById('turnIndicator').textContent = `${document.getElementById('player1Name').value} 回合`;
            startTimer();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('消消乐对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${scores[0]} 分`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${scores[1]} 分`, 450, 150);
            
            let result = '';
            if (scores[0] > scores[1]) {
                result = `${document.getElementById('player1Name').value} 获胜!`;
            } else if (scores[1] > scores[0]) {
                result = `${document.getElementById('player2Name').value} 获胜!`;
            } else {
                result = '平局!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(result, canvas.width / 2, 280);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('🎮 couple-mini-game', canvas.width / 2, 350);
            
            const link = document.createElement('a');
            link.download = 'match3_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isGameRunning) {
                document.getElementById('pauseBtn').click();
            }
        });
    </script>
</body>
</html>
