    <title>打地鼠对战</title>
    <style>

            --card-shadow: rgba(255, 107, 157, 0.3);

            --text-secondary: #7a5a5a;

            --tag-bg-2: #ffd1dc;

        [data-theme="lavender"] {

            --bg-gradient-2: #fed6e3;
            --bg-gradient-3: #d299c2;
            --primary-color: #7b1fa2;
            --secondary-color: #9c27b0;
            --accent-color: #4a148c;
            --btn-gradient-1: #ba68c8;
            --btn-gradient-2: #9c27b0;

            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(186, 104, 200, 0.4);
            --card-hover-border: #ba68c8;
            --card-shadow: rgba(186, 104, 200, 0.3);
            --text-primary: #4a148c;
            --text-secondary: #6a1b9a;
            --tag-bg-1: #f3e5f5;
            --tag-bg-2: #e1bee7;
            --tag-text: #7b1fa2;

            --link-color: #7b1fa2;
            --decoration-1: '💜';
            --decoration-2: '🔮';

        [data-theme="ocean"] {
            --bg-gradient-1: #a1c4fd;
            --bg-gradient-2: #c2e9fb;
            --bg-gradient-3: #89f7fe;
            --primary-color: #1565c0;
            --secondary-color: #1976d2;
            --accent-color: #0d47a1;
            --btn-gradient-1: #42a5f5;
            --btn-gradient-2: #1e88e5;
            --btn-shadow: rgba(66, 165, 245, 0.4);
            --btn-shadow-hover: rgba(66, 165, 245, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(66, 165, 245, 0.4);
            --card-hover-border: #42a5f5;
            --card-shadow: rgba(66, 165, 245, 0.3);
            --text-primary: #0d47a1;
            --text-secondary: #1565c0;
            --tag-bg-1: #e3f2fd;
            --tag-bg-2: #bbdefb;
            --tag-text: #1565c0;
            --divider-color: #90caf9;
            --link-color: #1565c0;
            --decoration-1: '💙';
            --decoration-2: '🌊';
        }

        [data-theme="forest"] {
            --bg-gradient-1: #a8e063;
            --bg-gradient-2: #56ab2f;
            --bg-gradient-3: #a8e063;
            --primary-color: #2e7d32;
            --secondary-color: #388e3c;
            --accent-color: #1b5e20;
            --btn-gradient-1: #66bb6a;
            --btn-gradient-2: #388e3c;
            --btn-shadow: rgba(102, 187, 106, 0.4);
            --btn-shadow-hover: rgba(102, 187, 106, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(102, 187, 106, 0.4);
            --card-hover-border: #66bb6a;
            --card-shadow: rgba(102, 187, 106, 0.3);
            --text-primary: #1b5e20;
            --text-secondary: #2e7d32;
            --tag-bg-1: #e8f5e9;
            --tag-bg-2: #c8e6c9;
            --tag-text: #2e7d32;
            --divider-color: #a5d6a7;
            --link-color: #2e7d32;
            --decoration-1: '💚';
            --decoration-2: '🌿';
        }

        [data-theme="midnight"] {
            --bg-gradient-1: #232526;
            --bg-gradient-2: #414345;
            --bg-gradient-3: #232526;
            --primary-color: #ffd700;
            --secondary-color: #ffc107;
            --accent-color: #ff8f00;
            --btn-gradient-1: #ffd700;
            --btn-gradient-2: #ffc107;
            --btn-shadow: rgba(255, 215, 0, 0.4);
            --btn-shadow-hover: rgba(255, 215, 0, 0.6);
            --card-bg: rgba(50, 50, 50, 0.9);
            --card-border: rgba(255, 215, 0, 0.3);
            --card-hover-border: #ffd700;
            --card-shadow: rgba(255, 215, 0, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --tag-bg-1: #424242;
            --tag-bg-2: #616161;
            --tag-text: #ffd700;
            --divider-color: #ffd700;
            --link-color: #ffd700;
            --decoration-1: '⭐';
            --decoration-2: '🌙';
        }

        [data-mode="dark"] {
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
        }

        [data-mode="dark"][data-theme="orange"] {
            --bg-gradient-1: #1a0f00;
            --bg-gradient-2: #2d1810;
            --bg-gradient-3: #1a0f00;
            --card-bg: rgba(40, 30, 20, 0.9);
        }

        [data-mode="dark"][data-theme="sakura"] {
            --bg-gradient-1: #1a0a10;
            --bg-gradient-2: #2d1020;
            --bg-gradient-3: #1a0a10;
            --card-bg: rgba(40, 20, 30, 0.9);
        }

        [data-mode="dark"][data-theme="lavender"] {
            --bg-gradient-1: #0f0a1a;
            --bg-gradient-2: #1a102d;
            --bg-gradient-3: #0f0a1a;
            --card-bg: rgba(30, 20, 40, 0.9);
        }

        [data-mode="dark"][data-theme="ocean"] {
            --bg-gradient-1: #0a0f1a;
            --bg-gradient-2: #101a2d;
            --bg-gradient-3: #0a0f1a;
            --card-bg: rgba(20, 30, 40, 0.9);
        }

        [data-mode="dark"][data-theme="forest"] {
            --bg-gradient-1: #0a1a0f;
            --bg-gradient-2: #102d1a;
            --bg-gradient-3: #0a1a0f;
            --card-bg: rgba(20, 40, 30, 0.9);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .theme-panel h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-section {
            margin-bottom: 1.2rem;
        }

        .theme-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .color-themes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .color-theme-btn {
            padding: 0.5rem;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        .color-theme-btn:hover {
            transform: scale(1.05);
        }

        .color-theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .color-theme-btn[data-theme="orange"] {
            background: linear-gradient(135deg, #ff7f50, #ff6347);
        }

        .color-theme-btn[data-theme="sakura"] {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .color-theme-btn[data-theme="lavender"] {
            background: linear-gradient(135deg, #ba68c8, #9c27b0);
        }

        .color-theme-btn[data-theme="ocean"] {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .color-theme-btn[data-theme="forest"] {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }

        .color-theme-btn[data-theme="midnight"] {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
        }
        .nickname-section {
            margin-bottom: 1.2rem;
        }

        .nickname-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .nickname-input-group:last-child {
            margin-bottom: 0;
        }

        .nickname-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 60px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .nickname-input {
            flex: 1;
            padding: 0.5rem 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nickname-input:focus {
            outline: none;
            border-color: var(--btn-gradient-1);
        }

        .nickname-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .save-nickname-btn {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .save-nickname-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px var(--btn-shadow);
        }

        .save-nickname-btn:active {
            transform: scale(0.98);
        }

        .random-theme-btn {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .random-theme-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .random-theme-btn:active {
            transform: scale(0.98);
        }


        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mode-btn:hover {
            border-color: var(--btn-gradient-1);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border-color: transparent;
        }

        body {
            transition: all 0.5s ease;
        }

        body::before {
            content: var(--decoration-1);
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: var(--decoration-2);
            position: fixed;
            top: 60%;
            right: 5%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .player {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            min-width: 120px;
        }

        .player-1 {
            background: rgba(255, 107, 107, 0.3);
            border: 2px solid #ff6b6b;
        }

        .player-2 {
            background: rgba(78, 205, 196, 0.3);
            border: 2px solid #4ecdc4;
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.3rem;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .timer {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: none;
    border-radius: 25px;
    color: white;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
    transition: all 0.3s;
    z-index: 1000;
        }

        .timer.warning {
            background: rgba(255, 107, 107, 0.5);
            border-color: #ff6b6b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .game-status {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            min-height: 1.5rem;
        }

        .winner {
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 1s infinite;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
            margin: 0 auto 1.5rem;
        }

        .hole {
            background: #5d4037;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.5);
            border: 4px solid #3e2723;
        }

        .hole::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, #3e2723, transparent);
            border-radius: 0 0 50% 50%;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            transition: bottom 0.2s ease;
            cursor: pointer;
            user-select: none;
        }

        .mole.up {
            bottom: 10%;
        }

        .mole.hit {
            animation: hit 0.3s ease;
        }

        @keyframes hit {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.3); }
            100% { transform: translateX(-50%) scale(0); bottom: -100%; }
        }

        .mole.player1-hit {
            filter: drop-shadow(0 0 10px #ff6b6b);
        }

        .mole.player2-hit {
            filter: drop-shadow(0 0 10px #4ecdc4);
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .control-info h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .key {
            display: inline-block;
            background: #333;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            margin: 0.2rem;
            font-family: monospace;
            border: 1px solid #555;
            box-shadow: 0 2px 0 #222;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: linear-gradient(90deg, #666, #444);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #ff7f50, #ff6347);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 127, 80, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 127, 80, 0.6);
        }



        @media (max-width: 500px) {
            .board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
                gap: 10px;
            }
            .mole {
                font-size: 2.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .controls {
                gap: 1rem;
            }
            .control-info {
                padding: 0.6rem 1.2rem;
            }
        }
    </style>
</head>

        <div class="scoreboard">

                <div class="score" id="score1">0</div>
            </div>
            <div class="player player-2">
                <div>🔵 玩家 2</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="game-info">
            <div class="timer" id="timer">⏱️ 30秒</div>
        </div>

        <div class="game-status" id="gameStatus">按 空格键 开始游戏</div>

        <div class="board" id="board">
            <div class="hole" data-index="0"><div class="mole">🐹</div></div>
            <div class="hole" data-index="1"><div class="mole">🐹</div></div>
            <div class="hole" data-index="2"><div class="mole">🐹</div></div>
            <div class="hole" data-index="3"><div class="mole">🐹</div></div>
            <div class="hole" data-index="4"><div class="mole">🐹</div></div>
            <div class="hole" data-index="5"><div class="mole">🐹</div></div>
            <div class="hole" data-index="6"><div class="mole">🐹</div></div>
            <div class="hole" data-index="7"><div class="mole">🐹</div></div>
            <div class="hole" data-index="8"><div class="mole">🐹</div></div>
        </div>

        <div class="controls">
            <div class="control-info">
                <h3>🎮 玩家 1 控制</h3>
                <span class="key">Q</span> 1号洞<br>
                <span class="key">W</span> 2号洞<br>
                <span class="key">E</span> 3号洞<br>
                <span class="key">A</span> 4号洞<br>
                <span class="key">S</span> 5号洞<br>
                <span class="key">D</span> 6号洞<br>
                <span class="key">Z</span> 7号洞<br>
                <span class="key">X</span> 8号洞<br>
                <span class="key">C</span> 9号洞
            </div>
            <div class="control-info">
                <h3>🎮 玩家 2 控制</h3>
                <span class="key">7</span> 1号洞<br>
                <span class="key">8</span> 2号洞<br>
                <span class="key">9</span> 3号洞<br>
                <span class="key">4</span> 4号洞<br>
                <span class="key">5</span> 5号洞<br>
                <span class="key">6</span> 6号洞<br>
                <span class="key">1</span> 7号洞<br>
                <span class="key">2</span> 8号洞<br>
                <span class="key">3</span> 9号洞
            </div>
        </div>

        <div class="button-group">
            <button id="startBtn">▶️ 开始游戏</button>
            <button id="restartBtn" class="secondary">🔄 重新开始</button>
        </div>
    </div>

    <script>
        const moles = document.querySelectorAll('.mole');
        const holes = document.querySelectorAll('.hole');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const timerEl = document.getElementById('timer');
        const gameStatusEl = document.getElementById('gameStatus');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const GAME_DURATION = 30;
        let score1 = 0;
        let score2 = 0;
        let timeLeft = GAME_DURATION;
        let gameRunning = false;
        let gameInterval = null;
        let timerInterval = null;
        let currentMoleIndex = -1;
        let moleTimeout = null;

        const player1Keys = {
            'q': 0, 'w': 1, 'e': 2,
            'a': 3, 's': 4, 'd': 5,
            'z': 6, 'x': 7, 'c': 8
        };

        const player2Keys = {
            '7': 0, '8': 1, '9': 2,
            '4': 3, '5': 4, '6': 5,
            '1': 6, '2': 7, '3': 8
        };

        function initGame() {
            score1 = 0;
            score2 = 0;
            timeLeft = GAME_DURATION;
            currentMoleIndex = -1;
            
            updateScore();
            updateTimer();
            hideAllMoles();
            gameStatusEl.textContent = '按 空格键 开始游戏';
            timerEl.classList.remove('warning');
        }

        function updateScore() {
            score1El.textContent = score1;
            score2El.textContent = score2;
        }

        function updateTimer() {
            timerEl.textContent = `⏱️ ${timeLeft}秒`;
            if (timeLeft <= 10) {
                timerEl.classList.add('warning');
            }
        }

        function hideAllMoles() {
            moles.forEach(mole => {
                mole.classList.remove('up', 'hit', 'player1-hit', 'player2-hit');
            });
        }

        function showRandomMole() {
            if (!gameRunning) return;
            
            hideAllMoles();
            
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * 9);
            } while (newIndex === currentMoleIndex);
            
            currentMoleIndex = newIndex;
            moles[currentMoleIndex].classList.add('up');
            
            const showTime = Math.random() * 1000 + 500;
            moleTimeout = setTimeout(() => {
                if (gameRunning) {
                    moles[currentMoleIndex].classList.remove('up');
                    setTimeout(showRandomMole, 300);
                }
            }, showTime);
        }

        function whackMole(index, player) {
            if (!gameRunning) return;
            if (index !== currentMoleIndex) return;
            if (!moles[index].classList.contains('up')) return;
            
            clearTimeout(moleTimeout);
            
            const hitClass = player === 1 ? 'player1-hit' : 'player2-hit';
            moles[index].classList.add('hit', hitClass);
            
            if (player === 1) {
                score1++;
            } else {
                score2++;
            }
            updateScore();
            
            currentMoleIndex = -1;
            
            setTimeout(() => {
                if (gameRunning) {
                    showRandomMole();
                }
            }, 300);
        }

        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            gameStatusEl.textContent = '游戏进行中...';
            startBtn.textContent = '⏸️ 暂停';
            
            showRandomMole();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearTimeout(moleTimeout);
            hideAllMoles();
            
            let result;
            if (score1 > score2) {
                result = '<span class="winner">🎉 玩家 1 获胜！🎉</span>';
            } else if (score2 > score1) {
                result = '<span class="winner">🎉 玩家 2 获胜！🎉</span>';
            } else {
                result = '<span class="winner">🤝 平局！</span>';
            }
            
            gameStatusEl.innerHTML = `${result} ${score1} - ${score2}`;
            startBtn.textContent = '▶️ 开始游戏';
        }

        function resetGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearTimeout(moleTimeout);
            initGame();
            startBtn.textContent = '▶️ 开始游戏';
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === ' ') {
                e.preventDefault();
                if (!gameRunning) {
                    startGame();
                }
                return;
            }
            
            if (player1Keys.hasOwnProperty(key)) {
                whackMole(player1Keys[key], 1);
            } else if (player2Keys.hasOwnProperty(key)) {
                whackMole(player2Keys[key], 2);
            }
        });

        holes.forEach((hole, index) => {
            hole.addEventListener('click', () => {
                if (gameRunning) {
                    gameStatusEl.textContent = '请使用键盘按键打地鼠！';
                    setTimeout(() => {
                        if (gameRunning) {
                            gameStatusEl.textContent = '游戏进行中...';
                        }
                    }, 1500);
                }
            });
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', resetGame);
        
        initGame();
    </script>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeBtn');
            const themePanel = document.getElementById('themePanel');
            const randomThemeBtn = document.getElementById('randomThemeBtn');
            const player1NameInput = document.getElementById('player1Name');
            const player2NameInput = document.getElementById('player2Name');
            const saveNicknameBtn = document.getElementById('saveNicknameBtn');
            
            const savedPlayer1Name = localStorage.getItem('couple-game-player1') || '玩家1';
            const savedPlayer2Name = localStorage.getItem('couple-game-player2') || '玩家2';
            
            player1NameInput.value = savedPlayer1Name;
            player2NameInput.value = savedPlayer2Name;
            
            saveNicknameBtn.addEventListener('click', () => {
                const p1 = player1NameInput.value.trim() || '玩家1';
                const p2 = player2NameInput.value.trim() || '玩家2';
                
                localStorage.setItem('couple-game-player1', p1);
                localStorage.setItem('couple-game-player2', p2);
                
                saveNicknameBtn.textContent = '✅ 已保存';
                setTimeout(() => {
                    saveNicknameBtn.textContent = '💾 保存昵称';
                }, 1500);
            });


            const colorThemeBtns = document.querySelectorAll('.color-theme-btn');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const body = document.body;

            const savedTheme = localStorage.getItem('couple-game-theme') || 'orange';
            const savedMode = localStorage.getItem('couple-game-mode') || 'light';

            function applyTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
                
                colorThemeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                localStorage.setItem('couple-game-theme', theme);
                localStorage.setItem('couple-game-mode', mode);
            }

            applyTheme(savedTheme, savedMode);
            let appliedTheme = savedTheme;
            let appliedMode = savedMode;

            function previewTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
            }

            function restoreTheme() {
                body.setAttribute('data-theme', appliedTheme);
                body.setAttribute('data-mode', appliedMode);
            }


            themeBtn.addEventListener('click', () => {
                themePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
                    themePanel.classList.remove('active');
                }
            });

            
            colorThemeBtns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    previewTheme(theme, mode);
                });
                
                btn.addEventListener('mouseleave', () => {
                    restoreTheme();
                });
                
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    appliedTheme = theme;
                    appliedMode = mode;
                    applyTheme(theme, mode);
                });
            });


            
            modeBtns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    previewTheme(theme, mode);
                });
                
                btn.addEventListener('mouseleave', () => {
                    restoreTheme();
                });
                
                btn.addEventListener('click', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    appliedTheme = theme;
                    appliedMode = mode;
                    applyTheme(theme, mode);
                });
            });

            randomThemeBtn.addEventListener('click', () => {
                const themes = ['orange', 'sakura', 'lavender', 'ocean', 'forest', 'midnight'];
                const currentTheme = body.getAttribute('data-theme');
                const currentMode = body.getAttribute('data-mode');
                
                let availableThemes = themes.filter(t => t !== currentTheme);
                const randomTheme = availableThemes[Math.floor(Math.random() * availableThemes.length)];
                
                randomThemeBtn.style.transform = 'rotate(360deg)';
                setTimeout(() => {
                    randomThemeBtn.style.transform = '';
                }, 300);
                
                applyTheme(randomTheme, currentMode);
            });

        })();
    </script>
</body>
</html>
