<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .player {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            min-width: 120px;
        }

        .player-1 {
            background: rgba(255, 107, 107, 0.3);
            border: 2px solid #ff6b6b;
        }

        .player-2 {
            background: rgba(78, 205, 196, 0.3);
            border: 2px solid #4ecdc4;
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.3rem;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .timer {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: none;
    border-radius: 25px;
    color: white;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
    transition: all 0.3s;
    z-index: 1000;
        }

        .timer.warning {
            background: rgba(255, 107, 107, 0.5);
            border-color: #ff6b6b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .game-status {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            min-height: 1.5rem;
        }

        .winner {
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 1s infinite;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
            margin: 0 auto 1.5rem;
        }

        .hole {
            background: #5d4037;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.5);
            border: 4px solid #3e2723;
        }

        .hole::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, #3e2723, transparent);
            border-radius: 0 0 50% 50%;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            transition: bottom 0.2s ease;
            cursor: pointer;
            user-select: none;
        }

        .mole.up {
            bottom: 10%;
        }

        .mole.hit {
            animation: hit 0.3s ease;
        }

        @keyframes hit {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.3); }
            100% { transform: translateX(-50%) scale(0); bottom: -100%; }
        }

        .mole.player1-hit {
            filter: drop-shadow(0 0 10px #ff6b6b);
        }

        .mole.player2-hit {
            filter: drop-shadow(0 0 10px #4ecdc4);
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .control-info h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .key {
            display: inline-block;
            background: #333;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            margin: 0.2rem;
            font-family: monospace;
            border: 1px solid #555;
            box-shadow: 0 2px 0 #222;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: linear-gradient(90deg, #666, #444);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
        }


        @media (max-width: 500px) {
            .board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
                gap: 10px;
            }
            .mole {
                font-size: 2.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .controls {
                gap: 1rem;
            }
            .control-info {
                padding: 0.6rem 1.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
    
    <div class="game-container">
        <h1>🐹 打地鼠对战</h1>
        
        <div class="scoreboard">
            <div class="player player-1">
                <div>🔴 玩家 1</div>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player player-2">
                <div>🔵 玩家 2</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="game-info">
            <div class="timer" id="timer">⏱️ 30秒</div>
        </div>

        <div class="game-status" id="gameStatus">按 空格键 开始游戏</div>

        <div class="board" id="board">
            <div class="hole" data-index="0"><div class="mole">🐹</div></div>
            <div class="hole" data-index="1"><div class="mole">🐹</div></div>
            <div class="hole" data-index="2"><div class="mole">🐹</div></div>
            <div class="hole" data-index="3"><div class="mole">🐹</div></div>
            <div class="hole" data-index="4"><div class="mole">🐹</div></div>
            <div class="hole" data-index="5"><div class="mole">🐹</div></div>
            <div class="hole" data-index="6"><div class="mole">🐹</div></div>
            <div class="hole" data-index="7"><div class="mole">🐹</div></div>
            <div class="hole" data-index="8"><div class="mole">🐹</div></div>
        </div>

        <div class="controls">
            <div class="control-info">
                <h3>🎮 玩家 1 控制</h3>
                <span class="key">Q</span> 1号洞<br>
                <span class="key">W</span> 2号洞<br>
                <span class="key">E</span> 3号洞<br>
                <span class="key">A</span> 4号洞<br>
                <span class="key">S</span> 5号洞<br>
                <span class="key">D</span> 6号洞<br>
                <span class="key">Z</span> 7号洞<br>
                <span class="key">X</span> 8号洞<br>
                <span class="key">C</span> 9号洞
            </div>
            <div class="control-info">
                <h3>🎮 玩家 2 控制</h3>
                <span class="key">7</span> 1号洞<br>
                <span class="key">8</span> 2号洞<br>
                <span class="key">9</span> 3号洞<br>
                <span class="key">4</span> 4号洞<br>
                <span class="key">5</span> 5号洞<br>
                <span class="key">6</span> 6号洞<br>
                <span class="key">1</span> 7号洞<br>
                <span class="key">2</span> 8号洞<br>
                <span class="key">3</span> 9号洞
            </div>
        </div>

        <div class="button-group">
            <button id="startBtn">▶️ 开始游戏</button>
            <button id="restartBtn" class="secondary">🔄 重新开始</button>
        </div>
    </div>

    <script>
        const moles = document.querySelectorAll('.mole');
        const holes = document.querySelectorAll('.hole');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const timerEl = document.getElementById('timer');
        const gameStatusEl = document.getElementById('gameStatus');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const GAME_DURATION = 30;
        let score1 = 0;
        let score2 = 0;
        let timeLeft = GAME_DURATION;
        let gameRunning = false;
        let gameInterval = null;
        let timerInterval = null;
        let currentMoleIndex = -1;
        let moleTimeout = null;

        const player1Keys = {
            'q': 0, 'w': 1, 'e': 2,
            'a': 3, 's': 4, 'd': 5,
            'z': 6, 'x': 7, 'c': 8
        };

        const player2Keys = {
            '7': 0, '8': 1, '9': 2,
            '4': 3, '5': 4, '6': 5,
            '1': 6, '2': 7, '3': 8
        };

        function initGame() {
            score1 = 0;
            score2 = 0;
            timeLeft = GAME_DURATION;
            currentMoleIndex = -1;
            
            updateScore();
            updateTimer();
            hideAllMoles();
            gameStatusEl.textContent = '按 空格键 开始游戏';
            timerEl.classList.remove('warning');
        }

        function updateScore() {
            score1El.textContent = score1;
            score2El.textContent = score2;
        }

        function updateTimer() {
            timerEl.textContent = `⏱️ ${timeLeft}秒`;
            if (timeLeft <= 10) {
                timerEl.classList.add('warning');
            }
        }

        function hideAllMoles() {
            moles.forEach(mole => {
                mole.classList.remove('up', 'hit', 'player1-hit', 'player2-hit');
            });
        }

        function showRandomMole() {
            if (!gameRunning) return;
            
            hideAllMoles();
            
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * 9);
            } while (newIndex === currentMoleIndex);
            
            currentMoleIndex = newIndex;
            moles[currentMoleIndex].classList.add('up');
            
            const showTime = Math.random() * 1000 + 500;
            moleTimeout = setTimeout(() => {
                if (gameRunning) {
                    moles[currentMoleIndex].classList.remove('up');
                    setTimeout(showRandomMole, 300);
                }
            }, showTime);
        }

        function whackMole(index, player) {
            if (!gameRunning) return;
            if (index !== currentMoleIndex) return;
            if (!moles[index].classList.contains('up')) return;
            
            clearTimeout(moleTimeout);
            
            const hitClass = player === 1 ? 'player1-hit' : 'player2-hit';
            moles[index].classList.add('hit', hitClass);
            
            if (player === 1) {
                score1++;
            } else {
                score2++;
            }
            updateScore();
            
            currentMoleIndex = -1;
            
            setTimeout(() => {
                if (gameRunning) {
                    showRandomMole();
                }
            }, 300);
        }

        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            gameStatusEl.textContent = '游戏进行中...';
            startBtn.textContent = '⏸️ 暂停';
            
            showRandomMole();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearTimeout(moleTimeout);
            hideAllMoles();
            
            let result;
            if (score1 > score2) {
                result = '<span class="winner">🎉 玩家 1 获胜！🎉</span>';
            } else if (score2 > score1) {
                result = '<span class="winner">🎉 玩家 2 获胜！🎉</span>';
            } else {
                result = '<span class="winner">🤝 平局！</span>';
            }
            
            gameStatusEl.innerHTML = `${result} ${score1} - ${score2}`;
            startBtn.textContent = '▶️ 开始游戏';
        }

        function resetGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearTimeout(moleTimeout);
            initGame();
            startBtn.textContent = '▶️ 开始游戏';
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === ' ') {
                e.preventDefault();
                if (!gameRunning) {
                    startGame();
                }
                return;
            }
            
            if (player1Keys.hasOwnProperty(key)) {
                whackMole(player1Keys[key], 1);
            } else if (player2Keys.hasOwnProperty(key)) {
                whackMole(player2Keys[key], 2);
            }
        });

        holes.forEach((hole, index) => {
            hole.addEventListener('click', () => {
                if (gameRunning) {
                    gameStatusEl.textContent = '请使用键盘按键打地鼠！';
                    setTimeout(() => {
                        if (gameRunning) {
                            gameStatusEl.textContent = '游戏进行中...';
                        }
                    }, 1500);
                }
            });
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', resetGame);
        
        initGame();
    </script>
</body>
</html>
