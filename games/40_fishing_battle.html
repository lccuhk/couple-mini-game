<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捕鱼达人对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .game-area {
            background: linear-gradient(180deg, #87CEEB 0%, #00CED1 50%, #008B8B 100%);
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .game-canvas {
            display: block;
            border-radius: 10px;
            background: linear-gradient(180deg, #1E90FF 0%, #00CED1 50%, #20B2AA 100%);
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .fishing-rod {
            position: absolute;
            bottom: 60px;
            width: 30px;
            height: 150px;
            background: linear-gradient(90deg, #8B4513, #A0522D);
            border-radius: 5px;
            transform-origin: bottom center;
            transition: transform 0.1s;
            z-index: 10;
        }

        .fishing-line {
            position: absolute;
            width: 2px;
            background: #fff;
            z-index: 5;
        }

        .fish-hook {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #FFD700;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            z-index: 6;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">🎣 捕鱼达人对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
            <div style="margin-top: 10px; font-size: 14px;">🎣 左键抛竿</div>
        </div>

        <div class="game-area">
            <canvas class="game-canvas" id="gameCanvas" width="600" height="400"></canvas>
            <div class="turn-indicator" id="turnIndicator">准备开始</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
            <div style="margin-top: 10px; font-size: 14px;">🎣 右键抛竿</div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 玩家1: 鼠标左键抛竿捕鱼</p>
        <p>🎯 玩家2: 鼠标右键抛竿捕鱼</p>
        <p>🐟 不同种类的鱼分值不同，捕更多鱼获胜!</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let isGameRunning = false;
        let isPaused = false;
        let currentPlayer = 1;
        let scores = [0, 0];
        let timeLeft = 60;
        let gameWinner = null;
        
        let fish = [];
        let bubbles = [];
        let rods = [
            { x: 100, y: canvas.height, angle: -30, lineLength: 0, isCasting: false, isRetracting: false, hookX: 100, hookY: canvas.height },
            { x: 500, y: canvas.height, angle: 30, lineLength: 0, isCasting: false, isRetracting: false, hookX: 500, hookY: canvas.height }
        ];
        
        const FISH_TYPES = [
            { color: '#FF6347', size: 25, speed: 1.5, points: 10, name: '小鱼' },
            { color: '#FFD700', size: 35, speed: 1, points: 20, name: '金鱼' },
            { color: '#00CED1', size: 45, speed: 0.8, points: 30, name: '蓝鱼' },
            { color: '#FF69B4', size: 55, speed: 0.6, points: 50, name: '大鱼' },
            { color: '#9370DB', size: 70, speed: 0.4, points: 100, name: '鲨鱼' }
        ];

        function createFish() {
            const type = FISH_TYPES[Math.floor(Math.random() * FISH_TYPES.length)];
            return {
                x: Math.random() * (canvas.width - 100) + 50,
                y: Math.random() * (canvas.height - 150) + 50,
                type: type,
                direction: Math.random() > 0.5 ? 1 : -1,
                wobble: 0
            };
        }

        function createBubble() {
            return {
                x: Math.random() * canvas.width,
                y: canvas.height,
                size: Math.random() * 8 + 4,
                speed: Math.random() * 0.5 + 0.2
            };
        }

        function drawFish(f) {
            ctx.save();
            ctx.translate(f.x, f.y);
            ctx.scale(f.direction, 1);
            
            ctx.fillStyle = f.type.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, f.type.size, f.type.size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-f.type.size * 0.3, -f.type.size * 0.1, f.type.size * 0.15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-f.type.size * 0.35, -f.type.size * 0.1, f.type.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = f.type.color;
            ctx.beginPath();
            ctx.moveTo(f.type.size, 0);
            ctx.lineTo(f.type.size * 1.4, -f.type.size * 0.3);
            ctx.lineTo(f.type.size * 1.4, f.type.size * 0.3);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }

        function drawBubble(b) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(b.x - b.size * 0.3, b.y - b.size * 0.3, b.size * 0.2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawRods() {
            rods.forEach((rod, index) => {
                ctx.save();
                ctx.translate(rod.x, canvas.height);
                ctx.rotate((rod.angle * Math.PI) / 180);
                
                const gradient = ctx.createLinearGradient(0, 0, 0, -120);
                gradient.addColorStop(0, '#8B4513');
                gradient.addColorStop(1, '#A0522D');
                ctx.fillStyle = gradient;
                ctx.fillRect(-4, -120, 8, 120);
                
                ctx.restore();
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(rod.x, canvas.height);
                ctx.lineTo(rod.hookX, rod.hookY);
                ctx.stroke();
                
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(rod.hookX, rod.hookY);
                ctx.lineTo(rod.hookX + 8, rod.hookY + 8);
                ctx.lineTo(rod.hookX - 8, rod.hookY + 8);
                ctx.closePath();
                ctx.fill();
            });
        }

        function drawWater() {
            ctx.fillStyle = '#1E90FF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 5; i++) {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.1 - i * 0.02})`;
                ctx.fillRect(0, i * 80, canvas.width, 40);
            }
        }

        function updateFish() {
            fish.forEach((f, index) => {
                f.x += f.type.speed * f.direction;
                f.y += Math.sin(f.wobble) * 0.5;
                f.wobble += 0.05;
                
                if (f.x < -f.type.size || f.x > canvas.width + f.type.size) {
                    fish.splice(index, 1);
                }
            });
        }

        function updateBubbles() {
            bubbles.forEach((b, index) => {
                b.y -= b.speed;
                
                if (b.y < -b.size) {
                    bubbles.splice(index, 1);
                }
            });
        }

        function updateRods() {
            rods.forEach((rod) => {
                if (rod.isCasting && rod.lineLength < 300) {
                    rod.lineLength += 5;
                } else if (rod.isCasting) {
                    rod.isCasting = false;
                    rod.isRetracting = true;
                }
                
                if (rod.isRetracting && rod.lineLength > 0) {
                    rod.lineLength -= 5;
                } else if (rod.isRetracting) {
                    rod.isRetracting = false;
                }
                
                const rad = (rod.angle * Math.PI) / 180;
                rod.hookX = rod.x + Math.sin(rad) * rod.lineLength;
                rod.hookY = canvas.height - Math.cos(rad) * rod.lineLength;
            });
        }

        function checkCatch() {
            rods.forEach((rod, playerIndex) => {
                fish.forEach((f, fishIndex) => {
                    const dx = rod.hookX - f.x;
                    const dy = rod.hookY - f.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < f.type.size && rod.isRetracting) {
                        scores[playerIndex] += f.type.points;
                        fish.splice(fishIndex, 1);
                        
                        if (playerIndex === 0) {
                            document.getElementById('score1').textContent = scores[0];
                        } else {
                            document.getElementById('score2').textContent = scores[1];
                        }
                    }
                });
            });
        }

        function gameLoop() {
            if (!isGameRunning || isPaused) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            drawWater();
            updateBubbles();
            bubbles.forEach(drawBubble);
            
            if (Math.random() < 0.02) {
                fish.push(createFish());
            }
            if (Math.random() < 0.05) {
                bubbles.push(createBubble());
            }
            
            updateFish();
            fish.forEach(drawFish);
            
            updateRods();
            checkCatch();
            drawRods();
            
            requestAnimationFrame(gameLoop);
        }

        function updateTurnIndicator() {
            const playerName = currentPlayer === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            document.getElementById('turnIndicator').textContent = `${playerName} 的回合 | 剩余时间: ${timeLeft}秒`;
        }

        function startTimer() {
            const timer = setInterval(() => {
                if (!isGameRunning || isPaused) return;
                
                timeLeft--;
                updateTurnIndicator();
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isGameRunning = false;
            gameWinner = scores[0] > scores[1] ? 1 : 2;
            
            if (scores[0] === scores[1]) {
                gameWinner = 0;
            }
            
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            if (gameWinner === 0) {
                winnerText.textContent = `平局! ${scores[0]} : ${scores[1]}`;
            } else {
                const winner = gameWinner === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
                winnerText.textContent = `${winner} 获胜! ${scores[0]} : ${scores[1]}`;
            }
            overlay.classList.remove('hidden');
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!isGameRunning || isPaused) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            
            if (e.button === 0 && !rods[0].isCasting && !rods[0].isRetracting) {
                rods[0].isCasting = true;
            } else if (e.button === 2 && !rods[1].isCasting && !rods[1].isRetracting) {
                rods[1].isCasting = true;
            }
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            scores = [0, 0];
            timeLeft = 60;
            gameWinner = null;
            fish = [];
            bubbles = [];
            rods = [
                { x: 100, y: canvas.height, angle: -30, lineLength: 0, isCasting: false, isRetracting: false, hookX: 100, hookY: canvas.height },
                { x: 500, y: canvas.height, angle: 30, lineLength: 0, isCasting: false, isRetracting: false, hookX: 500, hookY: canvas.height }
            ];
            
            document.getElementById('score1').textContent = '0';
            document.getElementById('score2').textContent = '0';
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            updateTurnIndicator();
            startTimer();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
                document.getElementById('turnIndicator').textContent = isPaused ? '游戏暂停' : `${currentPlayer === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value} 的回合 | 剩余时间: ${timeLeft}秒`;
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvasShare = document.createElement('canvas');
            canvasShare.width = 500;
            canvasShare.height = 400;
            const ctxShare = canvasShare.getContext('2d');
            
            ctxShare.fillStyle = '#2d3436';
            ctxShare.fillRect(0, 0, canvasShare.width, canvasShare.height);
            
            ctxShare.fillStyle = '#fff';
            ctxShare.font = 'bold 36px Arial';
            ctxShare.textAlign = 'center';
            ctxShare.fillText('捕鱼达人对战战绩', canvasShare.width / 2, 60);
            
            ctxShare.font = '24px Arial';
            ctxShare.fillText(`${document.getElementById('player1Name').value}: ${scores[0]}分`, 150, 180);
            ctxShare.fillText(`${document.getElementById('player2Name').value}: ${scores[1]}分`, 350, 180);
            
            ctxShare.fillStyle = '#1E90FF';
            ctxShare.beginPath();
            ctxShare.arc(150, 280, 40, 0, Math.PI * 2);
            ctxShare.fill();
            
            ctxShare.fillStyle = '#FF6347';
            ctxShare.beginPath();
            ctxShare.ellipse(150, 280, 20, 12, 0, 0, Math.PI * 2);
            ctxShare.fill();
            
            ctxShare.fillStyle = '#FFD700';
            ctxShare.beginPath();
            ctxShare.moveTo(170, 280);
            ctxShare.lineTo(185, 270);
            ctxShare.lineTo(185, 290);
            ctxShare.closePath();
            ctxShare.fill();
            
            ctxShare.fillStyle = '#1E90FF';
            ctxShare.beginPath();
            ctxShare.arc(350, 280, 40, 0, Math.PI * 2);
            ctxShare.fill();
            
            ctxShare.fillStyle = '#FFD700';
            ctxShare.beginPath();
            ctxShare.ellipse(350, 280, 20, 12, 0, 0, Math.PI * 2);
            ctxShare.fill();
            
            ctxShare.fillStyle = '#FF6347';
            ctxShare.beginPath();
            ctxShare.moveTo(370, 280);
            ctxShare.lineTo(385, 270);
            ctxShare.lineTo(385, 290);
            ctxShare.closePath();
            ctxShare.fill();
            
            let result = '';
            if (scores[0] > scores[1]) {
                result = `${document.getElementById('player1Name').value} 获胜!`;
            } else if (scores[1] > scores[0]) {
                result = `${document.getElementById('player2Name').value} 获胜!`;
            } else {
                result = '平局!';
            }
            ctxShare.fillStyle = '#ff6b6b';
            ctxShare.font = 'bold 30px Arial';
            ctxShare.fillText(result, canvasShare.width / 2, 360);
            
            const link = document.createElement('a');
            link.download = 'fishing_result.png';
            link.href = canvasShare.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
            }
        });

        gameLoop();
    </script>
</body>
</html>
