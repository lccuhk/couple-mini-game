<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反应力测试对战</title>
    <style>
        :root {
            --bg-gradient-1: #ffecd2;
            --bg-gradient-2: #fcb69f;
            --bg-gradient-3: #ffd89b;
            --primary-color: #e65100;
            --secondary-color: #f57c00;
            --accent-color: #bf360c;
            --btn-gradient-1: #ff7f50;
            --btn-gradient-2: #ff6347;
            --btn-shadow: rgba(255, 127, 80, 0.4);
            --btn-shadow-hover: rgba(255, 127, 80, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 165, 0, 0.4);
            --card-hover-border: #ff7f50;
            --card-shadow: rgba(255, 127, 80, 0.3);
            --text-primary: #4e342e;
            --text-secondary: #6d4c41;
            --tag-bg-1: #fff3e0;
            --tag-bg-2: #ffe0b2;
            --tag-text: #ef6c00;
            --divider-color: #ffcc80;
            --link-color: #e65100;
            --decoration-1: '🧡';
            --decoration-2: '🍊';
        }

        [data-theme="sakura"] {
            --bg-gradient-1: #ff9a9e;
            --bg-gradient-2: #fecfef;
            --bg-gradient-3: #fecfef;
            --primary-color: #d63384;
            --secondary-color: #c2185b;
            --accent-color: #8b4513;
            --btn-gradient-1: #ff6b9d;
            --btn-gradient-2: #c44569;
            --btn-shadow: rgba(255, 107, 157, 0.4);
            --btn-shadow-hover: rgba(255, 107, 157, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 182, 193, 0.5);
            --card-hover-border: #ff6b9d;
            --card-shadow: rgba(255, 107, 157, 0.3);
            --text-primary: #5a3a3a;
            --text-secondary: #7a5a5a;
            --tag-bg-1: #ffe0e9;
            --tag-bg-2: #ffd1dc;
            --tag-text: #c2185b;
            --divider-color: #ffb6c1;
            --link-color: #d63384;
            --decoration-1: '💕';
            --decoration-2: '💖';
        }

        [data-theme="lavender"] {
            --bg-gradient-1: #a8edea;
            --bg-gradient-2: #fed6e3;
            --bg-gradient-3: #d299c2;
            --primary-color: #7b1fa2;
            --secondary-color: #9c27b0;
            --accent-color: #4a148c;
            --btn-gradient-1: #ba68c8;
            --btn-gradient-2: #9c27b0;
            --btn-shadow: rgba(186, 104, 200, 0.4);
            --btn-shadow-hover: rgba(186, 104, 200, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(186, 104, 200, 0.4);
            --card-hover-border: #ba68c8;
            --card-shadow: rgba(186, 104, 200, 0.3);
            --text-primary: #4a148c;
            --text-secondary: #6a1b9a;
            --tag-bg-1: #f3e5f5;
            --tag-bg-2: #e1bee7;
            --tag-text: #7b1fa2;
            --divider-color: #ce93d8;
            --link-color: #7b1fa2;
            --decoration-1: '💜';
            --decoration-2: '🔮';
        }

        [data-theme="ocean"] {
            --bg-gradient-1: #a1c4fd;
            --bg-gradient-2: #c2e9fb;
            --bg-gradient-3: #89f7fe;
            --primary-color: #1565c0;
            --secondary-color: #1976d2;
            --accent-color: #0d47a1;
            --btn-gradient-1: #42a5f5;
            --btn-gradient-2: #1e88e5;
            --btn-shadow: rgba(66, 165, 245, 0.4);
            --btn-shadow-hover: rgba(66, 165, 245, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(66, 165, 245, 0.4);
            --card-hover-border: #42a5f5;
            --card-shadow: rgba(66, 165, 245, 0.3);
            --text-primary: #0d47a1;
            --text-secondary: #1565c0;
            --tag-bg-1: #e3f2fd;
            --tag-bg-2: #bbdefb;
            --tag-text: #1565c0;
            --divider-color: #90caf9;
            --link-color: #1565c0;
            --decoration-1: '💙';
            --decoration-2: '🌊';
        }

        [data-theme="forest"] {
            --bg-gradient-1: #a8e063;
            --bg-gradient-2: #56ab2f;
            --bg-gradient-3: #a8e063;
            --primary-color: #2e7d32;
            --secondary-color: #388e3c;
            --accent-color: #1b5e20;
            --btn-gradient-1: #66bb6a;
            --btn-gradient-2: #388e3c;
            --btn-shadow: rgba(102, 187, 106, 0.4);
            --btn-shadow-hover: rgba(102, 187, 106, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(102, 187, 106, 0.4);
            --card-hover-border: #66bb6a;
            --card-shadow: rgba(102, 187, 106, 0.3);
            --text-primary: #1b5e20;
            --text-secondary: #2e7d32;
            --tag-bg-1: #e8f5e9;
            --tag-bg-2: #c8e6c9;
            --tag-text: #2e7d32;
            --divider-color: #a5d6a7;
            --link-color: #2e7d32;
            --decoration-1: '💚';
            --decoration-2: '🌿';
        }

        [data-theme="midnight"] {
            --bg-gradient-1: #232526;
            --bg-gradient-2: #414345;
            --bg-gradient-3: #232526;
            --primary-color: #ffd700;
            --secondary-color: #ffc107;
            --accent-color: #ff8f00;
            --btn-gradient-1: #ffd700;
            --btn-gradient-2: #ffc107;
            --btn-shadow: rgba(255, 215, 0, 0.4);
            --btn-shadow-hover: rgba(255, 215, 0, 0.6);
            --card-bg: rgba(50, 50, 50, 0.9);
            --card-border: rgba(255, 215, 0, 0.3);
            --card-hover-border: #ffd700;
            --card-shadow: rgba(255, 215, 0, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --tag-bg-1: #424242;
            --tag-bg-2: #616161;
            --tag-text: #ffd700;
            --divider-color: #ffd700;
            --link-color: #ffd700;
            --decoration-1: '⭐';
            --decoration-2: '🌙';
        }

        [data-mode="dark"] {
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
        }

        [data-mode="dark"][data-theme="orange"] {
            --bg-gradient-1: #1a0f00;
            --bg-gradient-2: #2d1810;
            --bg-gradient-3: #1a0f00;
            --card-bg: rgba(40, 30, 20, 0.9);
        }

        [data-mode="dark"][data-theme="sakura"] {
            --bg-gradient-1: #1a0a10;
            --bg-gradient-2: #2d1020;
            --bg-gradient-3: #1a0a10;
            --card-bg: rgba(40, 20, 30, 0.9);
        }

        [data-mode="dark"][data-theme="lavender"] {
            --bg-gradient-1: #0f0a1a;
            --bg-gradient-2: #1a102d;
            --bg-gradient-3: #0f0a1a;
            --card-bg: rgba(30, 20, 40, 0.9);
        }

        [data-mode="dark"][data-theme="ocean"] {
            --bg-gradient-1: #0a0f1a;
            --bg-gradient-2: #101a2d;
            --bg-gradient-3: #0a0f1a;
            --card-bg: rgba(20, 30, 40, 0.9);
        }

        [data-mode="dark"][data-theme="forest"] {
            --bg-gradient-1: #0a1a0f;
            --bg-gradient-2: #102d1a;
            --bg-gradient-3: #0a1a0f;
            --card-bg: rgba(20, 40, 30, 0.9);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .theme-panel h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-section {
            margin-bottom: 1.2rem;
        }

        .theme-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .color-themes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .color-theme-btn {
            padding: 0.5rem;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        .color-theme-btn:hover {
            transform: scale(1.05);
        }

        .color-theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .color-theme-btn[data-theme="orange"] {
            background: linear-gradient(135deg, #ff7f50, #ff6347);
        }

        .color-theme-btn[data-theme="sakura"] {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .color-theme-btn[data-theme="lavender"] {
            background: linear-gradient(135deg, #ba68c8, #9c27b0);
        }

        .color-theme-btn[data-theme="ocean"] {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .color-theme-btn[data-theme="forest"] {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }

        .color-theme-btn[data-theme="midnight"] {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
        }
        .nickname-section {
            margin-bottom: 1.2rem;
        }

        .nickname-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .nickname-input-group:last-child {
            margin-bottom: 0;
        }

        .nickname-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 60px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .nickname-input {
            flex: 1;
            padding: 0.5rem 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nickname-input:focus {
            outline: none;
            border-color: var(--btn-gradient-1);
        }

        .nickname-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .save-nickname-btn {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .save-nickname-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px var(--btn-shadow);
        }

        .save-nickname-btn:active {
            transform: scale(0.98);
        }

        .random-theme-btn {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .random-theme-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .random-theme-btn:active {
            transform: scale(0.98);
        }


        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mode-btn:hover {
            border-color: var(--btn-gradient-1);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border-color: transparent;
        }

        body {
            transition: all 0.5s ease;
        }

        body::before {
            content: var(--decoration-1);
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: var(--decoration-2);
            position: fixed;
            top: 60%;
            right: 5%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .player {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            min-width: 120px;
        }

        .player-1 {
            background: rgba(255, 107, 107, 0.3);
            border: 2px solid #ff6b6b;
        }

        .player-2 {
            background: rgba(78, 205, 196, 0.3);
            border: 2px solid #4ecdc4;
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.3rem;
        }

        .round-info {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .game-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            margin: 1.5rem 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .game-area.waiting {
            background: rgba(255, 193, 7, 0.2);
            border-color: #ffc107;
        }

        .game-area.ready {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4caf50;
            animation: pulse 0.5s ease infinite alternate;
        }

        .game-area.result {
            background: rgba(33, 150, 243, 0.2);
            border-color: #2196f3;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.02); }
        }

        .prompt {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .instruction {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .reaction-times {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 1.1rem;
        }

        .reaction-time {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
        }

        .reaction-time.fast {
            color: #4caf50;
            font-weight: bold;
        }

        .reaction-time.slow {
            color: #ff9800;
        }

        .winner-announcement {
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-top: 1rem;
            animation: bounce 0.5s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .control-info h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .key {
            display: inline-block;
            background: #333;
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            margin: 0.2rem;
            font-family: monospace;
            font-size: 1.2rem;
            border: 1px solid #555;
            box-shadow: 0 2px 0 #222;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: linear-gradient(90deg, #666, #444);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #ff7f50, #ff6347);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 127, 80, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 127, 80, 0.6);
        }



        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 1.8rem;
            }
            .prompt {
                font-size: 1.5rem;
            }
            .controls {
                gap: 1rem;
            }
            .control-info {
                padding: 0.6rem 1.2rem;
            }
            .key {
                padding: 0.4rem 0.8rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body data-theme="orange" data-mode="light">
    <div class="theme-toggle">
        <button class="theme-btn" id="themeBtn" title="切换主题">🎨</button>
    </div>

    <div class="theme-panel" id="themePanel">
        <h3>🎨 主题设置</h3>
        
        <div class="theme-section">
            <div class="theme-section-title">选择颜色</div>
            <div class="color-themes">
                <button class="color-theme-btn" data-theme="orange">🍊 橘色</button>
                <button class="color-theme-btn" data-theme="sakura">🌸 粉色</button>
                <button class="color-theme-btn" data-theme="lavender">💜 紫色</button>
                <button class="color-theme-btn" data-theme="ocean">💙 蓝色</button>
                <button class="color-theme-btn" data-theme="forest">💚 绿色</button>
                <button class="color-theme-btn" data-theme="midnight">🌙 暗夜</button>
            </div>
        </div>
        
        <div class="theme-section">
            <div class="theme-section-title">显示模式</div>
            <div class="mode-toggle">
                <button class="mode-btn" data-mode="light">☀️ 浅色</button>
                <button class="mode-btn" data-mode="dark">🌙 深色</button>
            </div>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
    
    <div class="game-container">
        <h1>⚡ 反应力测试对战</h1>
        
        <div class="scoreboard">
            <div class="player player-1">
                <div>🔴 玩家 1</div>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player player-2">
                <div>🔵 玩家 2</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="round-info" id="roundInfo">第 1 轮 / 共 5 轮</div>

        <div class="game-area" id="gameArea">
            <div class="prompt" id="prompt">准备好了吗？</div>
            <div class="instruction" id="instruction">按 空格键 开始下一轮</div>
        </div>

        <div class="reaction-times" id="reactionTimes" style="display: none;">
            <div class="reaction-time" id="time1">玩家1: -- ms</div>
            <div class="reaction-time" id="time2">玩家2: -- ms</div>
        </div>

        <div class="stats">
            <div>最快反应: <span id="fastestTime">-- ms</span></div>
            <div>平均反应: <span id="avgTime">-- ms</span></div>
        </div>

        <div class="controls">
            <div class="control-info">
                <h3>🎮 玩家 1</h3>
                <span class="key">Q</span> 按下
            </div>
            <div class="control-info">
                <h3>🎮 玩家 2</h3>
                <span class="key">P</span> 按下
            </div>
        </div>

        <div class="button-group">
            <button id="startBtn">▶️ 开始游戏</button>
            <button id="resetBtn" class="secondary">🔄 重新开始</button>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const promptEl = document.getElementById('prompt');
        const instructionEl = document.getElementById('instruction');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const roundInfoEl = document.getElementById('roundInfo');
        const reactionTimesEl = document.getElementById('reactionTimes');
        const time1El = document.getElementById('time1');
        const time2El = document.getElementById('time2');
        const fastestTimeEl = document.getElementById('fastestTime');
        const avgTimeEl = document.getElementById('avgTime');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        const TOTAL_ROUNDS = 5;
        let currentRound = 1;
        let score1 = 0;
        let score2 = 0;
        let gameState = 'idle';
        let startTime = 0;
        let timeoutId = null;
        let player1Time = null;
        let player2Time = null;
        let allTimes = [];
        let roundStarted = false;

        function initGame() {
            currentRound = 1;
            score1 = 0;
            score2 = 0;
            allTimes = [];
            gameState = 'idle';
            roundStarted = false;
            
            updateScore();
            updateRoundInfo();
            resetDisplay();
            updateStats();
        }

        function updateScore() {
            score1El.textContent = score1;
            score2El.textContent = score2;
        }

        function updateRoundInfo() {
            roundInfoEl.textContent = `第 ${currentRound} 轮 / 共 ${TOTAL_ROUNDS} 轮`;
        }

        function resetDisplay() {
            gameArea.className = 'game-area';
            promptEl.textContent = '准备好了吗？';
            instructionEl.textContent = '按 空格键 开始下一轮';
            reactionTimesEl.style.display = 'none';
            startBtn.textContent = '▶️ 开始游戏';
        }

        function updateStats() {
            if (allTimes.length > 0) {
                const fastest = Math.min(...allTimes);
                const avg = Math.round(allTimes.reduce((a, b) => a + b, 0) / allTimes.length);
                fastestTimeEl.textContent = `${fastest} ms`;
                avgTimeEl.textContent = `${avg} ms`;
            } else {
                fastestTimeEl.textContent = '-- ms';
                avgTimeEl.textContent = '-- ms';
            }
        }

        function startRound() {
            if (gameState !== 'idle') return;
            
            gameState = 'waiting';
            roundStarted = false;
            player1Time = null;
            player2Time = null;
            
            gameArea.className = 'game-area waiting';
            promptEl.textContent = '等待...';
            instructionEl.textContent = '看到绿色后立即按下你的按键！';
            reactionTimesEl.style.display = 'none';
            startBtn.textContent = '⏸️ 进行中';
            
            const delay = Math.random() * 3000 + 1000;
            timeoutId = setTimeout(() => {
                gameState = 'ready';
                roundStarted = true;
                startTime = Date.now();
                gameArea.className = 'game-area ready';
                promptEl.textContent = '按！';
                instructionEl.textContent = '快！快！快！';
            }, delay);
        }

        function handlePress(player) {
            if (gameState === 'waiting') {
                clearTimeout(timeoutId);
                gameState = 'result';
                gameArea.className = 'game-area result';
                
                const otherPlayer = player === 1 ? 2 : 1;
                promptEl.innerHTML = `<span style="color: #ff6b6b;">太早了！</span>`;
                instructionEl.textContent = `玩家 ${player} 抢跑了！玩家 ${otherPlayer} 得分`;
                
                if (player === 1) {
                    score2++;
                } else {
                    score1++;
                }
                updateScore();
                
                showRoundResult();
                return;
            }
            
            if (gameState !== 'ready') return;
            
            const reactionTime = Date.now() - startTime;
            
            if (player === 1 && player1Time === null) {
                player1Time = reactionTime;
            } else if (player === 2 && player2Time === null) {
                player2Time = reactionTime;
            }
            
            if (player1Time !== null && player2Time !== null) {
                gameState = 'result';
                gameArea.className = 'game-area result';
                
                allTimes.push(player1Time, player2Time);
                
                if (player1Time < player2Time) {
                    score1++;
                    promptEl.innerHTML = `<span style="color: #ff6b6b;">玩家 1 更快！</span>`;
                    instructionEl.textContent = `玩家 1 反应时间: ${player1Time}ms vs 玩家 2: ${player2Time}ms`;
                    time1El.className = 'reaction-time fast';
                    time2El.className = 'reaction-time slow';
                } else if (player2Time < player1Time) {
                    score2++;
                    promptEl.innerHTML = `<span style="color: #4ecdc4;">玩家 2 更快！</span>`;
                    instructionEl.textContent = `玩家 2 反应时间: ${player2Time}ms vs 玩家 1: ${player1Time}ms`;
                    time1El.className = 'reaction-time slow';
                    time2El.className = 'reaction-time fast';
                } else {
                    promptEl.innerHTML = `<span style="color: #ffd700;">平局！</span>`;
                    instructionEl.textContent = `双方反应时间相同: ${player1Time}ms`;
                    time1El.className = 'reaction-time';
                    time2El.className = 'reaction-time';
                }
                
                time1El.textContent = `玩家1: ${player1Time} ms`;
                time2El.textContent = `玩家2: ${player2Time} ms`;
                reactionTimesEl.style.display = 'flex';
                
                updateScore();
                updateStats();
                showRoundResult();
            }
        }

        function showRoundResult() {
            if (currentRound >= TOTAL_ROUNDS) {
                setTimeout(() => {
                    showFinalResult();
                }, 2000);
            } else {
                currentRound++;
                updateRoundInfo();
                setTimeout(() => {
                    gameState = 'idle';
                    resetDisplay();
                }, 2000);
            }
        }

        function showFinalResult() {
            gameState = 'finished';
            gameArea.className = 'game-area result';
            
            let result;
            if (score1 > score2) {
                result = `<div class="winner-announcement">🎉 玩家 1 获胜！🎉</div>`;
            } else if (score2 > score1) {
                result = `<div class="winner-announcement">🎉 玩家 2 获胜！🎉</div>`;
            } else {
                result = `<div class="winner-announcement">🤝 平局！</div>`;
            }
            
            promptEl.innerHTML = result;
            instructionEl.innerHTML = `最终比分: ${score1} - ${score2}<br>按 R 键重新开始`;
            reactionTimesEl.style.display = 'none';
            startBtn.textContent = '🔄 再来一局';
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === ' ') {
                e.preventDefault();
                if (gameState === 'idle') {
                    startRound();
                }
                return;
            }
            
            if (key === 'r') {
                resetGame();
                return;
            }
            
            if (key === 'q') {
                handlePress(1);
            } else if (key === 'p') {
                handlePress(2);
            }
        });

        function resetGame() {
            clearTimeout(timeoutId);
            initGame();
        }

        startBtn.addEventListener('click', () => {
            if (gameState === 'idle') {
                startRound();
            } else if (gameState === 'finished') {
                resetGame();
            }
        });
        resetBtn.addEventListener('click', resetGame);
        
        initGame();
    </script>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeBtn');
            const themePanel = document.getElementById('themePanel');
            const randomThemeBtn = document.getElementById('randomThemeBtn');
            const player1NameInput = document.getElementById('player1Name');
            const player2NameInput = document.getElementById('player2Name');
            const saveNicknameBtn = document.getElementById('saveNicknameBtn');
            
            const savedPlayer1Name = localStorage.getItem('couple-game-player1') || '玩家1';
            const savedPlayer2Name = localStorage.getItem('couple-game-player2') || '玩家2';
            
            player1NameInput.value = savedPlayer1Name;
            player2NameInput.value = savedPlayer2Name;
            
            saveNicknameBtn.addEventListener('click', () => {
                const p1 = player1NameInput.value.trim() || '玩家1';
                const p2 = player2NameInput.value.trim() || '玩家2';
                
                localStorage.setItem('couple-game-player1', p1);
                localStorage.setItem('couple-game-player2', p2);
                
                saveNicknameBtn.textContent = '✅ 已保存';
                setTimeout(() => {
                    saveNicknameBtn.textContent = '💾 保存昵称';
                }, 1500);
            });


            const colorThemeBtns = document.querySelectorAll('.color-theme-btn');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const body = document.body;

            const savedTheme = localStorage.getItem('couple-game-theme') || 'orange';
            const savedMode = localStorage.getItem('couple-game-mode') || 'light';

            function applyTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
                
                colorThemeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                localStorage.setItem('couple-game-theme', theme);
                localStorage.setItem('couple-game-mode', mode);
            }

            applyTheme(savedTheme, savedMode);
            let appliedTheme = savedTheme;
            let appliedMode = savedMode;

            function previewTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
            }

            function restoreTheme() {
                body.setAttribute('data-theme', appliedTheme);
                body.setAttribute('data-mode', appliedMode);
            }


            themeBtn.addEventListener('click', () => {
                themePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
                    themePanel.classList.remove('active');
                }
            });

            
            colorThemeBtns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    previewTheme(theme, mode);
                });
                
                btn.addEventListener('mouseleave', () => {
                    restoreTheme();
                });
                
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    appliedTheme = theme;
                    appliedMode = mode;
                    applyTheme(theme, mode);
                });
            });


            
            modeBtns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    previewTheme(theme, mode);
                });
                
                btn.addEventListener('mouseleave', () => {
                    restoreTheme();
                });
                
                btn.addEventListener('click', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    appliedTheme = theme;
                    appliedMode = mode;
                    applyTheme(theme, mode);
                });
            });

            randomThemeBtn.addEventListener('click', () => {
                const themes = ['orange', 'sakura', 'lavender', 'ocean', 'forest', 'midnight'];
                const currentTheme = body.getAttribute('data-theme');
                const currentMode = body.getAttribute('data-mode');
                
                let availableThemes = themes.filter(t => t !== currentTheme);
                const randomTheme = availableThemes[Math.floor(Math.random() * availableThemes.length)];
                
                randomThemeBtn.style.transform = 'rotate(360deg)';
                setTimeout(() => {
                    randomThemeBtn.style.transform = '';
                }, 300);
                
                applyTheme(randomTheme, currentMode);
            });

        })();
    </script>
</body>
</html>
