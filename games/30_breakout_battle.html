<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .player-lives {
            font-size: 24px;
            margin-top: 10px;
        }

        .game-area {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-board {
            border: 3px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">🎮 打砖块对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
            <div class="player-lives" id="lives1">❤️❤️❤️</div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="500" height="400"></canvas>
            <div class="turn-indicator" id="turnIndicator">玩家1 发球</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
            <div class="player-lives" id="lives2">❤️❤️❤️</div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 玩家1: ← → 移动球拍 | 空格键 发球</p>
        <p>🎯 玩家2: A D 移动球拍 | W 键 发球</p>
        <p>🧱 打破砖块得分，先失去3条命的玩家输</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const PADDLE_WIDTH = 100;
        const PADDLE_HEIGHT = 15;
        const BALL_SIZE = 15;
        const BRICK_ROWS = 4;
        const BRICK_COLS = 8;
        const BRICK_WIDTH = 55;
        const BRICK_HEIGHT = 25;
        const BRICK_PADDING = 8;
        const BRICK_OFFSET_TOP = 60;
        const BRICK_OFFSET_LEFT = 15;

        let paddle1 = { x: 200, y: 380 };
        let paddle2 = { x: 200, y: 25 };
        let ball = { x: 250, y: 200, dx: 4, dy: 4 };
        let bricks = [];
        let currentPlayer = 1;
        let scores = [0, 0];
        let lives = [3, 3];
        let isGameRunning = false;
        let isPaused = false;
        let isServing = true;

        function initBricks() {
            bricks = [];
            const colors = ['#ff6b6b', '#fdcb6e', '#00b894', '#74b9ff'];
            
            for (let row = 0; row < BRICK_ROWS; row++) {
                bricks[row] = [];
                for (let col = 0; col < BRICK_COLS; col++) {
                    bricks[row][col] = {
                        x: col * (BRICK_WIDTH + BRICK_PADDING) + BRICK_OFFSET_LEFT,
                        y: row * (BRICK_HEIGHT + BRICK_PADDING) + BRICK_OFFSET_TOP,
                        color: colors[row],
                        visible: true
                    };
                }
            }
        }

        function drawBricks() {
            for (let row = 0; row < BRICK_ROWS; row++) {
                for (let col = 0; col < BRICK_COLS; col++) {
                    const brick = bricks[row][col];
                    if (brick.visible) {
                        ctx.fillStyle = brick.color;
                        ctx.fillRect(brick.x, brick.y, BRICK_WIDTH, BRICK_HEIGHT);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(brick.x, brick.y, BRICK_WIDTH, BRICK_HEIGHT);
                    }
                }
            }
        }

        function drawPaddles() {
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.roundRect(paddle1.x, paddle1.y, PADDLE_WIDTH, PADDLE_HEIGHT, 8);
            ctx.fill();
            
            ctx.fillStyle = '#4ecdc4';
            ctx.beginPath();
            ctx.roundRect(paddle2.x, paddle2.y, PADDLE_WIDTH, PADDLE_HEIGHT, 8);
            ctx.fill();
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_SIZE, 0, Math.PI * 2);
            ctx.fillStyle = '#2d3436';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function resetBall(player) {
            ball.x = canvas.width / 2;
            ball.y = player === 1 ? paddle1.y - BALL_SIZE - 5 : paddle2.y + PADDLE_HEIGHT + 5;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 4;
            ball.dy = player === 1 ? -4 : 4;
            isServing = true;
            currentPlayer = player;
            document.getElementById('turnIndicator').textContent = `${document.getElementById(`player${player}Name`).value} 发球`;
        }

        function serveBall() {
            if (!isServing) return;
            isServing = false;
            document.getElementById('turnIndicator').textContent = '游戏中';
        }

        function movePaddle1(direction) {
            if (direction === 'left') {
                paddle1.x = Math.max(0, paddle1.x - 20);
            } else {
                paddle1.x = Math.min(canvas.width - PADDLE_WIDTH, paddle1.x + 20);
            }
            if (isServing && currentPlayer === 1) {
                ball.x = paddle1.x + PADDLE_WIDTH / 2;
            }
        }

        function movePaddle2(direction) {
            if (direction === 'left') {
                paddle2.x = Math.max(0, paddle2.x - 20);
            } else {
                paddle2.x = Math.min(canvas.width - PADDLE_WIDTH, paddle2.x + 20);
            }
            if (isServing && currentPlayer === 2) {
                ball.x = paddle2.x + PADDLE_WIDTH / 2;
            }
        }

        function updateBall() {
            if (isServing) return;
            
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            if (ball.x - BALL_SIZE < 0 || ball.x + BALL_SIZE > canvas.width) {
                ball.dx *= -1;
            }
            
            if (ball.y + BALL_SIZE > paddle1.y && 
                ball.y - BALL_SIZE < paddle1.y + PADDLE_HEIGHT &&
                ball.x > paddle1.x && 
                ball.x < paddle1.x + PADDLE_WIDTH) {
                ball.dy *= -1;
                ball.y = paddle1.y - BALL_SIZE;
                ball.dx = ((ball.x - (paddle1.x + PADDLE_WIDTH / 2)) / (PADDLE_WIDTH / 2)) * 6;
            }
            
            if (ball.y - BALL_SIZE < paddle2.y + PADDLE_HEIGHT && 
                ball.y + BALL_SIZE > paddle2.y &&
                ball.x > paddle2.x && 
                ball.x < paddle2.x + PADDLE_WIDTH) {
                ball.dy *= -1;
                ball.y = paddle2.y + PADDLE_HEIGHT + BALL_SIZE;
                ball.dx = ((ball.x - (paddle2.x + PADDLE_WIDTH / 2)) / (PADDLE_WIDTH / 2)) * 6;
            }
            
            for (let row = 0; row < BRICK_ROWS; row++) {
                for (let col = 0; col < BRICK_COLS; col++) {
                    const brick = bricks[row][col];
                    if (brick.visible) {
                        if (ball.x + BALL_SIZE > brick.x && 
                            ball.x - BALL_SIZE < brick.x + BRICK_WIDTH &&
                            ball.y + BALL_SIZE > brick.y && 
                            ball.y - BALL_SIZE < brick.y + BRICK_HEIGHT) {
                            ball.dy *= -1;
                            brick.visible = false;
                            scores[currentPlayer - 1] += 10;
                            updateScoreDisplay();
                            
                            let allDestroyed = true;
                            for (let r = 0; r < BRICK_ROWS; r++) {
                                for (let c = 0; c < BRICK_COLS; c++) {
                                    if (bricks[r][c].visible) {
                                        allDestroyed = false;
                                        break;
                                    }
                                }
                                if (!allDestroyed) break;
                            }
                            
                            if (allDestroyed) {
                                initBricks();
                                scores[currentPlayer - 1] += 50;
                                updateScoreDisplay();
                            }
                        }
                    }
                }
            }
            
            if (ball.y + BALL_SIZE > canvas.height) {
                lives[0]--;
                updateLivesDisplay();
                if (lives[0] <= 0) {
                    endGame();
                } else {
                    resetBall(2);
                }
            }
            
            if (ball.y - BALL_SIZE < 0) {
                lives[1]--;
                updateLivesDisplay();
                if (lives[1] <= 0) {
                    endGame();
                } else {
                    resetBall(1);
                }
            }
        }

        function updateScoreDisplay() {
            document.getElementById('score1').textContent = scores[0];
            document.getElementById('score2').textContent = scores[1];
        }

        function updateLivesDisplay() {
            document.getElementById('lives1').textContent = '❤️'.repeat(lives[0]);
            document.getElementById('lives2').textContent = '❤️'.repeat(lives[1]);
        }

        function endGame() {
            isGameRunning = false;
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            let winner = '';
            if (lives[0] <= 0) {
                winner = document.getElementById('player2Name').value;
            } else {
                winner = document.getElementById('player1Name').value;
            }
            
            winnerText.textContent = `${winner} 获胜!`;
            overlay.classList.remove('hidden');
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isGameRunning && !isPaused) {
                drawBricks();
                drawPaddles();
                drawBall();
                updateBall();
            } else if (isPaused) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2);
            }
            
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            scores = [0, 0];
            lives = [3, 3];
            currentPlayer = 1;
            paddle1 = { x: 200, y: 380 };
            paddle2 = { x: 200, y: 25 };
            updateScoreDisplay();
            updateLivesDisplay();
            initBricks();
            resetBall(1);
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('打砖块对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${scores[0]} 分`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${scores[1]} 分`, 450, 150);
            
            ctx.fillText(`剩余生命: ${lives[0]}`, 150, 200);
            ctx.fillText(`剩余生命: ${lives[1]}`, 450, 200);
            
            let result = '';
            if (scores[0] > scores[1]) {
                result = `${document.getElementById('player1Name').value} 获胜!`;
            } else if (scores[1] > scores[0]) {
                result = `${document.getElementById('player2Name').value} 获胜!`;
            } else {
                result = '平局!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(result, canvas.width / 2, 280);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('🎮 couple-mini-game', canvas.width / 2, 350);
            
            const link = document.createElement('a');
            link.download = 'breakout_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
                return;
            }
            
            if (isPaused) return;
            
            if (e.key === 'ArrowLeft') movePaddle1('left');
            if (e.key === 'ArrowRight') movePaddle1('right');
            if (e.key === 'a' || e.key === 'A') movePaddle2('left');
            if (e.key === 'd' || e.key === 'D') movePaddle2('right');
            
            if (currentPlayer === 1 && e.code === 'Space') {
                e.preventDefault();
                serveBall();
            }
            if (currentPlayer === 2 && (e.key === 'w' || e.key === 'W')) {
                e.preventDefault();
                serveBall();
            }
        });

        gameLoop();
    </script>
</body>
</html>
