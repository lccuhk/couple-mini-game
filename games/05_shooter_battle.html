<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>射击对战</title>
    <style>
        :root {
            --bg-gradient-1: #ffecd2;
            --bg-gradient-2: #fcb69f;
            --bg-gradient-3: #ffd89b;
            --primary-color: #e65100;
            --secondary-color: #f57c00;
            --accent-color: #bf360c;
            --btn-gradient-1: #ff7f50;
            --btn-gradient-2: #ff6347;
            --btn-shadow: rgba(255, 127, 80, 0.4);
            --btn-shadow-hover: rgba(255, 127, 80, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 165, 0, 0.4);
            --card-hover-border: #ff7f50;
            --card-shadow: rgba(255, 127, 80, 0.3);
            --text-primary: #4e342e;
            --text-secondary: #6d4c41;
            --tag-bg-1: #fff3e0;
            --tag-bg-2: #ffe0b2;
            --tag-text: #ef6c00;
            --divider-color: #ffcc80;
            --link-color: #e65100;
            --decoration-1: '🧡';
            --decoration-2: '🍊';
        }

        [data-theme="sakura"] {
            --bg-gradient-1: #ff9a9e;
            --bg-gradient-2: #fecfef;
            --bg-gradient-3: #fecfef;
            --primary-color: #d63384;
            --secondary-color: #c2185b;
            --accent-color: #8b4513;
            --btn-gradient-1: #ff6b9d;
            --btn-gradient-2: #c44569;
            --btn-shadow: rgba(255, 107, 157, 0.4);
            --btn-shadow-hover: rgba(255, 107, 157, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 182, 193, 0.5);
            --card-hover-border: #ff6b9d;
            --card-shadow: rgba(255, 107, 157, 0.3);
            --text-primary: #5a3a3a;
            --text-secondary: #7a5a5a;
            --tag-bg-1: #ffe0e9;
            --tag-bg-2: #ffd1dc;
            --tag-text: #c2185b;
            --divider-color: #ffb6c1;
            --link-color: #d63384;
            --decoration-1: '💕';
            --decoration-2: '💖';
        }

        [data-theme="lavender"] {
            --bg-gradient-1: #a8edea;
            --bg-gradient-2: #fed6e3;
            --bg-gradient-3: #d299c2;
            --primary-color: #7b1fa2;
            --secondary-color: #9c27b0;
            --accent-color: #4a148c;
            --btn-gradient-1: #ba68c8;
            --btn-gradient-2: #9c27b0;
            --btn-shadow: rgba(186, 104, 200, 0.4);
            --btn-shadow-hover: rgba(186, 104, 200, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(186, 104, 200, 0.4);
            --card-hover-border: #ba68c8;
            --card-shadow: rgba(186, 104, 200, 0.3);
            --text-primary: #4a148c;
            --text-secondary: #6a1b9a;
            --tag-bg-1: #f3e5f5;
            --tag-bg-2: #e1bee7;
            --tag-text: #7b1fa2;
            --divider-color: #ce93d8;
            --link-color: #7b1fa2;
            --decoration-1: '💜';
            --decoration-2: '🔮';
        }

        [data-theme="ocean"] {
            --bg-gradient-1: #a1c4fd;
            --bg-gradient-2: #c2e9fb;
            --bg-gradient-3: #89f7fe;
            --primary-color: #1565c0;
            --secondary-color: #1976d2;
            --accent-color: #0d47a1;
            --btn-gradient-1: #42a5f5;
            --btn-gradient-2: #1e88e5;
            --btn-shadow: rgba(66, 165, 245, 0.4);
            --btn-shadow-hover: rgba(66, 165, 245, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(66, 165, 245, 0.4);
            --card-hover-border: #42a5f5;
            --card-shadow: rgba(66, 165, 245, 0.3);
            --text-primary: #0d47a1;
            --text-secondary: #1565c0;
            --tag-bg-1: #e3f2fd;
            --tag-bg-2: #bbdefb;
            --tag-text: #1565c0;
            --divider-color: #90caf9;
            --link-color: #1565c0;
            --decoration-1: '💙';
            --decoration-2: '🌊';
        }

        [data-theme="forest"] {
            --bg-gradient-1: #a8e063;
            --bg-gradient-2: #56ab2f;
            --bg-gradient-3: #a8e063;
            --primary-color: #2e7d32;
            --secondary-color: #388e3c;
            --accent-color: #1b5e20;
            --btn-gradient-1: #66bb6a;
            --btn-gradient-2: #388e3c;
            --btn-shadow: rgba(102, 187, 106, 0.4);
            --btn-shadow-hover: rgba(102, 187, 106, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(102, 187, 106, 0.4);
            --card-hover-border: #66bb6a;
            --card-shadow: rgba(102, 187, 106, 0.3);
            --text-primary: #1b5e20;
            --text-secondary: #2e7d32;
            --tag-bg-1: #e8f5e9;
            --tag-bg-2: #c8e6c9;
            --tag-text: #2e7d32;
            --divider-color: #a5d6a7;
            --link-color: #2e7d32;
            --decoration-1: '💚';
            --decoration-2: '🌿';
        }

        [data-theme="midnight"] {
            --bg-gradient-1: #232526;
            --bg-gradient-2: #414345;
            --bg-gradient-3: #232526;
            --primary-color: #ffd700;
            --secondary-color: #ffc107;
            --accent-color: #ff8f00;
            --btn-gradient-1: #ffd700;
            --btn-gradient-2: #ffc107;
            --btn-shadow: rgba(255, 215, 0, 0.4);
            --btn-shadow-hover: rgba(255, 215, 0, 0.6);
            --card-bg: rgba(50, 50, 50, 0.9);
            --card-border: rgba(255, 215, 0, 0.3);
            --card-hover-border: #ffd700;
            --card-shadow: rgba(255, 215, 0, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --tag-bg-1: #424242;
            --tag-bg-2: #616161;
            --tag-text: #ffd700;
            --divider-color: #ffd700;
            --link-color: #ffd700;
            --decoration-1: '⭐';
            --decoration-2: '🌙';
        }

        [data-mode="dark"] {
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
        }

        [data-mode="dark"][data-theme="orange"] {
            --bg-gradient-1: #1a0f00;
            --bg-gradient-2: #2d1810;
            --bg-gradient-3: #1a0f00;
            --card-bg: rgba(40, 30, 20, 0.9);
        }

        [data-mode="dark"][data-theme="sakura"] {
            --bg-gradient-1: #1a0a10;
            --bg-gradient-2: #2d1020;
            --bg-gradient-3: #1a0a10;
            --card-bg: rgba(40, 20, 30, 0.9);
        }

        [data-mode="dark"][data-theme="lavender"] {
            --bg-gradient-1: #0f0a1a;
            --bg-gradient-2: #1a102d;
            --bg-gradient-3: #0f0a1a;
            --card-bg: rgba(30, 20, 40, 0.9);
        }

        [data-mode="dark"][data-theme="ocean"] {
            --bg-gradient-1: #0a0f1a;
            --bg-gradient-2: #101a2d;
            --bg-gradient-3: #0a0f1a;
            --card-bg: rgba(20, 30, 40, 0.9);
        }

        [data-mode="dark"][data-theme="forest"] {
            --bg-gradient-1: #0a1a0f;
            --bg-gradient-2: #102d1a;
            --bg-gradient-3: #0a1a0f;
            --card-bg: rgba(20, 40, 30, 0.9);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .theme-panel h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-section {
            margin-bottom: 1.2rem;
        }

        .theme-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .color-themes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .color-theme-btn {
            padding: 0.5rem;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        .color-theme-btn:hover {
            transform: scale(1.05);
        }

        .color-theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .color-theme-btn[data-theme="orange"] {
            background: linear-gradient(135deg, #ff7f50, #ff6347);
        }

        .color-theme-btn[data-theme="sakura"] {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .color-theme-btn[data-theme="lavender"] {
            background: linear-gradient(135deg, #ba68c8, #9c27b0);
        }

        .color-theme-btn[data-theme="ocean"] {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .color-theme-btn[data-theme="forest"] {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }

        .color-theme-btn[data-theme="midnight"] {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mode-btn:hover {
            border-color: var(--btn-gradient-1);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border-color: transparent;
        }

        body {
            transition: all 0.5s ease;
        }

        body::before {
            content: var(--decoration-1);
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: var(--decoration-2);
            position: fixed;
            top: 60%;
            right: 5%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .player {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            min-width: 120px;
        }

        .player-1 {
            background: rgba(255, 107, 107, 0.3);
            border: 2px solid #ff6b6b;
        }

        .player-2 {
            background: rgba(78, 205, 196, 0.3);
            border: 2px solid #4ecdc4;
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.3rem;
        }

        .game-status {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            min-height: 1.5rem;
        }

        .winner {
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #gameCanvas {
            border: 3px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.2), 0 0 60px rgba(78, 205, 196, 0.1);
            background: #0a0a0a;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .control-info h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .key {
            display: inline-block;
            background: #333;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            margin: 0.2rem;
            font-family: monospace;
            border: 1px solid #555;
            box-shadow: 0 2px 0 #222;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: linear-gradient(90deg, #666, #444);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #ff7f50, #ff6347);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 127, 80, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 127, 80, 0.6);
        }



        @media (max-width: 600px) {
            #gameCanvas {
                width: 100%;
                max-width: 350px;
                height: auto;
            }
            h1 {
                font-size: 1.8rem;
            }
            .controls {
                gap: 1rem;
            }
            .control-info {
                padding: 0.6rem 1.2rem;
            }
        }
    </style>
</head>
<body data-theme="orange" data-mode="light">
    <div class="theme-toggle">
        <button class="theme-btn" id="themeBtn" title="切换主题">🎨</button>
    </div>

    <div class="theme-panel" id="themePanel">
        <h3>🎨 主题设置</h3>
        
        <div class="theme-section">
            <div class="theme-section-title">选择颜色</div>
            <div class="color-themes">
                <button class="color-theme-btn" data-theme="orange">🍊 橘色</button>
                <button class="color-theme-btn" data-theme="sakura">🌸 粉色</button>
                <button class="color-theme-btn" data-theme="lavender">💜 紫色</button>
                <button class="color-theme-btn" data-theme="ocean">💙 蓝色</button>
                <button class="color-theme-btn" data-theme="forest">💚 绿色</button>
                <button class="color-theme-btn" data-theme="midnight">🌙 暗夜</button>
            </div>
        </div>
        
        <div class="theme-section">
            <div class="theme-section-title">显示模式</div>
            <div class="mode-toggle">
                <button class="mode-btn" data-mode="light">☀️ 浅色</button>
                <button class="mode-btn" data-mode="dark">🌙 深色</button>
            </div>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
    
    <div class="game-container">
        <h1>🎯 射击对战</h1>
        
        <div class="scoreboard">
            <div class="player player-1">
                <div>🔴 玩家 1</div>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player player-2">
                <div>🔵 玩家 2</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="game-status" id="gameStatus">按 空格键 开始游戏</div>

        <canvas id="gameCanvas" width="800" height="400" tabindex="0"></canvas>

        <div class="controls">
            <div class="control-info">
                <h3>🎮 玩家 1 控制</h3>
                <span class="key">W</span> 上<br>
                <span class="key">S</span> 下<br>
                <span class="key">A</span> 左<br>
                <span class="key">D</span> 右<br>
                <span class="key">F</span> 射击
            </div>
            <div class="control-info">
                <h3>🎮 玩家 2 控制</h3>
                <span class="key">↑</span> 上<br>
                <span class="key">↓</span> 下<br>
                <span class="key">←</span> 左<br>
                <span class="key">→</span> 右<br>
                <span class="key">/</span> 射击
            </div>
        </div>

        <div class="button-group">
            <button id="restartBtn">🔄 重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const gameStatusEl = document.getElementById('gameStatus');
        const restartBtn = document.getElementById('restartBtn');

        const PLAYER_SIZE = 30;
        const BULLET_SIZE = 6;
        const PLAYER_SPEED = 5;
        const BULLET_SPEED = 10;
        const SHOOT_COOLDOWN = 300;
        const WINNING_SCORE = 5;

        let gameRunning = false;
        let score1 = 0;
        let score2 = 0;

        let player1, player2;
        let bullets1, bullets2;

        function initGame() {
            player1 = {
                x: 100,
                y: canvas.height / 2 - PLAYER_SIZE / 2,
                width: PLAYER_SIZE,
                height: PLAYER_SIZE,
                color: '#ff6b6b',
                lastShot: 0,
                lives: 3
            };

            player2 = {
                x: canvas.width - 100 - PLAYER_SIZE,
                y: canvas.height / 2 - PLAYER_SIZE / 2,
                width: PLAYER_SIZE,
                height: PLAYER_SIZE,
                color: '#4ecdc4',
                lastShot: 0,
                lives: 3
            };

            bullets1 = [];
            bullets2 = [];
            
            score1 = 0;
            score2 = 0;
            updateScore();
            draw();
        }

        function updateScore() {
            score1El.textContent = score1;
            score2El.textContent = score2;
        }

        const keys = {};

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            keys[key] = true;
            
            if (['w', 'a', 's', 'd', 'f', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', '/', ' '].includes(key)) {
                e.preventDefault();
            }
            
            if (key === ' ') {
                canvas.focus();
                if (!gameRunning) {
                    startGame();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function updatePlayers() {
            if (keys['w']) player1.y -= PLAYER_SPEED;
            if (keys['s']) player1.y += PLAYER_SPEED;
            if (keys['a']) player1.x -= PLAYER_SPEED;
            if (keys['d']) player1.x += PLAYER_SPEED;
            
            if (keys['arrowup']) player2.y -= PLAYER_SPEED;
            if (keys['arrowdown']) player2.y += PLAYER_SPEED;
            if (keys['arrowleft']) player2.x -= PLAYER_SPEED;
            if (keys['arrowright']) player2.x += PLAYER_SPEED;

            player1.x = Math.max(0, Math.min(canvas.width / 2 - PLAYER_SIZE, player1.x));
            player1.y = Math.max(0, Math.min(canvas.height - PLAYER_SIZE, player1.y));
            
            player2.x = Math.max(canvas.width / 2, Math.min(canvas.width - PLAYER_SIZE, player2.x));
            player2.y = Math.max(0, Math.min(canvas.height - PLAYER_SIZE, player2.y));

            const now = Date.now();
            
            if (keys['f'] && now - player1.lastShot > SHOOT_COOLDOWN) {
                bullets1.push({
                    x: player1.x + PLAYER_SIZE,
                    y: player1.y + PLAYER_SIZE / 2 - BULLET_SIZE / 2,
                    dx: BULLET_SPEED,
                    dy: 0
                });
                player1.lastShot = now;
            }
            
            if (keys['/'] && now - player2.lastShot > SHOOT_COOLDOWN) {
                bullets2.push({
                    x: player2.x - BULLET_SIZE,
                    y: player2.y + PLAYER_SIZE / 2 - BULLET_SIZE / 2,
                    dx: -BULLET_SPEED,
                    dy: 0
                });
                player2.lastShot = now;
            }
        }

        function updateBullets() {
            bullets1 = bullets1.filter(bullet => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;
                
                if (bullet.x > canvas.width) return false;
                
                if (checkCollision(bullet, player2)) {
                    score1++;
                    updateScore();
                    if (score1 >= WINNING_SCORE) {
                        endGame(1);
                    } else {
                        respawnPlayer(player2);
                    }
                    return false;
                }
                
                return true;
            });

            bullets2 = bullets2.filter(bullet => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;
                
                if (bullet.x < -BULLET_SIZE) return false;
                
                if (checkCollision(bullet, player1)) {
                    score2++;
                    updateScore();
                    if (score2 >= WINNING_SCORE) {
                        endGame(2);
                    } else {
                        respawnPlayer(player1);
                    }
                    return false;
                }
                
                return true;
            });
        }

        function checkCollision(bullet, player) {
            return bullet.x < player.x + player.width &&
                   bullet.x + BULLET_SIZE > player.x &&
                   bullet.y < player.y + player.height &&
                   bullet.y + BULLET_SIZE > player.y;
        }

        function respawnPlayer(player) {
            if (player === player1) {
                player.x = 100;
            } else {
                player.x = canvas.width - 100 - PLAYER_SIZE;
            }
            player.y = canvas.height / 2 - PLAYER_SIZE / 2;
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.shadowBlur = 20;
            ctx.shadowColor = player1.color;
            ctx.fillStyle = player1.color;
            ctx.fillRect(player1.x, player1.y, player1.width, player1.height);
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(player1.x + player1.width - 5, player1.y + player1.height / 2 - 3, 8, 6);

            ctx.shadowColor = player2.color;
            ctx.fillStyle = player2.color;
            ctx.fillRect(player2.x, player2.y, player2.width, player2.height);
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(player2.x - 3, player2.y + player2.height / 2 - 3, 8, 6);

            ctx.shadowColor = '#ff6b6b';
            ctx.fillStyle = '#ff6b6b';
            bullets1.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x + BULLET_SIZE / 2, bullet.y + BULLET_SIZE / 2, BULLET_SIZE / 2, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.shadowColor = '#4ecdc4';
            ctx.fillStyle = '#4ecdc4';
            bullets2.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x + BULLET_SIZE / 2, bullet.y + BULLET_SIZE / 2, BULLET_SIZE / 2, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.shadowBlur = 0;
        }

        function update() {
            if (!gameRunning) return;
            
            updatePlayers();
            updateBullets();
            draw();
        }

        function endGame(winner) {
            gameRunning = false;
            gameStatusEl.innerHTML = `<span class="winner">🎉 玩家 ${winner} 获胜！🎉</span>`;
        }

        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            gameStatusEl.textContent = '游戏进行中...';
            
            gameLoop();
        }

        function resetGame() {
            gameRunning = false;
            initGame();
            gameStatusEl.textContent = '按 空格键 开始游戏';
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('click', () => canvas.focus());
        restartBtn.addEventListener('click', resetGame);
        
        initGame();
    </script>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeBtn');
            const themePanel = document.getElementById('themePanel');
            const colorThemeBtns = document.querySelectorAll('.color-theme-btn');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const body = document.body;

            const savedTheme = localStorage.getItem('couple-game-theme') || 'orange';
            const savedMode = localStorage.getItem('couple-game-mode') || 'light';

            function applyTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
                
                colorThemeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                localStorage.setItem('couple-game-theme', theme);
                localStorage.setItem('couple-game-mode', mode);
            }

            applyTheme(savedTheme, savedMode);

            themeBtn.addEventListener('click', () => {
                themePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
                    themePanel.classList.remove('active');
                }
            });

            colorThemeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    applyTheme(theme, mode);
                });
            });

            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    applyTheme(theme, mode);
                });
            });
        })();
    </script>
</body>
</html>
