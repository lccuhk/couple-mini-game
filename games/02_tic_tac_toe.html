            top: 20px;
            right: 20px;
            z-index: 1000;
        }

            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

            color: var(--primary-color);
            font-size: 1.1rem;

            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .color-themes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .color-theme-btn {
            padding: 0.5rem;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        .color-theme-btn:hover {
            transform: scale(1.05);

        .color-theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .color-theme-btn[data-theme="orange"] {
            background: linear-gradient(135deg, #ff7f50, #ff6347);
        }

        .color-theme-btn[data-theme="sakura"] {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .color-theme-btn[data-theme="lavender"] {
            background: linear-gradient(135deg, #ba68c8, #9c27b0);
        }

        .color-theme-btn[data-theme="ocean"] {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .color-theme-btn[data-theme="forest"] {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }

        .color-theme-btn[data-theme="midnight"] {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;

        .mode-btn:hover {
            border-color: var(--btn-gradient-1);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border-color: transparent;
        }

        body {
            transition: all 0.5s ease;
        }

        body::before {
            content: var(--decoration-1);
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: var(--decoration-2);
            position: fixed;
            top: 60%;
            right: 5%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        }

            min-height: 2rem;
        }

        .board {
            display: grid;

            margin: 0 auto 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .cell {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
    border-radius: 25px;
    color: white;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
    transition: all 0.3s;
    z-index: 1000;
            border-radius: 10px;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .cell:hover:not(.taken) {

        .cell.x {

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;

        button {

<body data-theme="orange" data-mode="light">
    <div class="theme-toggle">
        <button class="theme-btn" id="themeBtn" title="切换主题">🎨</button>
    </div>

    <div class="theme-panel" id="themePanel">
        <h3>🎨 主题设置</h3>
        
        <div class="theme-section">
            <div class="theme-section-title">选择颜色</div>
            <div class="color-themes">
                <button class="color-theme-btn" data-theme="orange">🍊 橘色</button>
                <button class="color-theme-btn" data-theme="sakura">🌸 粉色</button>
                <button class="color-theme-btn" data-theme="lavender">💜 紫色</button>
                <button class="color-theme-btn" data-theme="ocean">💙 蓝色</button>
                <button class="color-theme-btn" data-theme="forest">💚 绿色</button>
                <button class="color-theme-btn" data-theme="midnight">🌙 暗夜</button>
            </div>
        </div>
        
        <div class="theme-section">
            <div class="theme-section-title">显示模式</div>
            <div class="mode-toggle">
                <button class="mode-btn" data-mode="light">☀️ 浅色</button>
                <button class="mode-btn" data-mode="dark">🌙 深色</button>
            </div>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
    
    <div class="game-container">
        <h1>❌⭕ 井字棋对战</h1>
        
        <div class="scoreboard">
            <div class="player player-x">
                <div>玩家 1 (❌)</div>
                <div class="score" id="scoreX">0</div>
            </div>
            <div class="player player-o">
                <div>玩家 2 (⭕)</div>
                <div class="score" id="scoreO">0</div>
            </div>
        </div>

        <div class="current-turn" id="currentTurn">玩家 ❌ 的回合</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="button-group">
            <button id="restartBtn">🔄 重新开始</button>
            <button id="resetScoreBtn" class="secondary">📊 重置比分</button>
        </div>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const currentTurnEl = document.getElementById('currentTurn');
        const scoreXEl = document.getElementById('scoreX');
        const scoreOEl = document.getElementById('scoreO');
        const restartBtn = document.getElementById('restartBtn');
        const resetScoreBtn = document.getElementById('resetScoreBtn');

        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let scoreX = 0;
        let scoreO = 0;

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function handleCellClick(e) {
            const index = parseInt(e.target.dataset.index);
            
            if (board[index] !== '' || !gameActive) return;

            board[index] = currentPlayer;
            e.target.textContent = currentPlayer;
            e.target.classList.add('taken', currentPlayer.toLowerCase());

            if (checkWin()) {
                gameActive = false;
                highlightWinningCells();
                updateScore();
                currentTurnEl.innerHTML = `<span class="winner-text">🎉 玩家 ${currentPlayer} 获胜！🎉</span>`;
                return;
            }

            if (checkDraw()) {
                gameActive = false;
                currentTurnEl.textContent = '🤝 平局！';
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            currentTurnEl.textContent = `玩家 ${currentPlayer === 'X' ? '❌' : '⭕'} 的回合`;
        }

        function checkWin() {
            return winPatterns.some(pattern => {
                return pattern.every(index => board[index] === currentPlayer);
            });
        }

        function checkDraw() {
            return board.every(cell => cell !== '');
        }

        function highlightWinningCells() {
            winPatterns.forEach(pattern => {
                if (pattern.every(index => board[index] === currentPlayer)) {
                    pattern.forEach(index => {
                        cells[index].classList.add('winner');
                    });
                }
            });
        }

        function updateScore() {
            if (currentPlayer === 'X') {
                scoreX++;
                scoreXEl.textContent = scoreX;
            } else {
                scoreO++;
                scoreOEl.textContent = scoreO;
            }
        }

        function restartGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            currentTurnEl.textContent = '玩家 ❌ 的回合';
            
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('taken', 'x', 'o', 'winner');
            });
        }

        function resetScore() {
            scoreX = 0;
            scoreO = 0;
            scoreXEl.textContent = scoreX;
            scoreOEl.textContent = scoreO;
            restartGame();
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        restartBtn.addEventListener('click', restartGame);
        resetScoreBtn.addEventListener('click', resetScore);
    </script>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeBtn');
            const themePanel = document.getElementById('themePanel');
            const colorThemeBtns = document.querySelectorAll('.color-theme-btn');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const body = document.body;

            const savedTheme = localStorage.getItem('couple-game-theme') || 'orange';
            const savedMode = localStorage.getItem('couple-game-mode') || 'light';

            function applyTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
                
                colorThemeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                localStorage.setItem('couple-game-theme', theme);
                localStorage.setItem('couple-game-mode', mode);
            }

            applyTheme(savedTheme, savedMode);

            themeBtn.addEventListener('click', () => {
                themePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
                    themePanel.classList.remove('active');
                }
            });

            colorThemeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    applyTheme(theme, mode);
                });
            });

            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    applyTheme(theme, mode);
                });
            });
        })();
    </script>
</body>
</html>
