<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炸弹人对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .bomb-count {
            font-size: 16px;
            margin-top: 10px;
            color: var(--text-color);
            opacity: 0.7;
        }

        .game-area {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-board {
            border: 3px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">💣 炸弹人对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
            <div class="bomb-count">炸弹: <span id="bombs1">3</span></div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            <div class="turn-indicator" id="turnIndicator">准备开始</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
            <div class="bomb-count">炸弹: <span id="bombs2">3</span></div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 玩家1: ← → ↑ ↓ 移动 | 空格 放置炸弹</p>
        <p>🎯 玩家2: A D W S 移动 | Enter 放置炸弹</p>
        <p>💥 用炸弹炸毁墙壁和敌人，注意别炸到自己!</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const TILE_SIZE = 50;
        const MAP_SIZE = 10;
        const BOMB_RANGE = 2;
        const BOMB_TIMER = 3000;

        let map = [];
        let player1 = { x: 1, y: 1, bombs: 3, score: 0, isAlive: true };
        let player2 = { x: 8, y: 8, bombs: 3, score: 0, isAlive: true };
        let bombs = [];
        let explosions = [];
        
        let isGameRunning = false;
        let isPaused = false;
        let gameWinner = null;

        const EMPTY = 0;
        const WALL = 1;
        const BRICK = 2;

        function initMap() {
            map = [];
            for (let y = 0; y < MAP_SIZE; y++) {
                map[y] = [];
                for (let x = 0; x < MAP_SIZE; x++) {
                    if (x === 0 || x === MAP_SIZE - 1 || y === 0 || y === MAP_SIZE - 1) {
                        map[y][x] = WALL;
                    } else if (Math.random() < 0.3 && !(x <= 2 && y <= 2) && !(x >= 7 && y >= 7)) {
                        map[y][x] = BRICK;
                    } else {
                        map[y][x] = EMPTY;
                    }
                }
            }
        }

        function drawMap() {
            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    switch (map[y][x]) {
                        case WALL:
                            ctx.fillStyle = '#333';
                            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#444';
                            ctx.fillRect(x * TILE_SIZE + 5, y * TILE_SIZE + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                            break;
                        case BRICK:
                            ctx.fillStyle = '#8B4513';
                            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#A0522D';
                            ctx.fillRect(x * TILE_SIZE + 3, y * TILE_SIZE + 3, TILE_SIZE - 6, TILE_SIZE - 6);
                            ctx.fillStyle = '#654321';
                            ctx.fillRect(x * TILE_SIZE + 10, y * TILE_SIZE + 10, TILE_SIZE - 20, 2);
                            ctx.fillRect(x * TILE_SIZE + 10, y * TILE_SIZE + 25, TILE_SIZE - 20, 2);
                            ctx.fillRect(x * TILE_SIZE + 10, y * TILE_SIZE + 40, TILE_SIZE - 20, 2);
                            break;
                        case EMPTY:
                            ctx.fillStyle = '#2d5a27';
                            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#3d7a37';
                            ctx.fillRect(x * TILE_SIZE + 2, y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                            break;
                    }
                }
            }
        }

        function drawPlayer(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2 - 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2 - 10, y * TILE_SIZE + TILE_SIZE/2 - 5, 5, 0, Math.PI * 2);
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2 + 10, y * TILE_SIZE + TILE_SIZE/2 - 5, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2 - 10, y * TILE_SIZE + TILE_SIZE/2 - 5, 2, 0, Math.PI * 2);
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2 + 10, y * TILE_SIZE + TILE_SIZE/2 - 5, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBomb(x, y, timer) {
            const progress = timer / BOMB_TIMER;
            const size = 15 + Math.sin(progress * Math.PI * 4) * 5;
            
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, size - 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff8888';
            ctx.beginPath();
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, size - 10, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawExplosion(x, y, range) {
            ctx.fillStyle = 'rgba(255, 100, 0, 0.7)';
            ctx.beginPath();
            ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2 + 5, 0, Math.PI * 2);
            ctx.fill();
            
            for (let i = 1; i <= range; i++) {
                ctx.beginPath();
                ctx.arc((x + i) * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc((x - i) * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x * TILE_SIZE + TILE_SIZE/2, (y + i) * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x * TILE_SIZE + TILE_SIZE/2, (y - i) * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function isValidMove(x, y) {
            if (x < 0 || x >= MAP_SIZE || y < 0 || y >= MAP_SIZE) return false;
            if (map[y][x] !== EMPTY) return false;
            
            for (const bomb of bombs) {
                if (bomb.x === x && bomb.y === y) return false;
            }
            
            return true;
        }

        function placeBomb(player) {
            if (player.bombs <= 0) return;
            
            const hasBomb = bombs.some(b => b.x === player.x && b.y === player.y);
            if (hasBomb) return;
            
            bombs.push({
                x: player.x,
                y: player.y,
                owner: player === player1 ? 1 : 2,
                timer: BOMB_TIMER,
                placedAt: Date.now()
            });
            
            player.bombs--;
            updateBombDisplay();
        }

        function explodeBomb(bomb) {
            explosions.push({ x: bomb.x, y: bomb.y, range: BOMB_RANGE, timer: 300 });
            
            for (let dx = -BOMB_RANGE; dx <= BOMB_RANGE; dx++) {
                const nx = bomb.x + dx;
                if (nx >= 0 && nx < MAP_SIZE) {
                    if (map[bomb.y][nx] === BRICK) {
                        map[bomb.y][nx] = EMPTY;
                        if (bomb.owner === 1) player1.score += 10;
                        else player2.score += 10;
                        updateScoreDisplay();
                        break;
                    } else if (map[bomb.y][nx] === WALL) {
                        break;
                    }
                }
            }
            
            for (let dy = -BOMB_RANGE; dy <= BOMB_RANGE; dy++) {
                const ny = bomb.y + dy;
                if (ny >= 0 && ny < MAP_SIZE) {
                    if (map[ny][bomb.x] === BRICK) {
                        map[ny][bomb.x] = EMPTY;
                        if (bomb.owner === 1) player1.score += 10;
                        else player2.score += 10;
                        updateScoreDisplay();
                        break;
                    } else if (map[ny][bomb.x] === WALL) {
                        break;
                    }
                }
            }
            
            checkExplosionHit(bomb);
            
            if (bomb.owner === 1) player1.bombs++;
            else player2.bombs++;
            updateBombDisplay();
        }

        function checkExplosionHit(bomb) {
            for (let dx = -BOMB_RANGE; dx <= BOMB_RANGE; dx++) {
                if (player1.x === bomb.x + dx && player1.y === bomb.y && player1.isAlive) {
                    player1.isAlive = false;
                    gameWinner = 2;
                    endGame();
                    return;
                }
                if (player2.x === bomb.x + dx && player2.y === bomb.y && player2.isAlive) {
                    player2.isAlive = false;
                    gameWinner = 1;
                    endGame();
                    return;
                }
            }
            
            for (let dy = -BOMB_RANGE; dy <= BOMB_RANGE; dy++) {
                if (player1.x === bomb.x && player1.y === bomb.y + dy && player1.isAlive) {
                    player1.isAlive = false;
                    gameWinner = 2;
                    endGame();
                    return;
                }
                if (player2.x === bomb.x && player2.y === bomb.y + dy && player2.isAlive) {
                    player2.isAlive = false;
                    gameWinner = 1;
                    endGame();
                    return;
                }
            }
        }

        function updateScoreDisplay() {
            document.getElementById('score1').textContent = player1.score;
            document.getElementById('score2').textContent = player2.score;
        }

        function updateBombDisplay() {
            document.getElementById('bombs1').textContent = player1.bombs;
            document.getElementById('bombs2').textContent = player2.bombs;
        }

        function endGame() {
            isGameRunning = false;
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            const winner = gameWinner === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            winnerText.textContent = `${winner} 获胜!`;
            overlay.classList.remove('hidden');
        }

        const keys1 = { left: false, right: false, up: false, down: false, bomb: false };
        const keys2 = { left: false, right: false, up: false, down: false, bomb: false };

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isGameRunning && !isPaused) {
                drawMap();
                
                bombs.forEach(bomb => {
                    bomb.timer -= 16;
                    drawBomb(bomb.x, bomb.y, bomb.timer);
                    
                    if (bomb.timer <= 0) {
                        explodeBomb(bomb);
                    }
                });
                
                bombs = bombs.filter(b => b.timer > 0);
                
                explosions.forEach(exp => {
                    exp.timer -= 16;
                    drawExplosion(exp.x, exp.y, exp.range);
                });
                
                explosions = explosions.filter(e => e.timer > 0);
                
                if (player1.isAlive) {
                    drawPlayer(player1.x, player1.y, '#4ecdc4');
                    if (keys1.left && isValidMove(player1.x - 1, player1.y)) player1.x--;
                    if (keys1.right && isValidMove(player1.x + 1, player1.y)) player1.x++;
                    if (keys1.up && isValidMove(player1.x, player1.y - 1)) player1.y--;
                    if (keys1.down && isValidMove(player1.x, player1.y + 1)) player1.y++;
                    if (keys1.bomb) {
                        placeBomb(player1);
                        keys1.bomb = false;
                    }
                }
                
                if (player2.isAlive) {
                    drawPlayer(player2.x, player2.y, '#ff6b6b');
                    if (keys2.left && isValidMove(player2.x - 1, player2.y)) player2.x--;
                    if (keys2.right && isValidMove(player2.x + 1, player2.y)) player2.x++;
                    if (keys2.up && isValidMove(player2.x, player2.y - 1)) player2.y--;
                    if (keys2.down && isValidMove(player2.x, player2.y + 1)) player2.y++;
                    if (keys2.bomb) {
                        placeBomb(player2);
                        keys2.bomb = false;
                    }
                }
            } else if (isPaused) {
                drawMap();
                bombs.forEach(bomb => drawBomb(bomb.x, bomb.y, bomb.timer));
                if (player1.isAlive) drawPlayer(player1.x, player1.y, '#4ecdc4');
                if (player2.isAlive) drawPlayer(player2.x, player2.y, '#ff6b6b');
                
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2);
            }
            
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            gameWinner = null;
            
            initMap();
            player1 = { x: 1, y: 1, bombs: 3, score: 0, isAlive: true };
            player2 = { x: 8, y: 8, bombs: 3, score: 0, isAlive: true };
            bombs = [];
            explosions = [];
            
            updateScoreDisplay();
            updateBombDisplay();
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            document.getElementById('turnIndicator').textContent = '战斗开始';
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('炸弹人对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${player1.score}分`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${player2.score}分`, 450, 150);
            
            ctx.fillStyle = '#4ecdc4';
            ctx.fillRect(100, 200, 120, 30);
            ctx.fillStyle = '#000';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`炸弹: ${player1.bombs}`, 110, 222);
            
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(380, 200, 120, 30);
            ctx.fillStyle = '#000';
            ctx.fillText(`炸弹: ${player2.bombs}`, 390, 222);
            
            let result = '';
            if (player1.score > player2.score) {
                result = `${document.getElementById('player1Name').value} 领先!`;
            } else if (player2.score > player1.score) {
                result = `${document.getElementById('player2Name').value} 领先!`;
            } else {
                result = '势均力敌!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(result, canvas.width / 2, 300);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('🎮 couple-mini-game', canvas.width / 2, 360);
            
            const link = document.createElement('a');
            link.download = 'bomberman_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
                return;
            }
            
            if (isPaused) return;
            
            switch (e.key) {
                case 'ArrowLeft': keys1.left = true; break;
                case 'ArrowRight': keys1.right = true; break;
                case 'ArrowUp': keys1.up = true; break;
                case 'ArrowDown': keys1.down = true; break;
                case ' ': keys1.bomb = true; e.preventDefault(); break;
                case 'a':
                case 'A': keys2.left = true; break;
                case 'd':
                case 'D': keys2.right = true; break;
                case 'w':
                case 'W': keys2.up = true; break;
                case 's':
                case 'S': keys2.down = true; break;
                case 'Enter': keys2.bomb = true; e.preventDefault(); break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowLeft': keys1.left = false; break;
                case 'ArrowRight': keys1.right = false; break;
                case 'ArrowUp': keys1.up = false; break;
                case 'ArrowDown': keys1.down = false; break;
                case ' ': keys1.bomb = false; break;
                case 'a':
                case 'A': keys2.left = false; break;
                case 'd':
                case 'D': keys2.right = false; break;
                case 'w':
                case 'W': keys2.up = false; break;
                case 's':
                case 'S': keys2.down = false; break;
                case 'Enter': keys2.bomb = false; break;
            }
        });

        initMap();
        gameLoop();
    </script>
</body>
</html>
