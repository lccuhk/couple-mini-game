<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SimSun', 'SimHei', 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .game-area {
            background: #DEB887;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 0;
            background: #DEB887;
            border: 3px solid #8B4513;
        }

        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            background: #DEB887;
        }

        .cell::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-right: 1px solid #D2691E;
            border-bottom: 1px solid #D2691E;
            pointer-events: none;
        }

        .cell:nth-child(9n)::before {
            border-right: none;
        }

        .cell:nth-last-child(-n+9)::before {
            border-bottom: none;
        }

        .cell.red-dot::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #8B4513;
            border-radius: 50%;
        }

        .piece {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            z-index: 1;
            transition: transform 0.1s;
        }

        .piece.red {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            color: #fff;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .piece.black {
            background: radial-gradient(circle at 30% 30%, #444, #111);
            color: #fff;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .piece.selected {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.8);
        }

        .cell.highlight::before {
            background: rgba(0, 255, 0, 0.3);
            border-radius: 50%;
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
            max-width: 800px;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">♟️ 中国象棋对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="红方" maxlength="10">
            <div class="player-name" id="player1">红方</div>
            <div class="player-score" id="score1">0</div>
        </div>

        <div class="game-area">
            <div class="game-board" id="gameBoard"></div>
            <div class="turn-indicator" id="turnIndicator">准备开始</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="黑方" maxlength="10">
            <div class="player-name" id="player2">黑方</div>
            <div class="player-score" id="score2">0</div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 红方(玩家1): 点击选中棋子，再点击目标位置移动</p>
        <p>🎯 黑方(玩家2): 点击选中棋子，再点击目标位置移动</p>
        <p>♟️ 吃掉对方的帅/将获胜</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const BOARD_WIDTH = 9;
        const BOARD_HEIGHT = 10;
        
        const PIECE_TYPES = {
            '帅': { name: '帅', moves: 'king' },
            '将': { name: '将', moves: 'king' },
            '车': { name: '车', moves: 'rook' },
            '马': { name: '马', moves: 'knight' },
            '炮': { name: '炮', moves: 'cannon' },
            '兵': { name: '兵', moves: 'pawn' },
            '卒': { name: '卒', moves: 'pawn' },
            '相': { name: '相', moves: 'elephant' },
            '象': { name: '象', moves: 'elephant' },
            '仕': { name: '仕', moves: 'guard' },
            '士': { name: '士', moves: 'guard' }
        };

        let board = [];
        let currentPlayer = 'red';
        let selectedPiece = null;
        let highlightedCells = [];
        let isGameRunning = false;
        let isPaused = false;
        let gameWinner = null;

        function initBoard() {
            board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                board[y] = [];
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    board[y][x] = null;
                }
            }
            
            board[0][0] = { type: '车', color: 'red' };
            board[0][1] = { type: '马', color: 'red' };
            board[0][2] = { type: '相', color: 'red' };
            board[0][3] = { type: '仕', color: 'red' };
            board[0][4] = { type: '帅', color: 'red' };
            board[0][5] = { type: '仕', color: 'red' };
            board[0][6] = { type: '相', color: 'red' };
            board[0][7] = { type: '马', color: 'red' };
            board[0][8] = { type: '车', color: 'red' };
            board[2][1] = { type: '炮', color: 'red' };
            board[2][7] = { type: '炮', color: 'red' };
            board[3][0] = { type: '兵', color: 'red' };
            board[3][2] = { type: '兵', color: 'red' };
            board[3][4] = { type: '兵', color: 'red' };
            board[3][6] = { type: '兵', color: 'red' };
            board[3][8] = { type: '兵', color: 'red' };
            
            board[9][0] = { type: '车', color: 'black' };
            board[9][1] = { type: '马', color: 'black' };
            board[9][2] = { type: '象', color: 'black' };
            board[9][3] = { type: '士', color: 'black' };
            board[9][4] = { type: '将', color: 'black' };
            board[9][5] = { type: '士', color: 'black' };
            board[9][6] = { type: '象', color: 'black' };
            board[9][7] = { type: '马', color: 'black' };
            board[9][8] = { type: '车', color: 'black' };
            board[7][1] = { type: '炮', color: 'black' };
            board[7][7] = { type: '炮', color: 'black' };
            board[6][0] = { type: '卒', color: 'black' };
            board[6][2] = { type: '卒', color: 'black' };
            board[6][4] = { type: '卒', color: 'black' };
            board[6][6] = { type: '卒', color: 'black' };
            board[6][8] = { type: '卒', color: 'black' };
        }

        function renderBoard() {
            const boardElement = document.getElementById('gameBoard');
            boardElement.innerHTML = '';
            
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    
                    if ((y === 3 || y === 4 || y === 5 || y === 6) && 
                        (x === 2 || x === 4 || x === 6)) {
                        cell.classList.add('red-dot');
                    }
                    
                    if (board[y][x]) {
                        const piece = document.createElement('div');
                        piece.className = `piece ${board[y][x].color}`;
                        piece.textContent = board[y][x].type;
                        cell.appendChild(piece);
                    }
                    
                    if (selectedPiece && selectedPiece.x === x && selectedPiece.y === y) {
                        cell.querySelector('.piece')?.classList.add('selected');
                    }
                    
                    if (highlightedCells.some(c => c.x === x && c.y === y)) {
                        cell.classList.add('highlight');
                    }
                    
                    cell.addEventListener('click', () => handleClick(x, y));
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleClick(x, y) {
            if (!isGameRunning || isPaused) return;
            
            if (selectedPiece) {
                if (highlightedCells.some(c => c.x === x && c.y === y)) {
                    movePiece(selectedPiece.x, selectedPiece.y, x, y);
                    clearSelection();
                    return;
                }
                clearSelection();
            }
            
            if (board[y][x] && board[y][x].color === currentPlayer) {
                selectedPiece = { x, y };
                highlightedCells = getValidMoves(x, y);
            }
            
            renderBoard();
        }

        function getValidMoves(x, y) {
            const piece = board[y][x];
            if (!piece) return [];
            
            const moves = [];
            
            switch (PIECE_TYPES[piece.type].moves) {
                case 'king':
                    const kingMoves = [[0, -1], [0, 1], [-1, 0], [1, 0]];
                    kingMoves.forEach(([dx, dy]) => {
                        const nx = x + dx;
                        const ny = y + dy;
                        const isInPalace = piece.color === 'red' 
                            ? ny >= 0 && ny <= 2 && nx >= 3 && nx <= 5
                            : ny >= 7 && ny <= 9 && nx >= 3 && nx <= 5;
                        if (isInPalace && (board[ny][nx] === null || board[ny][nx].color !== piece.color)) {
                            moves.push({ x: nx, y: ny });
                        }
                    });
                    break;
                    
                case 'rook':
                    const rookDirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
                    rookDirs.forEach(([dx, dy]) => {
                        let nx = x + dx;
                        let ny = y + dy;
                        while (nx >= 0 && nx < BOARD_WIDTH && ny >= 0 && ny < BOARD_HEIGHT) {
                            if (board[ny][nx] === null) {
                                moves.push({ x: nx, y: ny });
                            } else {
                                if (board[ny][nx].color !== piece.color) {
                                    moves.push({ x: nx, y: ny });
                                }
                                break;
                            }
                            nx += dx;
                            ny += dy;
                        }
                    });
                    break;
                    
                case 'knight':
                    const knightMoves = [[-2, -1], [-2, 1], [-1, -2], [-1, 2],
                                        [1, -2], [1, 2], [2, -1], [2, 1]];
                    knightMoves.forEach(([dx, dy]) => {
                        const nx = x + dx;
                        const ny = y + dy;
                        const checkX = x + dx / 2;
                        const checkY = y + dy / 2;
                        if (nx >= 0 && nx < BOARD_WIDTH && ny >= 0 && ny < BOARD_HEIGHT) {
                            if (board[Math.round(checkY)][Math.round(checkX)] === null) {
                                if (board[ny][nx] === null || board[ny][nx].color !== piece.color) {
                                    moves.push({ x: nx, y: ny });
                                }
                            }
                        }
                    });
                    break;
                    
                case 'cannon':
                    const cannonDirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
                    cannonDirs.forEach(([dx, dy]) => {
                        let nx = x + dx;
                        let ny = y + dy;
                        let foundPiece = false;
                        while (nx >= 0 && nx < BOARD_WIDTH && ny >= 0 && ny < BOARD_HEIGHT) {
                            if (board[ny][nx] === null) {
                                if (!foundPiece) {
                                    moves.push({ x: nx, y: ny });
                                }
                            } else {
                                if (!foundPiece) {
                                    foundPiece = true;
                                } else {
                                    if (board[ny][nx].color !== piece.color) {
                                        moves.push({ x: nx, y: ny });
                                    }
                                    break;
                                }
                            }
                            nx += dx;
                            ny += dy;
                        }
                    });
                    break;
                    
                case 'pawn':
                    const direction = piece.color === 'red' ? 1 : -1;
                    const nx = x;
                    const ny = y + direction;
                    if (nx >= 0 && nx < BOARD_WIDTH && ny >= 0 && ny < BOARD_HEIGHT) {
                        if (board[ny][nx] === null) {
                            moves.push({ x: nx, y: ny });
                        }
                    }
                    if ((piece.color === 'red' && y >= 5) || (piece.color === 'black' && y <= 4)) {
                        const leftX = x - 1;
                        const rightX = x + 1;
                        if (leftX >= 0 && board[y][leftX] && board[y][leftX].color !== piece.color) {
                            moves.push({ x: leftX, y });
                        }
                        if (rightX < BOARD_WIDTH && board[y][rightX] && board[y][rightX].color !== piece.color) {
                            moves.push({ x: rightX, y });
                        }
                    }
                    break;
                    
                case 'elephant':
                    const elephantMoves = [[-2, -2], [-2, 2], [2, -2], [2, 2]];
                    elephantMoves.forEach(([dx, dy]) => {
                        const nx = x + dx;
                        const ny = y + dy;
                        const checkX = x + dx / 2;
                        const checkY = y + dy / 2;
                        const isInOwnSide = piece.color === 'red' ? ny <= 4 : ny >= 5;
                        if (nx >= 0 && nx < BOARD_WIDTH && ny >= 0 && ny < BOARD_HEIGHT && isInOwnSide) {
                            if (board[Math.round(checkY)][Math.round(checkX)] === null) {
                                if (board[ny][nx] === null || board[ny][nx].color !== piece.color) {
                                    moves.push({ x: nx, y: ny });
                                }
                            }
                        }
                    });
                    break;
                    
                case 'guard':
                    const guardMoves = [[-1, -1], [-1, 1], [1, -1], [1, 1]];
                    guardMoves.forEach(([dx, dy]) => {
                        const nx = x + dx;
                        const ny = y + dy;
                        const isInPalace = piece.color === 'red' 
                            ? ny >= 0 && ny <= 2 && nx >= 3 && nx <= 5
                            : ny >= 7 && ny <= 9 && nx >= 3 && nx <= 5;
                        if (isInPalace && (board[ny][nx] === null || board[ny][nx].color !== piece.color)) {
                            moves.push({ x: nx, y: ny });
                        }
                    });
                    break;
            }
            
            return moves;
        }

        function movePiece(fromX, fromY, toX, toY) {
            const piece = board[fromY][fromX];
            
            if (board[toY][toX] && (board[toY][toX].type === '帅' || board[toY][toX].type === '将')) {
                gameWinner = piece.color;
                endGame();
                return;
            }
            
            board[toY][toX] = piece;
            board[fromY][fromX] = null;
            
            currentPlayer = currentPlayer === 'red' ? 'black' : 'red';
            updateTurnIndicator();
            renderBoard();
        }

        function clearSelection() {
            selectedPiece = null;
            highlightedCells = [];
        }

        function updateTurnIndicator() {
            const playerName = currentPlayer === 'red' ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            const color = currentPlayer === 'red' ? '红方' : '黑方';
            document.getElementById('turnIndicator').textContent = `${playerName} (${color}) 的回合`;
        }

        function updateScoreDisplay() {
            if (gameWinner === 'red') {
                const current = parseInt(document.getElementById('score1').textContent);
                document.getElementById('score1').textContent = current + 1;
            } else if (gameWinner === 'black') {
                const current = parseInt(document.getElementById('score2').textContent);
                document.getElementById('score2').textContent = current + 1;
            }
        }

        function endGame() {
            isGameRunning = false;
            updateScoreDisplay();
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            const winner = gameWinner === 'red' ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            const color = gameWinner === 'red' ? '红方' : '黑方';
            winnerText.textContent = `${winner} (${color}) 获胜!`;
            overlay.classList.remove('hidden');
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            gameWinner = null;
            currentPlayer = 'red';
            selectedPiece = null;
            highlightedCells = [];
            
            initBoard();
            renderBoard();
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            updateTurnIndicator();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
                document.getElementById('turnIndicator').textContent = isPaused ? '游戏暂停' : `${currentPlayer === 'red' ? document.getElementById('player1Name').value : document.getElementById('player2Name').value} 的回合`;
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 500;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('中国象棋对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${document.getElementById('score1').textContent}胜`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${document.getElementById('score2').textContent}胜`, 350, 150);
            
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(120, 250, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.fillText('帅', 115, 257);
            
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(380, 250, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.fillText('将', 375, 257);
            
            let result = '';
            const score1 = parseInt(document.getElementById('score1').textContent);
            const score2 = parseInt(document.getElementById('score2').textContent);
            if (score1 > score2) {
                result = `${document.getElementById('player1Name').value} 领先!`;
            } else if (score2 > score1) {
                result = `${document.getElementById('player2Name').value} 领先!`;
            } else {
                result = '势均力敌!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(result, canvas.width / 2, 320);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('🎮 couple-mini-game', canvas.width / 2, 370);
            
            const link = document.createElement('a');
            link.download = 'chinese_chess_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
            }
        });

        initBoard();
        renderBoard();
    </script>
</body>
</html>
