<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .captures {
            font-size: 16px;
            margin-top: 10px;
            opacity: 0.7;
        }

        .game-area {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(19, 1fr);
            gap: 0;
            background: #DEB887;
            padding: 15px;
            border-radius: 10px;
            position: relative;
        }

        .cell {
            width: 24px;
            height: 24px;
            position: relative;
            cursor: pointer;
        }

        .cell::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: #8B4513;
            top: 50%;
            left: 0;
        }

        .cell::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 100%;
            background: #8B4513;
            left: 50%;
            top: 0;
        }

        .cell.star::before {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #8B4513;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .piece {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .piece.black {
            background: radial-gradient(circle at 30% 30%, #666, #000);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .pass-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">⚫⚪ 围棋对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
            <div class="captures" id="captures1">提子: 0</div>
            <div style="margin-top: 10px;">
                <div class="piece black" style="margin: 0 auto;"></div>
                <span style="font-size: 14px;">黑方</span>
            </div>
        </div>

        <div class="game-area">
            <div class="game-board" id="gameBoard"></div>
            <div class="turn-indicator" id="turnIndicator">准备开始</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn pass-btn" id="passBtn">跳过回合</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
            <div class="captures" id="captures2">提子: 0</div>
            <div style="margin-top: 10px;">
                <div class="piece white" style="margin: 0 auto;"></div>
                <span style="font-size: 14px;">白方</span>
            </div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 玩家1: 黑方，先行</p>
        <p>🎯 玩家2: 白方，后行</p>
        <p>⚫ 围住对方棋子可提子，连续两次跳过结束游戏</p>
        <p>⏸ ESC 暂停游戏 | 点击跳过回合</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const BOARD_SIZE = 19;
        const STAR_POINTS = [
            [3, 3], [3, 9], [3, 15],
            [9, 3], [9, 9], [9, 15],
            [15, 3], [15, 9], [15, 15]
        ];

        let board = [];
        let currentPlayer = 1;
        let isGameRunning = false;
        let isPaused = false;
        let gameWinner = null;
        let captures = [0, 0];
        let passCount = 0;
        let lastBoard = '';

        function initBoard() {
            board = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                board[y] = [];
                for (let x = 0; x < BOARD_SIZE; x++) {
                    board[y][x] = 0;
                }
            }
            passCount = 0;
            lastBoard = '';
        }

        function boardToString() {
            let str = '';
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    str += board[y][x];
                }
            }
            return str;
        }

        function renderBoard() {
            const boardElement = document.getElementById('gameBoard');
            boardElement.innerHTML = '';
            
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    
                    const isStar = STAR_POINTS.some(([sx, sy]) => sx === x && sy === y);
                    if (isStar) {
                        cell.classList.add('star');
                    }
                    
                    if (board[y][x] !== 0) {
                        const piece = document.createElement('div');
                        piece.className = 'piece ' + (board[y][x] === 1 ? 'black' : 'white');
                        cell.appendChild(piece);
                    }
                    
                    cell.addEventListener('click', () => handleClick(x, y));
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleClick(x, y) {
            if (!isGameRunning || isPaused) return;
            if (board[y][x] !== 0) return;
            
            const oldBoard = boardToString();
            
            board[y][x] = currentPlayer;
            
            captureStones(currentPlayer === 1 ? 2 : 1);
            
            if (!hasLiberties(x, y, currentPlayer)) {
                board[y][x] = 0;
                return;
            }
            
            const newBoard = boardToString();
            if (newBoard === lastBoard) {
                board[y][x] = 0;
                return;
            }
            
            lastBoard = oldBoard;
            passCount = 0;
            renderBoard();
            
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateTurnIndicator();
        }

        function hasLiberties(x, y, player) {
            const visited = new Set();
            const queue = [[x, y]];
            
            while (queue.length > 0) {
                const [cx, cy] = queue.shift();
                const key = `${cx},${cy}`;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                if (cx < 0 || cx >= BOARD_SIZE || cy < 0 || cy >= BOARD_SIZE) continue;
                
                if (board[cy][cx] === 0) return true;
                if (board[cy][cx] !== player) continue;
                
                queue.push([cx + 1, cy]);
                queue.push([cx - 1, cy]);
                queue.push([cx, cy + 1]);
                queue.push([cx, cy - 1]);
            }
            
            return false;
        }

        function captureStones(player) {
            const visited = new Set();
            let captured = 0;
            
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (board[y][x] === player && !visited.has(`${x},${y}`)) {
                        const group = [];
                        const queue = [[x, y]];
                        const groupVisited = new Set();
                        
                        while (queue.length > 0) {
                            const [cx, cy] = queue.shift();
                            const key = `${cx},${cy}`;
                            
                            if (groupVisited.has(key)) continue;
                            groupVisited.add(key);
                            
                            if (cx < 0 || cx >= BOARD_SIZE || cy < 0 || cy >= BOARD_SIZE) continue;
                            
                            if (board[cy][cx] === 0) {
                                group = [];
                                break;
                            }
                            if (board[cy][cx] !== player) continue;
                            
                            group.push([cx, cy]);
                            visited.add(key);
                            
                            queue.push([cx + 1, cy]);
                            queue.push([cx - 1, cy]);
                            queue.push([cx, cy + 1]);
                            queue.push([cx, cy - 1]);
                        }
                        
                        if (group.length > 0 && !hasLiberties(group[0][0], group[0][1], player)) {
                            for (const [gx, gy] of group) {
                                board[gy][gx] = 0;
                                captured++;
                            }
                        }
                    }
                }
            }
            
            if (captured > 0) {
                captures[currentPlayer - 1] += captured;
                document.getElementById('captures' + currentPlayer).textContent = `提子: ${captures[currentPlayer - 1]}`;
            }
        }

        function pass() {
            if (!isGameRunning || isPaused) return;
            
            passCount++;
            
            if (passCount >= 2) {
                endGame();
                return;
            }
            
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateTurnIndicator();
        }

        function updateTurnIndicator() {
            const playerName = currentPlayer === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            const pieceColor = currentPlayer === 1 ? '黑方' : '白方';
            document.getElementById('turnIndicator').textContent = `${playerName} (${pieceColor}) 的回合`;
        }

        function calculateScore() {
            let blackTerritory = 0;
            let whiteTerritory = 0;
            const visited = new Set();
            
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (board[y][x] === 0 && !visited.has(`${x},${y}`)) {
                        const territory = [];
                        const queue = [[x, y]];
                        let owner = 0;
                        
                        while (queue.length > 0) {
                            const [cx, cy] = queue.shift();
                            const key = `${cx},${cy}`;
                            
                            if (visited.has(key)) continue;
                            visited.add(key);
                            
                            if (cx < 0 || cx >= BOARD_SIZE || cy < 0 || cy >= BOARD_SIZE) continue;
                            
                            if (board[cy][cx] === 1) {
                                owner = owner === 0 || owner === 1 ? 1 : 3;
                                continue;
                            }
                            if (board[cy][cx] === 2) {
                                owner = owner === 0 || owner === 2 ? 2 : 3;
                                continue;
                            }
                            
                            territory.push([cx, cy]);
                            
                            queue.push([cx + 1, cy]);
                            queue.push([cx - 1, cy]);
                            queue.push([cx, cy + 1]);
                            queue.push([cx, cy - 1]);
                        }
                        
                        if (owner === 1) blackTerritory += territory.length;
                        else if (owner === 2) whiteTerritory += territory.length;
                    }
                }
            }
            
            let blackStones = 0;
            let whiteStones = 0;
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (board[y][x] === 1) blackStones++;
                    else if (board[y][x] === 2) whiteStones++;
                }
            }
            
            return {
                black: blackTerritory + blackStones + 6.5,
                white: whiteTerritory + whiteStones
            };
        }

        function updateScoreDisplay() {
            const scores = calculateScore();
            document.getElementById('score1').textContent = scores.black.toFixed(1);
            document.getElementById('score2').textContent = scores.white.toFixed(1);
            
            gameWinner = scores.black > scores.white ? 1 : 2;
        }

        function endGame() {
            isGameRunning = false;
            updateScoreDisplay();
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            const scores = calculateScore();
            const winner = scores.black > scores.white ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            const color = scores.black > scores.white ? '黑方' : '白方';
            winnerText.textContent = `${winner} (${color}) 获胜! ${scores.black.toFixed(1)} : ${scores.white.toFixed(1)}`;
            overlay.classList.remove('hidden');
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            gameWinner = null;
            currentPlayer = 1;
            captures = [0, 0];
            
            initBoard();
            renderBoard();
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            document.getElementById('captures1').textContent = '提子: 0';
            document.getElementById('captures2').textContent = '提子: 0';
            document.getElementById('score1').textContent = '0';
            document.getElementById('score2').textContent = '0';
            updateTurnIndicator();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
                document.getElementById('turnIndicator').textContent = isPaused ? '游戏暂停' : `${currentPlayer === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value} 的回合`;
            }
        });

        document.getElementById('passBtn').addEventListener('click', pass);

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 500;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('围棋对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${document.getElementById('score1').textContent}分`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${document.getElementById('score2').textContent}分`, 350, 150);
            
            ctx.fillText(`提子: ${captures[0]}`, 150, 200);
            ctx.fillText(`提子: ${captures[1]}`, 350, 200);
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(120, 280, 20, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(380, 280, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            let result = '';
            const score1 = parseFloat(document.getElementById('score1').textContent);
            const score2 = parseFloat(document.getElementById('score2').textContent);
            if (score1 > score2) {
                result = `${document.getElementById('player1Name').value} 获胜!`;
            } else if (score2 > score1) {
                result = `${document.getElementById('player2Name').value} 获胜!`;
            } else {
                result = '平局!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(result, canvas.width / 2, 350);
            
            const link = document.createElement('a');
            link.download = 'go_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
            }
        });

        initBoard();
        renderBoard();
    </script>
</body>
</html>
