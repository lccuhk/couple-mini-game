<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048对战</title>
    <style>
        :root {
            --bg-gradient-1: #ffecd2;
            --bg-gradient-2: #fcb69f;
            --bg-gradient-3: #ffd89b;
            --primary-color: #e65100;
            --secondary-color: #f57c00;
            --accent-color: #bf360c;
            --btn-gradient-1: #ff7f50;
            --btn-gradient-2: #ff6347;
            --btn-shadow: rgba(255, 127, 80, 0.4);
            --btn-shadow-hover: rgba(255, 127, 80, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 165, 0, 0.4);
            --card-hover-border: #ff7f50;
            --card-shadow: rgba(255, 127, 80, 0.3);
            --text-primary: #4e342e;
            --text-secondary: #6d4c41;
            --tag-bg-1: #fff3e0;
            --tag-bg-2: #ffe0b2;
            --tag-text: #ef6c00;
            --divider-color: #ffcc80;
            --link-color: #e65100;
            --decoration-1: '🧡';
            --decoration-2: '🍊';
        }

        [data-theme="sakura"] {
            --bg-gradient-1: #ff9a9e;
            --bg-gradient-2: #fecfef;
            --bg-gradient-3: #fecfef;
            --primary-color: #d63384;
            --secondary-color: #c2185b;
            --accent-color: #8b4513;
            --btn-gradient-1: #ff6b9d;
            --btn-gradient-2: #c44569;
            --btn-shadow: rgba(255, 107, 157, 0.4);
            --btn-shadow-hover: rgba(255, 107, 157, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 182, 193, 0.5);
            --card-hover-border: #ff6b9d;
            --card-shadow: rgba(255, 107, 157, 0.3);
            --text-primary: #5a3a3a;
            --text-secondary: #7a5a5a;
            --tag-bg-1: #ffe0e9;
            --tag-bg-2: #ffd1dc;
            --tag-text: #c2185b;
            --divider-color: #ffb6c1;
            --link-color: #d63384;
            --decoration-1: '💕';
            --decoration-2: '💖';
        }

        [data-theme="lavender"] {
            --bg-gradient-1: #a8edea;
            --bg-gradient-2: #fed6e3;
            --bg-gradient-3: #d299c2;
            --primary-color: #7b1fa2;
            --secondary-color: #9c27b0;
            --accent-color: #4a148c;
            --btn-gradient-1: #ba68c8;
            --btn-gradient-2: #9c27b0;
            --btn-shadow: rgba(186, 104, 200, 0.4);
            --btn-shadow-hover: rgba(186, 104, 200, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(186, 104, 200, 0.4);
            --card-hover-border: #ba68c8;
            --card-shadow: rgba(186, 104, 200, 0.3);
            --text-primary: #4a148c;
            --text-secondary: #6a1b9a;
            --tag-bg-1: #f3e5f5;
            --tag-bg-2: #e1bee7;
            --tag-text: #7b1fa2;
            --divider-color: #ce93d8;
            --link-color: #7b1fa2;
            --decoration-1: '💜';
            --decoration-2: '🔮';
        }

        [data-theme="ocean"] {
            --bg-gradient-1: #a1c4fd;
            --bg-gradient-2: #c2e9fb;
            --bg-gradient-3: #89f7fe;
            --primary-color: #1565c0;
            --secondary-color: #1976d2;
            --accent-color: #0d47a1;
            --btn-gradient-1: #42a5f5;
            --btn-gradient-2: #1e88e5;
            --btn-shadow: rgba(66, 165, 245, 0.4);
            --btn-shadow-hover: rgba(66, 165, 245, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(66, 165, 245, 0.4);
            --card-hover-border: #42a5f5;
            --card-shadow: rgba(66, 165, 245, 0.3);
            --text-primary: #0d47a1;
            --text-secondary: #1565c0;
            --tag-bg-1: #e3f2fd;
            --tag-bg-2: #bbdefb;
            --tag-text: #1565c0;
            --divider-color: #90caf9;
            --link-color: #1565c0;
            --decoration-1: '💙';
            --decoration-2: '🌊';
        }

        [data-theme="forest"] {
            --bg-gradient-1: #a8e063;
            --bg-gradient-2: #56ab2f;
            --bg-gradient-3: #a8e063;
            --primary-color: #2e7d32;
            --secondary-color: #388e3c;
            --accent-color: #1b5e20;
            --btn-gradient-1: #66bb6a;
            --btn-gradient-2: #388e3c;
            --btn-shadow: rgba(102, 187, 106, 0.4);
            --btn-shadow-hover: rgba(102, 187, 106, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(102, 187, 106, 0.4);
            --card-hover-border: #66bb6a;
            --card-shadow: rgba(102, 187, 106, 0.3);
            --text-primary: #1b5e20;
            --text-secondary: #2e7d32;
            --tag-bg-1: #e8f5e9;
            --tag-bg-2: #c8e6c9;
            --tag-text: #2e7d32;
            --divider-color: #a5d6a7;
            --link-color: #2e7d32;
            --decoration-1: '💚';
            --decoration-2: '🌿';
        }

        [data-theme="midnight"] {
            --bg-gradient-1: #232526;
            --bg-gradient-2: #414345;
            --bg-gradient-3: #232526;
            --primary-color: #ffd700;
            --secondary-color: #ffc107;
            --accent-color: #ff8f00;
            --btn-gradient-1: #ffd700;
            --btn-gradient-2: #ffc107;
            --btn-shadow: rgba(255, 215, 0, 0.4);
            --btn-shadow-hover: rgba(255, 215, 0, 0.6);
            --card-bg: rgba(50, 50, 50, 0.9);
            --card-border: rgba(255, 215, 0, 0.3);
            --card-hover-border: #ffd700;
            --card-shadow: rgba(255, 215, 0, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --tag-bg-1: #424242;
            --tag-bg-2: #616161;
            --tag-text: #ffd700;
            --divider-color: #ffd700;
            --link-color: #ffd700;
            --decoration-1: '⭐';
            --decoration-2: '🌙';
        }

        [data-mode="dark"] {
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
        }

        [data-mode="dark"][data-theme="orange"] {
            --bg-gradient-1: #1a0f00;
            --bg-gradient-2: #2d1810;
            --bg-gradient-3: #1a0f00;
            --card-bg: rgba(40, 30, 20, 0.9);
        }

        [data-mode="dark"][data-theme="sakura"] {
            --bg-gradient-1: #1a0a10;
            --bg-gradient-2: #2d1020;
            --bg-gradient-3: #1a0a10;
            --card-bg: rgba(40, 20, 30, 0.9);
        }

        [data-mode="dark"][data-theme="lavender"] {
            --bg-gradient-1: #0f0a1a;
            --bg-gradient-2: #1a102d;
            --bg-gradient-3: #0f0a1a;
            --card-bg: rgba(30, 20, 40, 0.9);
        }

        [data-mode="dark"][data-theme="ocean"] {
            --bg-gradient-1: #0a0f1a;
            --bg-gradient-2: #101a2d;
            --bg-gradient-3: #0a0f1a;
            --card-bg: rgba(20, 30, 40, 0.9);
        }

        [data-mode="dark"][data-theme="forest"] {
            --bg-gradient-1: #0a1a0f;
            --bg-gradient-2: #102d1a;
            --bg-gradient-3: #0a1a0f;
            --card-bg: rgba(20, 40, 30, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: var(--decoration-1);
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: var(--decoration-2);
            position: fixed;
            top: 60%;
            right: 5%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .theme-panel h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-section {
            margin-bottom: 1.2rem;
        }

        .theme-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .color-themes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .color-theme-btn {
            padding: 0.5rem;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        .color-theme-btn:hover {
            transform: scale(1.05);
        }

        .color-theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .color-theme-btn[data-theme="orange"] {
            background: linear-gradient(135deg, #ff7f50, #ff6347);
        }

        .color-theme-btn[data-theme="sakura"] {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .color-theme-btn[data-theme="lavender"] {
            background: linear-gradient(135deg, #ba68c8, #9c27b0);
        }

        .color-theme-btn[data-theme="ocean"] {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .color-theme-btn[data-theme="forest"] {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }

        .color-theme-btn[data-theme="midnight"] {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mode-btn:hover {
            border-color: var(--btn-gradient-1);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border-color: transparent;
        }

        .nickname-section {
            margin-bottom: 1.2rem;
        }

        .nickname-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .nickname-input-group:last-child {
            margin-bottom: 0;
        }

        .nickname-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 60px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .nickname-input {
            flex: 1;
            padding: 0.5rem 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nickname-input:focus {
            outline: none;
            border-color: var(--btn-gradient-1);
        }

        .nickname-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .save-nickname-btn {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .save-nickname-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px var(--btn-shadow);
        }

        .save-nickname-btn:active {
            transform: scale(0.98);
        }

        .random-theme-btn {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .random-theme-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .random-theme-btn:active {
            transform: scale(0.98);
        }

        .pause-btn {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            box-shadow: 0 4px 15px var(--btn-shadow);
        }

        .pause-btn:hover {
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .share-btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .share-btn:hover {
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.6);
        }

        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .pause-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .pause-overlay h2 {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
            text-shadow: 0 0 20px var(--btn-shadow);
        }

        .pause-overlay .button-group {
            gap: 1rem;
        }

        .share-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            display: none;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .share-modal.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .share-modal h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.5rem;
        }

        .share-preview {
            margin: 1rem 0;
            text-align: center;
        }

        .share-preview canvas {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .share-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .share-actions button {
            flex: 1;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .download-btn:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 1;
        }

        .game-info {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-secondary);
            z-index: 1;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--btn-shadow);
            z-index: 100;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .game-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            z-index: 1;
            max-width: 1200px;
        }

        .player-board {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 30px var(--card-shadow);
            backdrop-filter: blur(10px);
        }

        .player-board h2 {
            text-align: center;
            margin-bottom: 15px;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .player1-board h2 {
            color: #e91e63;
        }

        .player2-board h2 {
            color: #2196f3;
        }

        .score-display {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-display .score {
            color: var(--primary-color);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            background: #bbada0;
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            background: #cdc1b4;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease;
        }

        .cell-2 { background: #eee4da; color: #776e65; }
        .cell-4 { background: #ede0c8; color: #776e65; }
        .cell-8 { background: #f2b179; color: #f9f6f2; }
        .cell-16 { background: #f59563; color: #f9f6f2; }
        .cell-32 { background: #f67c5f; color: #f9f6f2; }
        .cell-64 { background: #f65e3b; color: #f9f6f2; }
        .cell-128 { background: #edcf72; color: #f9f6f2; font-size: 1.3rem; }
        .cell-256 { background: #edcc61; color: #f9f6f2; font-size: 1.3rem; }
        .cell-512 { background: #edc850; color: #f9f6f2; font-size: 1.3rem; }
        .cell-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.1rem; }
        .cell-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.1rem; }
        .cell-super { background: #3c3a32; color: #f9f6f2; font-size: 1rem; }

        .cell-new {
            animation: appear 0.2s ease;
        }

        .cell-merged {
            animation: pop 0.2s ease;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .controls-info {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .controls-info span {
            display: inline-block;
            background: var(--tag-bg-1);
            color: var(--tag-text);
            padding: 3px 8px;
            border-radius: 5px;
            margin: 2px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
            z-index: 1;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;

            color: white;

            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--btn-shadow);

        button.secondary:hover {

        <button id="restartBtn">🔄 重新开始</button>
    </div>

    <div class="game-status" id="gameStatus">游戏进行中...</div>

    <script>
        (function() {
            const GRID_SIZE = 4;
            let board1 = [];
            let board2 = [];
            let score1 = 0;
            let score2 = 0;
            let gameRunning = true;
            let gamePaused = false;

            function getUrlParams() {
                const params = new URLSearchParams(window.location.search);
                return {
                    player1: params.get('p1') || localStorage.getItem('couple-game-player1') || '玩家1',
                    player2: params.get('p2') || localStorage.getItem('couple-game-player2') || '玩家2'
                };
            }

            const { player1, player2 } = getUrlParams();

            document.getElementById('player1Title').textContent = `👤 ${player1}`;
            document.getElementById('player2Title').textContent = `👤 ${player2}`;

            function initBoard() {
                return Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
            }

            function createBoardElement(boardId) {
                const boardEl = document.getElementById(boardId);
                boardEl.innerHTML = '';
                for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    boardEl.appendChild(cell);
                }
                return boardEl;
            }

            function addRandomTile(board) {
                const emptyCells = [];
                for (let i = 0; i < GRID_SIZE; i++) {
                    for (let j = 0; j < GRID_SIZE; j++) {
                        if (board[i][j] === 0) {
                            emptyCells.push({ row: i, col: j });
                        }
                    }
                }
                if (emptyCells.length > 0) {
                    const { row, col } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    board[row][col] = Math.random() < 0.9 ? 2 : 4;
                    return { row, col };
                }
                return null;
            }

            function renderBoard(board, boardEl, newTile = null, mergedCells = []) {
                const cells = boardEl.querySelectorAll('.cell');
                for (let i = 0; i < GRID_SIZE; i++) {
                    for (let j = 0; j < GRID_SIZE; j++) {
                        const index = i * GRID_SIZE + j;
                        const value = board[i][j];
                        const cell = cells[index];
                        cell.textContent = value || '';
                        cell.className = 'cell';
                        if (value > 0) {
                            if (value <= 2048) {
                                cell.classList.add(`cell-${value}`);
                            } else {
                                cell.classList.add('cell-super');
                            }
                            if (newTile && newTile.row === i && newTile.col === j) {
                                cell.classList.add('cell-new');
                            }
                            if (mergedCells.some(c => c.row === i && c.col === j)) {
                                cell.classList.add('cell-merged');
                            }
                        }
                    }
                }
            }

            function slide(row) {
                let arr = row.filter(val => val !== 0);
                let score = 0;
                for (let i = 0; i < arr.length - 1; i++) {
                    if (arr[i] === arr[i + 1]) {
                        arr[i] *= 2;
                        score += arr[i];
                        arr.splice(i + 1, 1);
                    }
                }
                while (arr.length < GRID_SIZE) {
                    arr.push(0);
                }
                return { row: arr, score };
            }

            function moveLeft(board) {
                let newBoard = [];
                let totalScore = 0;
                let moved = false;
                for (let i = 0; i < GRID_SIZE; i++) {
                    let original = [...board[i]];
                    let { row, score } = slide([...board[i]]);
                    newBoard.push(row);
                    totalScore += score;
                    if (original.join(',') !== row.join(',')) {
                        moved = true;
                    }
                }
                return { board: newBoard, score: totalScore, moved };
            }

            function moveRight(board) {
                let newBoard = [];
                let totalScore = 0;
                let moved = false;
                for (let i = 0; i < GRID_SIZE; i++) {
                    let original = [...board[i]];
                    let reversed = [...board[i]].reverse();
                    let { row, score } = slide(reversed);
                    row.reverse();
                    newBoard.push(row);
                    totalScore += score;
                    if (original.join(',') !== row.join(',')) {
                        moved = true;
                    }
                }
                return { board: newBoard, score: totalScore, moved };
            }

            function moveUp(board) {
                let newBoard = board.map(row => [...row]);
                let totalScore = 0;
                let moved = false;
                for (let j = 0; j < GRID_SIZE; j++) {
                    let col = [];
                    for (let i = 0; i < GRID_SIZE; i++) {
                        col.push(board[i][j]);
                    }
                    let original = [...col];
                    let { row, score } = slide(col);
                    totalScore += score;
                    for (let i = 0; i < GRID_SIZE; i++) {
                        newBoard[i][j] = row[i];
                    }
                    if (original.join(',') !== row.join(',')) {
                        moved = true;
                    }
                }
                return { board: newBoard, score: totalScore, moved };
            }

            function moveDown(board) {
                let newBoard = board.map(row => [...row]);
                let totalScore = 0;
                let moved = false;
                for (let j = 0; j < GRID_SIZE; j++) {
                    let col = [];
                    for (let i = 0; i < GRID_SIZE; i++) {
                        col.push(board[i][j]);
                    }
                    let original = [...col];
                    col.reverse();
                    let { row, score } = slide(col);
                    row.reverse();
                    totalScore += score;
                    for (let i = 0; i < GRID_SIZE; i++) {
                        newBoard[i][j] = row[i];
                    }
                    if (original.join(',') !== row.join(',')) {
                        moved = true;
                    }
                }
                return { board: newBoard, score: totalScore, moved };
            }

            function canMove(board) {
                for (let i = 0; i < GRID_SIZE; i++) {
                    for (let j = 0; j < GRID_SIZE; j++) {
                        if (board[i][j] === 0) return true;
                        if (j < GRID_SIZE - 1 && board[i][j] === board[i][j + 1]) return true;
                        if (i < GRID_SIZE - 1 && board[i][j] === board[i + 1][j]) return true;
                    }
                }
                return false;
            }

            function handleMove(player, direction) {
                if (!gameRunning || gamePaused) return;

                let board, score, boardEl, scoreEl;
                if (player === 1) {
                    board = board1;
                    score = score1;
                    boardEl = board1El;
                    scoreEl = score1El;
                } else {
                    board = board2;
                    score = score2;
                    boardEl = board2El;
                    scoreEl = score2El;
                }

                let result;
                switch (direction) {
                    case 'up': result = moveUp(board); break;
                    case 'down': result = moveDown(board); break;
                    case 'left': result = moveLeft(board); break;
                    case 'right': result = moveRight(board); break;
                }

                if (result.moved) {
                    if (player === 1) {
                        board1 = result.board;
                        score1 += result.score;
                        scoreEl.textContent = score1;
                        const newTile = addRandomTile(board1);
                        renderBoard(board1, boardEl, newTile);
                        if (!canMove(board1)) {
                            checkGameOver();
                        }
                    } else {
                        board2 = result.board;
                        score2 += result.score;
                        scoreEl.textContent = score2;
                        const newTile = addRandomTile(board2);
                        renderBoard(board2, boardEl, newTile);
                        if (!canMove(board2)) {
                            checkGameOver();
                        }
                    }
                }
            }

            function checkGameOver() {
                const player1CanMove = canMove(board1);
                const player2CanMove = canMove(board2);

                if (!player1CanMove && !player2CanMove) {
                    gameRunning = false;
                    let result;
                    if (score1 > score2) {
                        result = `🏆 ${player1} 获胜！`;
                    } else if (score2 > score1) {
                        result = `🏆 ${player2} 获胜！`;
                    } else {
                        result = '🤝 平局！';
                    }
                    gameStatusEl.innerHTML = `<span class="winner">${result} 最终比分: ${score1} - ${score2}</span>`;
                }
            }

            function initGame() {
                board1 = initBoard();
                board2 = initBoard();
                score1 = 0;
                score2 = 0;
                gameRunning = true;
                gamePaused = false;

                score1El.textContent = '0';
                score2El.textContent = '0';
                gameStatusEl.textContent = '游戏进行中...';

                board1El = createBoardElement('board1');
                board2El = createBoardElement('board2');

                addRandomTile(board1);
                addRandomTile(board1);
                addRandomTile(board2);
                addRandomTile(board2);

                renderBoard(board1, board1El);
                renderBoard(board2, board2El);
            }

            const score1El = document.getElementById('score1');
            const score2El = document.getElementById('score2');
            const gameStatusEl = document.getElementById('gameStatus');
            let board1El, board2El;

            document.addEventListener('keydown', (e) => {
                if (gamePaused) return;

                switch (e.key.toLowerCase()) {
                    case 'w': handleMove(1, 'up'); break;
                    case 's': handleMove(1, 'down'); break;
                    case 'a': handleMove(1, 'left'); break;
                    case 'd': handleMove(1, 'right'); break;
                    case 'arrowup': e.preventDefault(); handleMove(2, 'up'); break;
                    case 'arrowdown': e.preventDefault(); handleMove(2, 'down'); break;
                    case 'arrowleft': e.preventDefault(); handleMove(2, 'left'); break;
                    case 'arrowright': e.preventDefault(); handleMove(2, 'right'); break;
                }
            });

            const pauseBtn = document.getElementById('pauseBtn');
            const pauseOverlay = document.getElementById('pauseOverlay');
            const resumeBtn = document.getElementById('resumeBtn');
            const pauseRestartBtn = document.getElementById('pauseRestartBtn');
            const backToMenuBtn = document.getElementById('backToMenuBtn');

            function togglePause() {
                if (!gameRunning) return;
                
                gamePaused = !gamePaused;
                
                if (gamePaused) {
                    pauseOverlay.classList.add('active');
                    pauseBtn.textContent = '▶️ 继续';
                    gameStatusEl.textContent = '⏸️ 游戏暂停 - 按空格键继续';
                } else {
                    pauseOverlay.classList.remove('active');
                    pauseBtn.textContent = '⏸️ 暂停';
                    gameStatusEl.textContent = '游戏进行中...';
                }
            }

            pauseBtn.addEventListener('click', togglePause);
            resumeBtn.addEventListener('click', togglePause);

            pauseRestartBtn.addEventListener('click', () => {
                pauseOverlay.classList.remove('active');
                gamePaused = false;
                pauseBtn.textContent = '⏸️ 暂停';
                initGame();
            });

            backToMenuBtn.addEventListener('click', () => {
                window.location.href = '../index.html';
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && gameRunning) {
                    e.preventDefault();
                    togglePause();
                }
            });

            const shareBtn = document.getElementById('shareBtn');
            const shareModal = document.getElementById('shareModal');
            const downloadBtn = document.getElementById('downloadBtn');
            const closeShareBtn = document.getElementById('closeShareBtn');

            function generateShareImage() {
                const canvas = document.getElementById('shareCanvas');
                const ctx = canvas.getContext('2d');
                
                const gradient = ctx.createLinearGradient(0, 0, 600, 400);
                gradient.addColorStop(0, '#ffecd2');
                gradient.addColorStop(0.5, '#fcb69f');
                gradient.addColorStop(1, '#ffd89b');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 600, 400);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.roundRect(30, 30, 540, 340, 20);
                ctx.fill();
                
                ctx.font = 'bold 36px Arial';
                ctx.fillStyle = '#e65100';
                ctx.textAlign = 'center';
                ctx.fillText('🎮 2048对战', 300, 80);
                
                ctx.font = '24px Arial';
                ctx.fillStyle = '#4e342e';
                ctx.fillText('🎮 游戏战绩', 300, 120);
                
                ctx.font = 'bold 28px Arial';
                ctx.fillStyle = '#e91e63';
                ctx.fillText(`${player1}`, 150, 180);
                
                ctx.font = 'bold 48px Arial';
                ctx.fillStyle = '#e65100';
                ctx.fillText(`${score1} : ${score2}`, 300, 190);
                
                ctx.font = 'bold 28px Arial';
                ctx.fillStyle = '#2196f3';
                ctx.fillText(`${player2}`, 450, 180);
                
                let result = '游戏进行中';
                if (!gameRunning) {
                    if (score1 > score2) {
                        result = `🏆 胜利者: ${player1}`;
                    } else if (score2 > score1) {
                        result = `🏆 胜利者: ${player2}`;
                    } else {
                        result = '🤝 平局';
                    }
                }
                
                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = '#ff9800';
                ctx.fillText(result, 300, 250);
                
                ctx.font = '20px Arial';
                ctx.fillStyle = '#6d4c41';
                ctx.fillText(`最高方块: ${Math.max(...board1.flat(), ...board2.flat())}`, 300, 300);
                
                ctx.font = '18px Arial';
                ctx.fillStyle = '#6d4c41';
                ctx.fillText('💑 情侣小游戏 - 属于我们的甜蜜时光', 300, 340);
                ctx.fillText('https://lccuhk.github.io/couple-mini-game/', 300, 370);
                
                ctx.font = '40px Arial';
                ctx.fillText('🧡', 80, 360);
                ctx.fillText('🍊', 520, 360);
            }

            shareBtn.addEventListener('click', () => {
                generateShareImage();
                shareModal.classList.add('active');
            });

            closeShareBtn.addEventListener('click', () => {
                shareModal.classList.remove('active');
            });

            downloadBtn.addEventListener('click', () => {
                const canvas = document.getElementById('shareCanvas');
                const link = document.createElement('a');
                link.download = `2048对战战绩_${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            document.getElementById('restartBtn').addEventListener('click', initGame);

            initGame();
        })();
    </script>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeBtn');
            const themePanel = document.getElementById('themePanel');
            const randomThemeBtn = document.getElementById('randomThemeBtn');
            const player1NameInput = document.getElementById('player1Name');
            const player2NameInput = document.getElementById('player2Name');
            const saveNicknameBtn = document.getElementById('saveNicknameBtn');
            
            const savedPlayer1Name = localStorage.getItem('couple-game-player1') || '玩家1';
            const savedPlayer2Name = localStorage.getItem('couple-game-player2') || '玩家2';
            
            player1NameInput.value = savedPlayer1Name;
            player2NameInput.value = savedPlayer2Name;
            
            saveNicknameBtn.addEventListener('click', () => {
                const p1 = player1NameInput.value.trim() || '玩家1';
                const p2 = player2NameInput.value.trim() || '玩家2';
                
                localStorage.setItem('couple-game-player1', p1);
                localStorage.setItem('couple-game-player2', p2);
                
                saveNicknameBtn.textContent = '✅ 已保存';
                setTimeout(() => {
                    saveNicknameBtn.textContent = '💾 保存昵称';
                }, 1500);
            });

            const colorThemeBtns = document.querySelectorAll('.color-theme-btn');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const body = document.body;

            const savedTheme = localStorage.getItem('couple-game-theme') || 'orange';
            const savedMode = localStorage.getItem('couple-game-mode') || 'light';

            function applyTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
                
                colorThemeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                localStorage.setItem('couple-game-theme', theme);
                localStorage.setItem('couple-game-mode', mode);
            }

            applyTheme(savedTheme, savedMode);

            let appliedTheme = savedTheme;
            let appliedMode = savedMode;

            function previewTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
            }

            function restoreTheme() {
                body.setAttribute('data-theme', appliedTheme);
                body.setAttribute('data-mode', appliedMode);
            }

            themeBtn.addEventListener('click', () => {
                themePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
                    themePanel.classList.remove('active');
                }
            });

            colorThemeBtns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    previewTheme(theme, mode);
                });
                
                btn.addEventListener('mouseleave', () => {
                    restoreTheme();
                });
                
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    appliedTheme = theme;
                    appliedMode = mode;
                    applyTheme(theme, mode);
                });
            });

            modeBtns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    previewTheme(theme, mode);
                });
                
                btn.addEventListener('mouseleave', () => {
                    restoreTheme();
                });
                
                btn.addEventListener('click', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    appliedTheme = theme;
                    appliedMode = mode;
                    applyTheme(theme, mode);
                });
            });

            randomThemeBtn.addEventListener('click', () => {
                const themes = ['orange', 'sakura', 'lavender', 'ocean', 'forest', 'midnight'];
                const currentTheme = body.getAttribute('data-theme');
                const currentMode = body.getAttribute('data-mode');
                
                let availableThemes = themes.filter(t => t !== currentTheme);
                const randomTheme = availableThemes[Math.floor(Math.random() * availableThemes.length)];
                
                randomThemeBtn.style.transform = 'rotate(360deg)';
                setTimeout(() => {
                    randomThemeBtn.style.transform = '';
                }, 300);
                
                appliedTheme = randomTheme;
                appliedMode = currentMode;
                applyTheme(randomTheme, currentMode);
            });

        })();
    </script>
</body>
</html>
