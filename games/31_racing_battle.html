<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛车对战</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }
        
        [data-theme="orange"] {
            --primary-color: #ff9f43;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="purple"] {
            --primary-color: #a29bfe;
            --secondary-color: #fd79a8;
        }
        
        [data-theme="green"] {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
        }
        
        [data-theme="blue"] {
            --primary-color: #74b9ff;
            --secondary-color: #00cec9;
        }
        
        [data-theme="pink"] {
            --primary-color: #fd79a8;
            --secondary-color: #a29bfe;
        }
        
        [data-theme="dark"] {
            --bg-color: #2d3436;
            --text-color: #ffffff;
            --card-bg: #343a40;
            --border-color: #495057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-controls {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:nth-child(1) { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
        .theme-btn:nth-child(2) { background: linear-gradient(135deg, #ff9f43, #fd79a8); }
        .theme-btn:nth-child(3) { background: linear-gradient(135deg, #a29bfe, #fd79a8); }
        .theme-btn:nth-child(4) { background: linear-gradient(135deg, #00b894, #0984e3); }
        .theme-btn:nth-child(5) { background: linear-gradient(135deg, #74b9ff, #00cec9); }
        .theme-btn:nth-child(6) { background: linear-gradient(135deg, #fd79a8, #a29bfe); }
        
        .dark-toggle {
            padding: 10px 20px;
            border: 2px solid var(--primary-color);
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-panel {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-width: 150px;
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .lap-count {
            font-size: 16px;
            margin-top: 10px;
            color: var(--text-color);
            opacity: 0.7;
        }

        .game-area {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-board {
            border: 3px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .pause-btn, .share-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .game-over-text {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }

        .nickname-input {
            margin-bottom: 10px;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            text-align: center;
        }

        .random-theme-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">🎮 赛车对战</h1>
        <div class="theme-controls">
            <button class="theme-btn" title="红色主题"></button>
            <button class="theme-btn" title="橙色主题"></button>
            <button class="theme-btn" title="紫色主题"></button>
            <button class="theme-btn" title="绿色主题"></button>
            <button class="theme-btn" title="蓝色主题"></button>
            <button class="theme-btn" title="粉色主题"></button>
            <button class="random-theme-btn" title="随机主题">🎲</button>
            <button class="dark-toggle">🌙</button>
        </div>
    </div>

    <div class="game-container">
        <div class="player-panel">
            <input type="text" class="nickname-input" id="player1Name" value="玩家1" maxlength="10">
            <div class="player-name" id="player1">玩家1</div>
            <div class="player-score" id="score1">0</div>
            <div class="lap-count">圈数: <span id="lap1">0/3</span></div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div class="turn-indicator" id="turnIndicator">准备开始</div>
            
            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">开始游戏</button>
                <button class="control-btn pause-btn" id="pauseBtn">⏸ 暂停</button>
                <button class="control-btn share-btn" id="shareBtn">📤 分享战绩</button>
            </div>
            
            <div class="game-over-overlay hidden" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="winner-text" id="winnerText"></div>
                <button class="control-btn start-btn" id="restartBtn">再玩一次</button>
            </div>
        </div>

        <div class="player-panel">
            <input type="text" class="nickname-input" id="player2Name" value="玩家2" maxlength="10">
            <div class="player-name" id="player2">玩家2</div>
            <div class="player-score" id="score2">0</div>
            <div class="lap-count">圈数: <span id="lap2">0/3</span></div>
        </div>
    </div>

    <div class="instructions">
        <p>🎯 玩家1: ← → 转向 | ↑ 加速 | ↓ 刹车</p>
        <p>🎯 玩家2: A D 转向 | W 加速 | S 刹车</p>
        <p>🏎️ 完成3圈比赛，先到达终点获胜</p>
        <p>⏸ ESC 暂停游戏</p>
    </div>

    <script>
        const themes = ['default', 'orange', 'purple', 'green', 'blue', 'pink'];
        let currentTheme = 0;
        let isDarkMode = false;

        document.querySelectorAll('.theme-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                currentTheme = index;
                document.body.setAttribute('data-theme', themes[index]);
            });
        });

        document.querySelector('.random-theme-btn').addEventListener('click', () => {
            currentTheme = Math.floor(Math.random() * themes.length);
            document.body.setAttribute('data-theme', themes[currentTheme]);
        });

        document.querySelector('.dark-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.setAttribute('data-theme', themes[currentTheme]);
            }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const CAR_WIDTH = 40;
        const CAR_HEIGHT = 60;
        const MAX_SPEED = 8;
        const ACCELERATION = 0.3;
        const FRICTION = 0.05;
        const TURN_SPEED = 0.05;
        const LAPS_TO_WIN = 3;

        let car1 = { 
            x: 100, y: 350, angle: -Math.PI / 2, speed: 0, 
            color: '#ff6b6b', laps: 0, checkpoint: 0 
        };
        let car2 = { 
            x: 500, y: 350, angle: -Math.PI / 2, speed: 0, 
            color: '#4ecdc4', laps: 0, checkpoint: 0 
        };
        
        let isGameRunning = false;
        let isPaused = false;
        let raceWinner = null;

        const checkpoints = [
            { x: 300, y: 50, radius: 40 },
            { x: 550, y: 200, radius: 40 },
            { x: 300, y: 350, radius: 40 },
            { x: 50, y: 200, radius: 40 }
        ];

        function drawTrack() {
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#8b8b8b';
            ctx.fillRect(40, 40, canvas.width - 80, 60);
            ctx.fillRect(40, canvas.height - 100, canvas.width - 80, 60);
            ctx.fillRect(40, 40, 60, canvas.height - 80);
            ctx.fillRect(canvas.width - 100, 40, 60, canvas.height - 80);
            
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(150, 40, canvas.width - 300, 40);
            ctx.fillRect(150, canvas.height - 80, canvas.width - 300, 40);
            ctx.fillRect(40, 150, 40, canvas.height - 300);
            ctx.fillRect(canvas.width - 80, 150, 40, canvas.height - 300);
            
            ctx.fillStyle = '#fff';
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.fillRect(i, canvas.height / 2 - 3, 20, 6);
            }
            
            checkpoints.forEach((cp, index) => {
                ctx.beginPath();
                ctx.arc(cp.x, cp.y, cp.radius, 0, Math.PI * 2);
                ctx.fillStyle = index % 2 === 0 ? '#ffd700' : '#ff6b6b';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
            });
        }

        function drawCar(car) {
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);
            
            ctx.fillStyle = car.color;
            ctx.fillRect(-CAR_WIDTH/2, -CAR_HEIGHT/2, CAR_WIDTH, CAR_HEIGHT);
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(-CAR_WIDTH/2 + 5, -CAR_HEIGHT/2 + 5, CAR_WIDTH - 10, CAR_HEIGHT/3);
            
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(-CAR_WIDTH/2 + 8, CAR_HEIGHT/2 - 5, 6, 0, Math.PI * 2);
            ctx.arc(CAR_WIDTH/2 - 8, CAR_HEIGHT/2 - 5, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function updateCar(car, keys) {
            if (keys.up) car.speed = Math.min(car.speed + ACCELERATION, MAX_SPEED);
            if (keys.down) car.speed = Math.max(car.speed - ACCELERATION * 2, -MAX_SPEED/2);
            
            car.speed *= (1 - FRICTION);
            if (Math.abs(car.speed) < 0.1) car.speed = 0;
            
            if (car.speed !== 0) {
                if (keys.left) car.angle -= TURN_SPEED * (car.speed / MAX_SPEED);
                if (keys.right) car.angle += TURN_SPEED * (car.speed / MAX_SPEED);
            }
            
            car.x += Math.cos(car.angle) * car.speed;
            car.y += Math.sin(car.angle) * car.speed;
            
            car.x = Math.max(CAR_WIDTH/2 + 40, Math.min(canvas.width - CAR_WIDTH/2 - 40, car.x));
            car.y = Math.max(CAR_HEIGHT/2 + 40, Math.min(canvas.height - CAR_HEIGHT/2 - 40, car.y));
            
            checkCheckpoint(car);
        }

        function checkCheckpoint(car) {
            const cp = checkpoints[car.checkpoint];
            const dx = car.x - cp.x;
            const dy = car.y - cp.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < cp.radius + CAR_WIDTH/2) {
                car.checkpoint = (car.checkpoint + 1) % checkpoints.length;
                if (car.checkpoint === 0) {
                    car.laps++;
                    updateLapDisplay();
                    if (car.laps >= LAPS_TO_WIN) {
                        raceWinner = car.color === '#ff6b6b' ? 1 : 2;
                        endGame();
                    }
                }
            }
        }

        function updateLapDisplay() {
            document.getElementById('lap1').textContent = `${car1.laps}/${LAPS_TO_WIN}`;
            document.getElementById('lap2').textContent = `${car2.laps}/${LAPS_TO_WIN}`;
        }

        function endGame() {
            isGameRunning = false;
            showGameOver();
        }

        function showGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            const winnerText = document.getElementById('winnerText');
            
            const winner = raceWinner === 1 ? document.getElementById('player1Name').value : document.getElementById('player2Name').value;
            winnerText.textContent = `${winner} 获胜!`;
            overlay.classList.remove('hidden');
        }

        const keys1 = { up: false, down: false, left: false, right: false };
        const keys2 = { up: false, down: false, left: false, right: false };

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isGameRunning && !isPaused) {
                drawTrack();
                drawCar(car1);
                drawCar(car2);
                updateCar(car1, keys1);
                updateCar(car2, keys2);
            } else if (isPaused) {
                drawTrack();
                drawCar(car1);
                drawCar(car2);
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2);
            }
            
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isGameRunning = true;
            isPaused = false;
            raceWinner = null;
            
            car1 = { x: 100, y: 350, angle: -Math.PI / 2, speed: 0, color: '#ff6b6b', laps: 0, checkpoint: 0 };
            car2 = { x: 500, y: 350, angle: -Math.PI / 2, speed: 0, color: '#4ecdc4', laps: 0, checkpoint: 0 };
            
            updateLapDisplay();
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('player1').textContent = document.getElementById('player1Name').value;
            document.getElementById('player2').textContent = document.getElementById('player2Name').value;
            document.getElementById('turnIndicator').textContent = '比赛进行中';
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (isGameRunning) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('赛车对战战绩', canvas.width / 2, 60);
            
            ctx.font = '24px Arial';
            ctx.fillText(`${document.getElementById('player1Name').value}: ${car1.laps}/${LAPS_TO_WIN}圈`, 150, 150);
            ctx.fillText(`${document.getElementById('player2Name').value}: ${car2.laps}/${LAPS_TO_WIN}圈`, 450, 150);
            
            let result = '';
            if (car1.laps > car2.laps) {
                result = `${document.getElementById('player1Name').value} 获胜!`;
            } else if (car2.laps > car1.laps) {
                result = `${document.getElementById('player2Name').value} 获胜!`;
            } else {
                result = '比赛进行中!';
            }
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(result, canvas.width / 2, 280);
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('🎮 couple-mini-game', canvas.width / 2, 350);
            
            const link = document.createElement('a');
            link.download = 'racing_result.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            if (e.key === 'Escape') {
                document.getElementById('pauseBtn').click();
                return;
            }
            
            if (isPaused) return;
            
            switch (e.key) {
                case 'ArrowUp': keys1.up = true; break;
                case 'ArrowDown': keys1.down = true; break;
                case 'ArrowLeft': keys1.left = true; break;
                case 'ArrowRight': keys1.right = true; break;
                case 'w':
                case 'W': keys2.up = true; break;
                case 's':
                case 'S': keys2.down = true; break;
                case 'a':
                case 'A': keys2.left = true; break;
                case 'd':
                case 'D': keys2.right = true; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowUp': keys1.up = false; break;
                case 'ArrowDown': keys1.down = false; break;
                case 'ArrowLeft': keys1.left = false; break;
                case 'ArrowRight': keys1.right = false; break;
                case 'w':
                case 'W': keys2.up = false; break;
                case 's':
                case 'S': keys2.down = false; break;
                case 'a':
                case 'A': keys2.left = false; break;
                case 'd':
                case 'D': keys2.right = false; break;
            }
        });

        gameLoop();
    </script>
</body>
</html>
