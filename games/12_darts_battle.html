<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞镖对战</title>
    <style>
        :root {
            --bg-gradient-1: #ffecd2;
            --bg-gradient-2: #fcb69f;
            --bg-gradient-3: #ffd89b;
            --primary-color: #e65100;
            --secondary-color: #f57c00;
            --accent-color: #bf360c;
            --btn-gradient-1: #ff7f50;
            --btn-gradient-2: #ff6347;
            --btn-shadow: rgba(255, 127, 80, 0.4);
            --btn-shadow-hover: rgba(255, 127, 80, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 165, 0, 0.4);
            --card-hover-border: #ff7f50;
            --card-shadow: rgba(255, 127, 80, 0.3);
            --text-primary: #4e342e;
            --text-secondary: #6d4c41;
            --tag-bg-1: #fff3e0;
            --tag-bg-2: #ffe0b2;
            --tag-text: #ef6c00;
            --divider-color: #ffcc80;
            --link-color: #e65100;
            --decoration-1: '🧡';
            --decoration-2: '🍊';
        }

        [data-theme="sakura"] {
            --bg-gradient-1: #ff9a9e;
            --bg-gradient-2: #fecfef;
            --bg-gradient-3: #fecfef;
            --primary-color: #d63384;
            --secondary-color: #c2185b;
            --accent-color: #8b4513;
            --btn-gradient-1: #ff6b9d;
            --btn-gradient-2: #c44569;
            --btn-shadow: rgba(255, 107, 157, 0.4);
            --btn-shadow-hover: rgba(255, 107, 157, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 182, 193, 0.5);
            --card-hover-border: #ff6b9d;
            --card-shadow: rgba(255, 107, 157, 0.3);
            --text-primary: #5a3a3a;
            --text-secondary: #7a5a5a;
            --tag-bg-1: #ffe0e9;
            --tag-bg-2: #ffd1dc;
            --tag-text: #c2185b;
            --divider-color: #ffb6c1;
            --link-color: #d63384;
            --decoration-1: '💕';
            --decoration-2: '💖';
        }

        [data-theme="lavender"] {
            --bg-gradient-1: #a8edea;
            --bg-gradient-2: #fed6e3;
            --bg-gradient-3: #d299c2;
            --primary-color: #7b1fa2;
            --secondary-color: #9c27b0;
            --accent-color: #4a148c;
            --btn-gradient-1: #ba68c8;
            --btn-gradient-2: #9c27b0;
            --btn-shadow: rgba(186, 104, 200, 0.4);
            --btn-shadow-hover: rgba(186, 104, 200, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(186, 104, 200, 0.4);
            --card-hover-border: #ba68c8;
            --card-shadow: rgba(186, 104, 200, 0.3);
            --text-primary: #4a148c;
            --text-secondary: #6a1b9a;
            --tag-bg-1: #f3e5f5;
            --tag-bg-2: #e1bee7;
            --tag-text: #7b1fa2;
            --divider-color: #ce93d8;
            --link-color: #7b1fa2;
            --decoration-1: '💜';
            --decoration-2: '🔮';
        }

        [data-theme="ocean"] {
            --bg-gradient-1: #a1c4fd;
            --bg-gradient-2: #c2e9fb;
            --bg-gradient-3: #89f7fe;
            --primary-color: #1565c0;
            --secondary-color: #1976d2;
            --accent-color: #0d47a1;
            --btn-gradient-1: #42a5f5;
            --btn-gradient-2: #1e88e5;
            --btn-shadow: rgba(66, 165, 245, 0.4);
            --btn-shadow-hover: rgba(66, 165, 245, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(66, 165, 245, 0.4);
            --card-hover-border: #42a5f5;
            --card-shadow: rgba(66, 165, 245, 0.3);
            --text-primary: #0d47a1;
            --text-secondary: #1565c0;
            --tag-bg-1: #e3f2fd;
            --tag-bg-2: #bbdefb;
            --tag-text: #1565c0;
            --divider-color: #90caf9;
            --link-color: #1565c0;
            --decoration-1: '💙';
            --decoration-2: '🌊';
        }

        [data-theme="forest"] {
            --bg-gradient-1: #a8e063;
            --bg-gradient-2: #56ab2f;
            --bg-gradient-3: #a8e063;
            --primary-color: #2e7d32;
            --secondary-color: #388e3c;
            --accent-color: #1b5e20;
            --btn-gradient-1: #66bb6a;
            --btn-gradient-2: #388e3c;
            --btn-shadow: rgba(102, 187, 106, 0.4);
            --btn-shadow-hover: rgba(102, 187, 106, 0.6);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(102, 187, 106, 0.4);
            --card-hover-border: #66bb6a;
            --card-shadow: rgba(102, 187, 106, 0.3);
            --text-primary: #1b5e20;
            --text-secondary: #2e7d32;
            --tag-bg-1: #e8f5e9;
            --tag-bg-2: #c8e6c9;
            --tag-text: #2e7d32;
            --divider-color: #a5d6a7;
            --link-color: #2e7d32;
            --decoration-1: '💚';
            --decoration-2: '🌿';
        }

        [data-theme="midnight"] {
            --bg-gradient-1: #232526;
            --bg-gradient-2: #414345;
            --bg-gradient-3: #232526;
            --primary-color: #ffd700;
            --secondary-color: #ffc107;
            --accent-color: #ff8f00;
            --btn-gradient-1: #ffd700;
            --btn-gradient-2: #ffc107;
            --btn-shadow: rgba(255, 215, 0, 0.4);
            --btn-shadow-hover: rgba(255, 215, 0, 0.6);
            --card-bg: rgba(50, 50, 50, 0.9);
            --card-border: rgba(255, 215, 0, 0.3);
            --card-hover-border: #ffd700;
            --card-shadow: rgba(255, 215, 0, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --tag-bg-1: #424242;
            --tag-bg-2: #616161;
            --tag-text: #ffd700;
            --divider-color: #ffd700;
            --link-color: #ffd700;
            --decoration-1: '⭐';
            --decoration-2: '🌙';
        }

        [data-mode="dark"] {
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
        }

        [data-mode="dark"][data-theme="orange"] {
            --bg-gradient-1: #1a0f00;
            --bg-gradient-2: #2d1810;
            --bg-gradient-3: #1a0f00;
            --card-bg: rgba(40, 30, 20, 0.9);
        }

        [data-mode="dark"][data-theme="sakura"] {
            --bg-gradient-1: #1a0a10;
            --bg-gradient-2: #2d1020;
            --bg-gradient-3: #1a0a10;
            --card-bg: rgba(40, 20, 30, 0.9);
        }

        [data-mode="dark"][data-theme="lavender"] {
            --bg-gradient-1: #0f0a1a;
            --bg-gradient-2: #1a102d;
            --bg-gradient-3: #0f0a1a;
            --card-bg: rgba(30, 20, 40, 0.9);
        }

        [data-mode="dark"][data-theme="ocean"] {
            --bg-gradient-1: #0a0f1a;
            --bg-gradient-2: #101a2d;
            --bg-gradient-3: #0a0f1a;
            --card-bg: rgba(20, 30, 40, 0.9);
        }

        [data-mode="dark"][data-theme="forest"] {
            --bg-gradient-1: #0a1a0f;
            --bg-gradient-2: #102d1a;
            --bg-gradient-3: #0a1a0f;
            --card-bg: rgba(20, 40, 30, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: var(--decoration-1);
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: var(--decoration-2);
            position: fixed;
            top: 60%;
            right: 5%;
            font-size: 2.5rem;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .theme-panel h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-section {
            margin-bottom: 1.2rem;
        }

        .theme-section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .color-themes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .color-theme-btn {
            padding: 0.5rem;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            color: white;
            font-weight: 500;
        }

        .color-theme-btn:hover {
            transform: scale(1.05);
        }

        .color-theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .color-theme-btn[data-theme="orange"] {
            background: linear-gradient(135deg, #ff7f50, #ff6347);
        }

        .color-theme-btn[data-theme="sakura"] {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
        }

        .color-theme-btn[data-theme="lavender"] {
            background: linear-gradient(135deg, #ba68c8, #9c27b0);
        }

        .color-theme-btn[data-theme="ocean"] {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .color-theme-btn[data-theme="forest"] {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
        }

        .color-theme-btn[data-theme="midnight"] {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .mode-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mode-btn:hover {
            border-color: var(--btn-gradient-1);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border-color: transparent;
        }

        .nickname-section {
            margin-bottom: 1.2rem;
        }

        .nickname-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .nickname-input-group:last-child {
            margin-bottom: 0;
        }

        .nickname-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 60px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .nickname-input {
            flex: 1;
            padding: 0.5rem 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nickname-input:focus {
            outline: none;
            border-color: var(--btn-gradient-1);
        }

        .nickname-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .save-nickname-btn {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .save-nickname-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px var(--btn-shadow);
        }

        .save-nickname-btn:active {
            transform: scale(0.98);
        }

        .random-theme-btn {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .random-theme-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .random-theme-btn:active {
            transform: scale(0.98);
        }

        .pause-btn {
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            box-shadow: 0 4px 15px var(--btn-shadow);
        }

        .pause-btn:hover {
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .share-btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .share-btn:hover {
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.6);
        }

        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .pause-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .pause-overlay h2 {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
            text-shadow: 0 0 20px var(--btn-shadow);
        }

        .pause-overlay .button-group {
            gap: 1rem;
        }

        .share-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid var(--card-border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            display: none;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .share-modal.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .share-modal h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.5rem;
        }

        .share-preview {
            margin: 1rem 0;
            text-align: center;
        }

        .share-preview canvas {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .share-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .share-actions button {
            flex: 1;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .download-btn:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 1;
        }

        .game-info {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-secondary);
            z-index: 1;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--btn-shadow);
            z-index: 100;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        .game-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            z-index: 1;
            max-width: 1200px;
        }

        .player-area {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 30px var(--card-shadow);
            backdrop-filter: blur(10px);
            min-width: 200px;
        }

        .player-area h2 {
            text-align: center;
            margin-bottom: 15px;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .player1-area h2 {
            color: #e91e63;
        }

        .player2-area h2 {
            color: #2196f3;
        }

        .score-display {
            text-align: center;
            margin-bottom: 15px;
        }

        .score-display .score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .round-display {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .dartboard-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }

        .dartboard {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #fff 10%, #000 10%, #000 12%, #ff0000 12%, #ff0000 20%, #000 20%, #000 22%, #00ff00 22%, #00ff00 30%, #000 30%, #000 32%, #ff0000 32%, #ff0000 40%, #000 40%, #000 42%, #00ff00 42%, #00ff00 50%);
            position: relative;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .dartboard::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ff0000 0%, #ff0000 40%, #000 40%, #000 60%, #00ff00 60%);
            border-radius: 50%;
        }

        .dart {
            position: absolute;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .dart::before {
            content: '🎯';
            font-size: 1.5rem;
        }

        .power-bar-container {
            width: 100%;
            height: 30px;
            background: #ddd;
            border-radius: 15px;
            margin-top: 20px 0;
            overflow: hidden;
            position: relative;
        }

        .power-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
            transition: width 0.1s linear;
        }

        .controls-info {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .controls-info span {
            display: inline-block;
            background: var(--tag-bg-1);
            color: var(--tag-text);
            padding: 3px 8px;
            border-radius: 5px;
            margin: 2px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
            z-index: 1;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--btn-gradient-1), var(--btn-gradient-2));
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--btn-shadow);
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--btn-shadow-hover);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            box-shadow: none;
        }

        button.secondary:hover {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 0 20px var(--btn-shadow);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .game-status {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            min-height: 30px;
            z-index: 1;
        }

        .winner {
            color: #4caf50;
            font-size: 1.5rem;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .current-player {
            animation: pulse 0.5s ease;
        }

        .throw-btn {
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4);
            font-size: 1.2rem;
            padding: 15px 40px;
        }

        .throw-btn:hover {
            box-shadow: 0 6px 20px rgba(156, 39, 176, 0.6);
        }

        @media (max-width: 900px) {
            .game-container {
                flex-direction: column;
                align-items: center;
            }

            .dartboard-container {
                width: 300px;
                height: 300px;
            }

            h1 {
                font-size: 1.8rem;
                margin-top: 60px;
            }
        }
    </style>
</head>
<body data-theme="orange" data-mode="light">
    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>

    <div class="theme-toggle">
        <button class="theme-btn" id="themeBtn" title="切换主题">🎨</button>
    </div>

    <div class="theme-panel" id="themePanel">
        <h3>🎨 主题设置</h3>
        
        <div class="theme-section">
            <div class="theme-section-title">选择颜色</div>
            <div class="color-themes">
                <button class="color-theme-btn" data-theme="orange">🍊 橘色</button>
                <button class="color-theme-btn" data-theme="sakura">🌸 粉色</button>
                <button class="color-theme-btn" data-theme="lavender">💜 紫色</button>
                <button class="color-theme-btn" data-theme="ocean">💙 蓝色</button>
                <button class="color-theme-btn" data-theme="forest">💚 绿色</button>
                <button class="color-theme-btn" data-theme="midnight">🌙 暗夜</button>
            </div>
        </div>
        
        <div class="theme-section">
            <div class="theme-section-title">显示模式</div>
            <div class="mode-toggle">
                <button class="mode-btn" data-mode="light">☀️ 浅色</button>
                <button class="mode-btn" data-mode="dark">🌙 深色</button>
            </div>
        </div>

        <div class="theme-section">
            <div class="theme-section-title">👫 玩家昵称</div>
            <div class="nickname-section">
                <div class="nickname-input-group">
                    <span class="nickname-label">👤 玩家1</span>
                    <input type="text" class="nickname-input" id="player1Name" placeholder="输入昵称" maxlength="10">
                </div>
                <div class="nickname-input-group">
                    <span class="nickname-label">👤 玩家2</span>
                    <input type="text" class="nickname-input" id="player2Name" placeholder="输入昵称" maxlength="10">
                </div>
                <button class="save-nickname-btn" id="saveNicknameBtn">
                    💾 保存昵称
                </button>
            </div>
        </div>

        <div class="theme-section">
            <button class="random-theme-btn" id="randomThemeBtn">
                🎲 随机主题
            </button>
        </div>
    </div>

    <div class="pause-overlay" id="pauseOverlay">
        <h2>⏸️ 游戏暂停</h2>
        <div class="button-group">
            <button id="resumeBtn">▶️ 继续游戏</button>
            <button id="pauseRestartBtn" class="secondary">🔄 重新开始</button>
            <button id="backToMenuBtn" class="secondary">🏠 返回主页</button>
        </div>
    </div>

    <div class="share-modal" id="shareModal">
        <h3>📸 分享战绩</h3>
        <div class="share-preview">
            <canvas id="shareCanvas" width="600" height="400"></canvas>
        </div>
        <div class="share-actions">
            <button id="downloadBtn" class="download-btn">💾 下载图片</button>
            <button id="closeShareBtn" class="secondary">❌ 关闭</button>
        </div>
    </div>

    <h1>🎯 飞镖对战</h1>
    <div class="game-info">双人对战 - 投掷飞镖，比拼得分！</div>

    <div class="game-container">
        <div class="player-area player1-area">
            <h2 id="player1Title">👤 玩家1</h2>
            <div class="score-display">
                <div class="score" id="score1">0</div>
                <div class="round-display">回合: <span id="round1">0</span>/5</div>
            </div>
            <div class="controls-info">
                控制: <span>空格</span> 投掷
            </div>
        </div>

        <div class="dartboard-container">
            <div class="dartboard" id="dartboard"></div>
            <div class="dart" id="dart"></div>
            <div class="power-bar-container">
                <div class="power-bar" id="powerBar"></div>
            </div>
            <div class="game-status" id="gameStatus">点击飞镖盘选择位置，按空格投掷！</div>
        </div>

        <div class="player-area player2-area">
            <h2 id="player2Title">👤 玩家2</h2>
            <div class="score-display">
                <div class="score" id="score2">0</div>
                <div class="round-display">回合: <span id="round2">0</span>/5</div>
            </div>
            <div class="controls-info">
                控制: <span>回车</span> 投掷
            </div>
        </div>
    </div>

    <div class="button-group">
        <button id="pauseBtn" class="pause-btn">⏸️ 暂停</button>
        <button id="shareBtn" class="share-btn">📸 分享战绩</button>
        <button id="throwBtn" class="throw-btn">🎯 投掷飞镖</button>
        <button id="restartBtn">🔄 重新开始</button>
    </div>

    <script>
        (function() {
            const TOTAL_ROUNDS = 5;
            let score1 = 0;
            let score2 = 0;
            let round1 = 0;
            let round2 = 0;
            let currentPlayer = 1;
            let gameRunning = true;
            let gamePaused = false;
            let power = 0;
            let powerDirection = 1;
            let powerInterval = null;
            let targetX = 200;
            let targetY = 200;
            let dartThrown = false;

            function getUrlParams() {
                const params = new URLSearchParams(window.location.search);
                return {
                    player1: params.get('p1') || localStorage.getItem('couple-game-player1') || '玩家1',
                    player2: params.get('p2') || localStorage.getItem('couple-game-player2') || '玩家2'
                };
            }

            const { player1, player2 } = getUrlParams();

            document.getElementById('player1Title').textContent = `👤 ${player1}`;
            document.getElementById('player2Title').textContent = `👤 ${player2}`;

            const dartboard = document.getElementById('dartboard');
            const dart = document.getElementById('dart');
            const powerBar = document.getElementById('powerBar');
            const gameStatusEl = document.getElementById('gameStatus');
            const score1El = document.getElementById('score1');
            const score2El = document.getElementById('score2');
            const round1El = document.getElementById('round1');
            const round2El = document.getElementById('round2');
            const throwBtn = document.getElementById('throwBtn');

            function updateStatus(message) {
                gameStatusEl.textContent = message;
            }

            function calculateScore(x, y, power) {
                const centerX = 200;
                const centerY = 200;
                const distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
                
                const accuracy = Math.max(0, 1 - Math.abs(power - 70) / 70);
                const actualDistance = distance * (1 - accuracy * 0.3);
                
                if (actualDistance <= 20) return 50;
                if (actualDistance <= 40) return 25;
                if (actualDistance <= 60) return 20;
                if (actualDistance <= 80) return 15;
                if (actualDistance <= 100) return 10;
                if (actualDistance <= 120) return 5;
                if (actualDistance <= 140) return 3;
                if (actualDistance <= 160) return 1;
                return 0;
            }

            function showDart(x, y) {
                dart.style.left = x + 'px';
                dart.style.top = y + 'px';
                dart.style.display = 'block';
            }

            function hideDart() {
                dart.style.display = 'none';
            }

            function startPowerBar() {
                power = 0;
                powerDirection = 1;
                powerInterval = setInterval(() => {
                    power += powerDirection * 3;
                    if (power >= 100) {
                        power = 100;
                        powerDirection = -1;
                    } else if (power <= 0) {
                        power = 0;
                        powerDirection = 1;
                    }
                    powerBar.style.width = power + '%';
                }, 30);
            }

            function stopPowerBar() {
                clearInterval(powerInterval);
                powerInterval = null;
            }

            function throwDart() {
                if (!gameRunning || gamePaused || dartThrown) return;
                if (powerInterval === null) {
                    startPowerBar();
                    updateStatus(`玩家${currentPlayer} - 再次按投掷键发射！`);
                    return;
                }

                stopPowerBar();
                dartThrown = true;

                const actualX = targetX + (Math.random() - 0.5) * (100 - power);
                const actualY = targetY + (Math.random() - 0.5) * (100 - power);

                showDart(actualX, actualY);

                const points = calculateScore(actualX, actualY, power);

                if (currentPlayer === 1) {
                    score1 += points;
                    round1++;
                    score1El.textContent = score1;
                    round1El.textContent = round1;
                } else {
                    score2 += points;
                    round2++;
                    score2El.textContent = score2;
                    round2El.textContent = round2;
                }

                updateStatus(`玩家${currentPlayer} 获得 ${points} 分！`);

                setTimeout(() => {
                    hideDart();
                    dartThrown = false;
                    powerBar.style.width = '0%';

                    if (round1 >= TOTAL_ROUNDS && round2 >= TOTAL_ROUNDS) {
                        endGame();
                    } else {
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        updateStatus(`轮到 ${currentPlayer === 1 ? player1 : player2} - 点击飞镖盘选择位置`);
                    }
                }, 1500);
            }

            function endGame() {
                gameRunning = false;
                let result;
                if (score1 > score2) {
                    result = `🏆 ${player1} 获胜！`;
                } else if (score2 > score1) {
                    result = `🏆 ${player2} 获胜！`;
                } else {
                    result = '🤝 平局！';
                }
                gameStatusEl.innerHTML = `<span class="winner">${result} 最终比分: ${score1} - ${score2}</span>`;
                throwBtn.disabled = true;
            }

            function initGame() {
                score1 = 0;
                score2 = 0;
                round1 = 0;
                round2 = 0;
                currentPlayer = 1;
                gameRunning = true;
                gamePaused = false;
                dartThrown = false;
                targetX = 200;
                targetY = 200;

                score1El.textContent = '0';
                score2El.textContent = '0';
                round1El.textContent = '0';
                round2El.textContent = '0';
                throwBtn.disabled = false;
                powerBar.style.width = '0%';
                hideDart();

                updateStatus(`轮到 ${player1} - 点击飞镖盘选择位置`);
            }

            dartboard.addEventListener('click', (e) => {
                if (!gameRunning || gamePaused || dartThrown) return;
                const rect = dartboard.getBoundingClientRect();
                targetX = e.clientX - rect.left;
                targetY = e.clientY - rect.top;
                updateStatus(`玩家${currentPlayer} - 按投掷键发射！`);
            });

            throwBtn.addEventListener('click', throwDart);

            document.addEventListener('keydown', (e) => {
                if (gamePaused) return;

                if (currentPlayer === 1 && e.code === 'Space') {
                    e.preventDefault();
                    throwDart();
                } else if (currentPlayer === 2 && e.code === 'Enter') {
                    e.preventDefault();
                    throwDart();
                }
            });

            const pauseBtn = document.getElementById('pauseBtn');
            const pauseOverlay = document.getElementById('pauseOverlay');
            const resumeBtn = document.getElementById('resumeBtn');
            const pauseRestartBtn = document.getElementById('pauseRestartBtn');
            const backToMenuBtn = document.getElementById('backToMenuBtn');

            function togglePause() {
                if (!gameRunning) return;
                
                gamePaused = !gamePaused;
                
                if (gamePaused) {
                    pauseOverlay.classList.add('active');
                    pauseBtn.textContent = '▶️ 继续';
                    stopPowerBar();
                    updateStatus('⏸️ 游戏暂停 - 按空格键继续');
                } else {
                    pauseOverlay.classList.remove('active');
                    pauseBtn.textContent = '⏸️ 暂停';
                    updateStatus(`轮到 ${currentPlayer === 1 ? player1 : player2} - 点击飞镖盘选择位置');
                }
            }

            pauseBtn.addEventListener('click', togglePause);
            resumeBtn.addEventListener('click', togglePause);

            pauseRestartBtn.addEventListener('click', () => {
                pauseOverlay.classList.remove('active');
                gamePaused = false;
                pauseBtn.textContent = '⏸️ 暂停';
                initGame();
            });

            backToMenuBtn.addEventListener('click', () => {
                window.location.href = '../index.html';
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && gameRunning && !dartThrown && powerInterval === null) {
                } else if (e.code === 'KeyP' && gameRunning) {
                    e.preventDefault();
                    togglePause();
                }
            });

            const shareBtn = document.getElementById('shareBtn');
            const shareModal = document.getElementById('shareModal');
            const downloadBtn = document.getElementById('downloadBtn');
            const closeShareBtn = document.getElementById('closeShareBtn');

            function generateShareImage() {
                const canvas = document.getElementById('shareCanvas');
                const ctx = canvas.getContext('2d');
                
                const gradient = ctx.createLinearGradient(0, 0, 600, 400);
                gradient.addColorStop(0, '#ffecd2');
                gradient.addColorStop(0.5, '#fcb69f');
                gradient.addColorStop(1, '#ffd89b');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 600, 400);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.roundRect(30, 30, 540, 340, 20);
                ctx.fill();
                
                ctx.font = 'bold 36px Arial';
                ctx.fillStyle = '#e65100';
                ctx.textAlign = 'center';
                ctx.fillText('🎯 飞镖对战', 300, 80);
                
                ctx.font = '24px Arial';
                ctx.fillStyle = '#4e342e';
                ctx.fillText('🎮 游戏战绩', 300, 120);
                
                ctx.font = 'bold 28px Arial';
                ctx.fillStyle = '#e91e63';
                ctx.fillText(`${player1}`, 150, 180);
                
                ctx.font = 'bold 48px Arial';
                ctx.fillStyle = '#e65100';
                ctx.fillText(`${score1} : ${score2}`, 300, 190);
                
                ctx.font = 'bold 28px Arial';
                ctx.fillStyle = '#2196f3';
                ctx.fillText(`${player2}`, 450, 180);
                
                let result = '游戏进行中';
                if (!gameRunning) {
                    if (score1 > score2) {
                        result = `🏆 胜利者: ${player1}`;
                    } else if (score2 > score1) {
                        result = `🏆 胜利者: ${player2}`;
                    } else {
                        result = '🤝 平局';
                    }
                }
                
                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = '#ff9800';
                ctx.fillText(result, 300, 250);
                
                ctx.font = '20px Arial';
                ctx.fillStyle = '#6d4c41';
                ctx.fillText(`回合: ${round1 + round2}/10`, 300, 300);
                
                ctx.font = '18px Arial';
                ctx.fillStyle = '#6d4c41';
                ctx.fillText('💑 情侣小游戏 - 属于我们的甜蜜时光', 300, 340);
                ctx.fillText('https://lccuhk.github.io/couple-mini-game/', 300, 370);
                
                ctx.font = '40px Arial';
                ctx.fillText('🧡', 80, 360);
                ctx.fillText('🍊', 520, 360);
            }

            shareBtn.addEventListener('click', () => {
                generateShareImage();
                shareModal.classList.add('active');
            });

            closeShareBtn.addEventListener('click', () => {
                shareModal.classList.remove('active');
            });

            downloadBtn.addEventListener('click', () => {
                const canvas = document.getElementById('shareCanvas');
                const link = document.createElement('a');
                link.download = `飞镖对战战绩_${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            document.getElementById('restartBtn').addEventListener('click', initGame);

            initGame();
        })();
    </script>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeBtn');
            const themePanel = document.getElementById('themePanel');
            const randomThemeBtn = document.getElementById('randomThemeBtn');
            const player1NameInput = document.getElementById('player1Name');
            const player2NameInput = document.getElementById('player2Name');
            const saveNicknameBtn = document.getElementById('saveNicknameBtn');
            
            const savedPlayer1Name = localStorage.getItem('couple-game-player1') || '玩家1';
            const savedPlayer2Name = localStorage.getItem('couple-game-player2') || '玩家2';
            
            player1NameInput.value = savedPlayer1Name;
            player2NameInput.value = savedPlayer2Name;
            
            saveNicknameBtn.addEventListener('click', () => {
                const p1 = player1NameInput.value.trim() || '玩家1';
                const p2 = player2NameInput.value.trim() || '玩家2';
                
                localStorage.setItem('couple-game-player1', p1);
                localStorage.setItem('couple-game-player2', p2);
                
                saveNicknameBtn.textContent = '✅ 已保存';
                setTimeout(() => {
                    saveNicknameBtn.textContent = '💾 保存昵称';
                }, 1500);
            });

            const colorThemeBtns = document.querySelectorAll('.color-theme-btn');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const body = document.body;

            const savedTheme = localStorage.getItem('couple-game-theme') || 'orange';
            const savedMode = localStorage.getItem('couple-game-mode') || 'light';

            function applyTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
                
                colorThemeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                
                modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });

                localStorage.setItem('couple-game-theme', theme);
                localStorage.setItem('couple-game-mode', mode);
            }

            applyTheme(savedTheme, savedMode);

            let appliedTheme = savedTheme;
            let appliedMode = savedMode;

            function previewTheme(theme, mode) {
                body.setAttribute('data-theme', theme);
                body.setAttribute('data-mode', mode);
            }

            function restoreTheme() {
                body.setAttribute('data-theme', appliedTheme);
                body.setAttribute('data-mode', appliedMode);
            }

            themeBtn.addEventListener('click', () => {
                themePanel.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
                    themePanel.classList.remove('active');
                }
            });

            colorThemeBtns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    previewTheme(theme, mode);
                });
                
                btn.addEventListener('mouseleave', () => {
                    restoreTheme();
                });
                
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    const mode = body.getAttribute('data-mode');
                    appliedTheme = theme;
                    appliedMode = mode;
                    applyTheme(theme, mode);
                });
            });

            modeBtns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    previewTheme(theme, mode);
                });
                
                btn.addEventListener('mouseleave', () => {
                    restoreTheme();
                });
                
                btn.addEventListener('click', () => {
                    const theme = body.getAttribute('data-theme');
                    const mode = btn.dataset.mode;
                    appliedTheme = theme;
                    appliedMode = mode;
                    applyTheme(theme, mode);
                });
            });

            randomThemeBtn.addEventListener('click', () => {
                const themes = ['orange', 'sakura', 'lavender', 'ocean', 'forest', 'midnight'];
                const currentTheme = body.getAttribute('data-theme');
                const currentMode = body.getAttribute('data-mode');
                
                let availableThemes = themes.filter(t => t !== currentTheme);
                const randomTheme = availableThemes[Math.floor(Math.random() * availableThemes.length)];
                
                randomThemeBtn.style.transform = 'rotate(360deg)';
                setTimeout(() => {
                    randomThemeBtn.style.transform = '';
                }, 300);
                
                appliedTheme = randomTheme;
                appliedMode = currentMode;
                applyTheme(randomTheme, currentMode);
            });

        })();
    </script>
</body>
