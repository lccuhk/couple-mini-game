<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人乒乓球对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 0;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .player {
            padding: 0.5rem 1.5rem;
            border-radius: 10px;
            min-width: 120px;
        }

        .player1 {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .player2 {
            background: rgba(255, 0, 255, 0.2);
            border: 2px solid #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        .score {
            font-size: 2rem;
            margin-top: 0.3rem;
        }

        .vs {
            font-size: 1.5rem;
            color: #888;
        }

        #gameCanvas {
            border: 3px solid #444;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), 0 0 60px rgba(255, 0, 255, 0.1);
            background: #0f0f23;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .control-info h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .key {
            display: inline-block;
            background: #333;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            margin: 0.2rem;
            font-family: monospace;
            border: 1px solid #555;
            box-shadow: 0 2px 0 #222;
        }

        .game-status {
            margin-top: 1rem;
            font-size: 1.2rem;
            min-height: 1.5rem;
            color: #00ffff;
        }

        .winner {
            font-size: 2rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: linear-gradient(90deg, #666, #444);
        }

        button.secondary:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 40, 0.95);
            padding: 2rem;
            border-radius: 15px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            z-index: 100;
            display: none;
            min-width: 300px;
        }

        .settings-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .settings-panel h2 {
            margin-bottom: 1.5rem;
            color: #00ffff;
        }

        .setting-item {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .setting-item label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .setting-item select {
            width: 100%;
            padding: 0.5rem;
            border-radius: 8px;
            border: 2px solid #444;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .setting-item select:focus {
            outline: none;
            border-color: #00ffff;
        }

        .setting-item .toggle {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 25px;
            background: #444;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: linear-gradient(90deg, #00ffff, #ff00ff);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 21px;
            height: 21px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(25px);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 99;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }

        .countdown.show {
            animation: countdownPop 1s ease-out;
        }

        @keyframes countdownPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        @media (max-width: 900px) {
            h1 {
                font-size: 1.8rem;
            }

            #gameCanvas {
                width: 100%;
                max-width: 600px;
                height: auto;
            }

            .scoreboard {
                font-size: 1.2rem;
            }

            .player {
                padding: 0.3rem 1rem;
                min-width: 100px;
            }

            .score {
                font-size: 1.5rem;
            }

            .controls {
                gap: 1rem;
            }

            .control-info {
                padding: 0.8rem 1rem;
            }

            .countdown {
                font-size: 5rem;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }

            .scoreboard {
                font-size: 1rem;
                gap: 0.5rem;
            }

            .player {
                min-width: 80px;
            }

            .vs {
                font-size: 1rem;
            }

            .controls {
                flex-direction: column;
                gap: 0.5rem;
            }

            .control-info {
                padding: 0.6rem 1.2rem;
            }

            .countdown {
                font-size: 3rem;
            }

            button {
                padding: 0.6rem 1.5rem;
                font-size: 0.9rem;
            }
        }
            .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
        }


    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
    <div class="game-container">
        <h1>🏓 双人乒乓球对战 🏓</h1>
        
        <div class="scoreboard">
            <div class="player player1">
                <div>玩家 1</div>
                <div class="score" id="score1">0</div>
            </div>
            <div class="vs">VS</div>
            <div class="player player2">
                <div>玩家 2</div>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="500" tabindex="0"></canvas>
            <div class="countdown" id="countdown"></div>
        </div>

        <div class="game-status" id="gameStatus">点击游戏区域，然后按 空格键 开始</div>

        <div class="controls">
            <div class="control-info">
                <h3>🎮 玩家 1 控制</h3>
                <span class="key">W</span> 向上<br>
                <span class="key">S</span> 向下
            </div>
            <div class="control-info">
                <h3>🎮 玩家 2 控制</h3>
                <span class="key">↑</span> 向上<br>
                <span class="key">↓</span> 向下
            </div>
            <div class="control-info">
                <h3>⏸️ 游戏控制</h3>
                <span class="key">空格</span> 开始/暂停<br>
                <span class="key">R</span> 重新开始
            </div>
        </div>

        <div class="button-group">
            <button id="restartBtn">🔄 重新开始</button>
            <button id="settingsBtn" class="secondary">⚙️ 设置</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <h2>⚙️ 游戏设置</h2>
        <div class="setting-item">
            <label>🏆 获胜分数</label>
            <select id="winningScore">
                <option value="3">3 分制</option>
                <option value="5" selected>5 分制</option>
                <option value="7">7 分制</option>
                <option value="11">11 分制</option>
                <option value="15">15 分制</option>
                <option value="21">21 分制</option>
            </select>
        </div>
        <div class="setting-item">
            <label>🔊 音效</label>
            <div class="toggle">
                <div class="toggle-switch active" id="soundToggle"></div>
                <span id="soundStatus">开启</span>
            </div>
        </div>
        <div class="button-group">
            <button id="saveSettings">💾 保存</button>
            <button id="closeSettings" class="secondary">❌ 关闭</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const gameStatusEl = document.getElementById('gameStatus');
        const restartBtn = document.getElementById('restartBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const overlay = document.getElementById('overlay');
        const closeSettings = document.getElementById('closeSettings');
        const saveSettings = document.getElementById('saveSettings');
        const winningScoreSelect = document.getElementById('winningScore');
        const soundToggle = document.getElementById('soundToggle');
        const soundStatus = document.getElementById('soundStatus');
        const countdownEl = document.getElementById('countdown');

        let WINNING_SCORE = 5;
        let soundEnabled = true;
        const PADDLE_WIDTH = 12;
        const PADDLE_HEIGHT = 100;
        const BALL_SIZE = 12;
        const PADDLE_SPEED = 8;
        const INITIAL_BALL_SPEED = 5;

        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(frequency, duration, type = 'sine', volume = 0.3) {
            if (!soundEnabled || !audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playHitSound() {
            playSound(440, 0.1, 'square', 0.2);
        }

        function playScoreSound() {
            playSound(523, 0.15, 'sine', 0.3);
            setTimeout(() => playSound(659, 0.15, 'sine', 0.3), 100);
            setTimeout(() => playSound(784, 0.2, 'sine', 0.3), 200);
        }

        function playWinSound() {
            const notes = [523, 587, 659, 698, 784, 880, 988, 1047];
            notes.forEach((note, i) => {
                setTimeout(() => playSound(note, 0.2, 'sine', 0.3), i * 100);
            });
        }

        function playCountdownSound() {
            playSound(880, 0.1, 'sine', 0.2);
        }

        function playGoSound() {
            playSound(1047, 0.3, 'sine', 0.4);
        }

        let gameRunning = false;
        let gamePaused = false;
        let isCountingDown = false;
        let score1 = 0;
        let score2 = 0;

        let paddle1 = {
            x: 20,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0,
            color: '#00ffff',
            originalColor: '#00ffff',
            flashColor: '#ffffff',
            flashTime: 0
        };

        let paddle2 = {
            x: canvas.width - 20 - PADDLE_WIDTH,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0,
            color: '#ff00ff',
            originalColor: '#ff00ff',
            flashColor: '#ffffff',
            flashTime: 0
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: BALL_SIZE,
            dx: INITIAL_BALL_SPEED,
            dy: INITIAL_BALL_SPEED * (Math.random() > 0.5 ? 1 : -1),
            speed: INITIAL_BALL_SPEED,
            color: '#ffffff'
        };

        let particles = [];
        let confettiParticles = [];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.color = ['#00ffff', '#ff00ff', '#ffff00', '#00ff00', '#ff6600', '#ff0066'][Math.floor(Math.random() * 6)];
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                this.life = 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height + 20) {
                    this.life = 0;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size / 2);
                ctx.restore();
            }
        }

        function createHitParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function createConfetti() {
            for (let i = 0; i < 3; i++) {
                confettiParticles.push(new Confetti());
            }
        }

        const keys = {};

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            keys[key] = true;
            
            if (e.key === ' ' || key === 'arrowup' || key === 'arrowdown' || key === 'w' || key === 's') {
                e.preventDefault();
            }
            
            if (e.key === ' ' && !isCountingDown) {
                initAudio();
                if (!gameRunning) {
                    startCountdown();
                } else {
                    togglePause();
                }
            }
            
            if (key === 'r') {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        restartBtn.addEventListener('click', resetGame);
        
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.add('active');
            overlay.classList.add('active');
            gamePaused = true;
        });

        closeSettings.addEventListener('click', () => {
            settingsPanel.classList.remove('active');
            overlay.classList.remove('active');
            if (gameRunning) gamePaused = false;
        });

        overlay.addEventListener('click', () => {
            settingsPanel.classList.remove('active');
            overlay.classList.remove('active');
            if (gameRunning) gamePaused = false;
        });

        soundToggle.addEventListener('click', () => {
            soundToggle.classList.toggle('active');
            soundEnabled = soundToggle.classList.contains('active');
            soundStatus.textContent = soundEnabled ? '开启' : '关闭';
            if (soundEnabled) {
                initAudio();
                playSound(440, 0.1, 'sine', 0.2);
            }
        });

        saveSettings.addEventListener('click', () => {
            WINNING_SCORE = parseInt(winningScoreSelect.value);
            settingsPanel.classList.remove('active');
            overlay.classList.remove('active');
            if (gameRunning) gamePaused = false;
            gameStatusEl.textContent = `设置已保存 - ${WINNING_SCORE} 分制`;
            setTimeout(() => {
                if (!gameRunning) {
                    gameStatusEl.textContent = '点击游戏区域，然后按 空格键 开始';
                } else if (gamePaused) {
                    gameStatusEl.textContent = '⏸️ 游戏暂停 - 按空格键继续';
                } else {
                    gameStatusEl.textContent = '游戏进行中...';
                }
            }, 2000);
        });
        
        canvas.addEventListener('click', () => {
            canvas.focus();
            initAudio();
        });
        
        window.addEventListener('load', () => {
            canvas.focus();
        });

        function startCountdown() {
            isCountingDown = true;
            gamePaused = true;
            let count = 3;
            
            const countdownStep = () => {
                if (count > 0) {
                    countdownEl.textContent = count;
                    countdownEl.classList.remove('show');
                    void countdownEl.offsetWidth;
                    countdownEl.classList.add('show');
                    playCountdownSound();
                    count--;
                    setTimeout(countdownStep, 1000);
                } else {
                    countdownEl.textContent = 'GO!';
                    countdownEl.classList.remove('show');
                    void countdownEl.offsetWidth;
                    countdownEl.classList.add('show');
                    playGoSound();
                    setTimeout(() => {
                        countdownEl.classList.remove('show');
                        isCountingDown = false;
                        gamePaused = false;
                        startGame();
                    }, 500);
                }
            };
            
            countdownStep();
        }

        function startGame() {
            gameRunning = true;
            gamePaused = false;
            gameStatusEl.textContent = '游戏进行中...';
            gameStatusEl.className = 'game-status';
        }

        function togglePause() {
            gamePaused = !gamePaused;
            if (gamePaused) {
                gameStatusEl.textContent = '⏸️ 游戏暂停 - 按空格键继续';
            } else {
                gameStatusEl.textContent = '游戏进行中...';
            }
        }

        function resetGame() {
            gameRunning = false;
            gamePaused = false;
            isCountingDown = false;
            score1 = 0;
            score2 = 0;
            particles = [];
            confettiParticles = [];
            updateScore();
            resetBall();
            resetPaddles();
            gameStatusEl.textContent = '点击游戏区域，然后按 空格键 开始';
            gameStatusEl.className = 'game-status';
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = INITIAL_BALL_SPEED;
            ball.dx = INITIAL_BALL_SPEED * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = INITIAL_BALL_SPEED * (Math.random() - 0.5) * 2;
        }

        function resetPaddles() {
            paddle1.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            paddle2.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            paddle1.flashTime = 0;
            paddle2.flashTime = 0;
        }

        function updateScore() {
            score1El.textContent = score1;
            score2El.textContent = score2;
        }

        function checkWinner() {
            if (score1 >= WINNING_SCORE) {
                gameRunning = false;
                gameStatusEl.textContent = '🎉 玩家 1 获胜！🎉';
                gameStatusEl.className = 'game-status winner';
                playWinSound();
                return true;
            }
            if (score2 >= WINNING_SCORE) {
                gameRunning = false;
                gameStatusEl.textContent = '🎉 玩家 2 获胜！🎉';
                gameStatusEl.className = 'game-status winner';
                playWinSound();
                return true;
            }
            return false;
        }

        function updatePaddles() {
            if (keys['w']) paddle1.dy = -PADDLE_SPEED;
            else if (keys['s']) paddle1.dy = PADDLE_SPEED;
            else paddle1.dy = 0;

            if (keys['arrowup']) paddle2.dy = -PADDLE_SPEED;
            else if (keys['arrowdown']) paddle2.dy = PADDLE_SPEED;
            else paddle2.dy = 0;

            paddle1.y += paddle1.dy;
            paddle2.y += paddle2.dy;

            paddle1.y = Math.max(0, Math.min(canvas.height - paddle1.height, paddle1.y));
            paddle2.y = Math.max(0, Math.min(canvas.height - paddle2.height, paddle2.y));

            if (paddle1.flashTime > 0) {
                paddle1.flashTime--;
                paddle1.color = paddle1.flashTime % 4 < 2 ? paddle1.flashColor : paddle1.originalColor;
            } else {
                paddle1.color = paddle1.originalColor;
            }

            if (paddle2.flashTime > 0) {
                paddle2.flashTime--;
                paddle2.color = paddle2.flashTime % 4 < 2 ? paddle2.flashColor : paddle2.originalColor;
            } else {
                paddle2.color = paddle2.originalColor;
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.y - ball.size <= 0 || ball.y + ball.size >= canvas.height) {
                ball.dy *= -1;
                ball.y = ball.y - ball.size <= 0 ? ball.size : canvas.height - ball.size;
            }

            if (ball.x - ball.size <= paddle1.x + paddle1.width &&
                ball.x + ball.size >= paddle1.x &&
                ball.y >= paddle1.y &&
                ball.y <= paddle1.y + paddle1.height &&
                ball.dx < 0) {
                
                ball.dx *= -1;
                ball.speed += 0.2;
                ball.dx = ball.speed;
                
                let hitPos = (ball.y - (paddle1.y + paddle1.height / 2)) / (paddle1.height / 2);
                ball.dy = hitPos * ball.speed;
                
                ball.x = paddle1.x + paddle1.width + ball.size;
                
                paddle1.flashTime = 15;
                playHitSound();
                createHitParticles(ball.x, ball.y, paddle1.originalColor);
            }

            if (ball.x + ball.size >= paddle2.x &&
                ball.x - ball.size <= paddle2.x + paddle2.width &&
                ball.y >= paddle2.y &&
                ball.y <= paddle2.y + paddle2.height &&
                ball.dx > 0) {
                
                ball.dx *= -1;
                ball.speed += 0.2;
                ball.dx = -ball.speed;
                
                let hitPos = (ball.y - (paddle2.y + paddle2.height / 2)) / (paddle2.height / 2);
                ball.dy = hitPos * ball.speed;
                
                ball.x = paddle2.x - ball.size;
                
                paddle2.flashTime = 15;
                playHitSound();
                createHitParticles(ball.x, ball.y, paddle2.originalColor);
            }

            if (ball.x - ball.size <= 0) {
                score2++;
                updateScore();
                playScoreSound();
                if (!checkWinner()) {
                    resetBall();
                }
            }

            if (ball.x + ball.size >= canvas.width) {
                score1++;
                updateScore();
                playScoreSound();
                if (!checkWinner()) {
                    resetBall();
                }
            }
        }

        function updateParticles() {
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.update());
            
            confettiParticles = confettiParticles.filter(p => p.life > 0);
            confettiParticles.forEach(p => p.update());
        }

        function update() {
            if (!gameRunning || gamePaused || isCountingDown) {
                if (!gameRunning && (score1 >= WINNING_SCORE || score2 >= WINNING_SCORE)) {
                    createConfetti();
                    updateParticles();
                }
                return;
            }

            updatePaddles();
            updateBall();
            updateParticles();
        }

        function draw() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.shadowBlur = 20;
            ctx.shadowColor = paddle1.color;
            ctx.fillStyle = paddle1.color;
            ctx.fillRect(paddle1.x, paddle1.y, paddle1.width, paddle1.height);

            ctx.shadowColor = paddle2.color;
            ctx.fillStyle = paddle2.color;
            ctx.fillRect(paddle2.x, paddle2.y, paddle2.width, paddle2.height);

            ctx.shadowColor = ball.color;
            ctx.fillStyle = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            particles.forEach(p => p.draw());
            confettiParticles.forEach(p => p.draw());

            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.font = 'bold 150px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(score1, canvas.width / 4, canvas.height / 2);
            ctx.fillText(score2, canvas.width * 3 / 4, canvas.height / 2);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
